# Description: GitHub issue form routing and contact policy for Spectra L/S.
# Version: 2026.05.02.4
# Last updated: 2026-05-02

blank_issues_enabled: false
contact_links:
  - name: "❓ Questions / support"
    url: https://github.com/the-butterfry/spectra-ls/discussions
    about: Use Discussions for support/questions so Issues stay focused on reproducible defects and scoped feature work.
  - name: "🌟 Feature ideation"
    url: https://github.com/the-butterfry/spectra-ls/discussions/new?category=ideas
    about: Propose and refine feature ideas before implementation planning.
  - name: "🧭 Contributor workflow + Slice-C intake"
    url: https://github.com/the-butterfry/spectra-ls/blob/main/CONTRIBUTING.md
    about: Use the contributor guide for scheduler/metadata-bridge lane classification and owner-file routing expectations.
  - name: "✅ PR reconciliation requirements"
    url: https://github.com/the-butterfry/spectra-ls/blob/main/.github/pull_request_template.md
    about: Linked issue lane/owner and runtime-touch declaration vs PR file-scope reconciliation evidence is required for scheduler/metadata-bridge work, including reviewer attestation.
