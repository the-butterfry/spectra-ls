# Description: Home Assistant config for Plex now-playing via direct Plex sessions.
# Version: 2026.03.10.3
# Last updated: 2026-03-10
# Update version/date whenever you change this file.
input_text:
  plex_base_url:
    name: Plex Base URL
    initial: "http://192.168.11.244:32400"
  plex_allowed_users:
    name: Plex Allowed Users (comma-separated)
    initial: "landcameras, mutantc, spectra"
  plex_allowed_players:
    name: Plex Allowed Players (comma-separated)
    initial: "all"

rest:
  - resource_template: >-
      {% set base = states('input_text.plex_base_url') %}
      {% set url = base if base not in ['unknown','unavailable',''] else 'http://192.168.11.244:32400' %}
      {{ url }}/status/sessions
    method: GET
    headers:
      X-Plex-Token: !secret plex_token
      Accept: application/json
    scan_interval: 5
    timeout: 10
    sensor:
      - name: cory_plex_sessions_raw
        value_template: "{{ value_json.MediaContainer.size | default(0) }}"
        json_attributes_path: "$.MediaContainer"
        json_attributes:
          - Metadata

template:
  - sensor:
      - name: cory_plex_now_playing_session
        state: >-
          {% set sessions = state_attr('sensor.cory_plex_sessions_raw','Metadata') or [] %}
          {% set raw = states('input_text.plex_allowed_users') | lower %}
          {% set allowed = raw.split(',') | map('trim') | reject('equalto','') | list %}
          {% set allow_all = allowed | length == 0 or 'all' in allowed %}
          {% set raw_players = states('input_text.plex_allowed_players') | lower %}
          {% set allowed_players = raw_players.split(',') | map('trim') | reject('equalto','') | list %}
          {% set allow_all_players = allowed_players | length == 0 or 'all' in allowed_players %}
          {% set ns = namespace(items=[]) %}
          {% for s in sessions %}
            {% set uname = '' %}
            {% if s.Account is defined and s.Account.title is defined %}
              {% set uname = s.Account.title %}
            {% elif s.User is defined and s.User.title is defined %}
              {% set uname = s.User.title %}
            {% elif s.User is defined and s.User[0] is defined and s.User[0].title is defined %}
              {% set uname = s.User[0].title %}
            {% endif %}
            {% set ptitle = '' %}
            {% if s.Player is defined and s.Player.title is defined %}
              {% set ptitle = s.Player.title %}
            {% elif s.Player is defined and s.Player.product is defined %}
              {% set ptitle = s.Player.product %}
            {% elif s.Player is defined and s.Player.device is defined %}
              {% set ptitle = s.Player.device %}
            {% endif %}
            {% set uname_l = uname | lower %}
            {% set ptitle_l = ptitle | lower %}
            {% set player_ok = allow_all_players or (ptitle_l != '' and (allowed_players | select('in', ptitle_l) | list | length > 0)) %}
            {% if (allow_all or (uname_l != '' and uname_l in allowed)) and player_ok %}
              {% set playing = (s.Player is defined and s.Player.state is defined and s.Player.state == 'playing') %}
              {% set ts = (s.Session.lastActivity if s.Session is defined and s.Session.lastActivity is defined else 0) %}
              {% set ns.items = ns.items + [ {'ts': ts, 'playing': playing, 'item': s} ] %}
            {% endif %}
          {% endfor %}
          {% set playing = ns.items | selectattr('playing') | list %}
          {% set candidates = playing if playing|length > 0 else ns.items %}
          {% set chosen = (candidates | sort(attribute='ts') | last).item if candidates|length>0 else None %}
          {% if chosen is none %}
            idle
          {% else %}
            {{ 'playing' if chosen.Player is defined and chosen.Player.state == 'playing' else 'paused' }}
          {% endif %}
