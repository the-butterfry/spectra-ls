# Description: Diagnostics, OLED contrast controls, and test helpers.
# Version: 2026.04.16.1
# Last updated: 2026-04-16
# Update version/date whenever you change this file.
#
# Sections:
#  - OLED contrast control + diagnostics
#  - Test buttons

# === OLED contrast diagnostics ===
sensor:
  - platform: template
    name: "OLED Contrast Applied"
    id: oled_contrast_applied_state
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      float v = id(oled_contrast_last_applied);
      if (v < 0.0f) v = 0.0f;
      if (v > 1.0f) v = 1.0f;
      return v * 100.0f;

  - platform: template
    name: "OLED Contrast Raw"
    id: oled_contrast_raw_state
    internal: true
    accuracy_decimals: 0
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      int v = id(oled_contrast_last_applied_raw);
      if (v < 0) v = 0;
      if (v > 255) v = 255;
      return (float) v;

  - platform: cpu_usage
    name: "CPU Usage"
    id: cpu_usage_main
    update_interval: 20s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    entity_category: diagnostic
    logging_enabled: true
    log_interval: 20s
    log_tasks_enabled: true
    log_tasks_top: 6
    log_tasks_interval: 20s
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("cpu_usage", "sensor update: CPU=%.1f%%", x);
    core0:
      name: "CPU Usage Core 0"
      unit_of_measurement: "%"
      accuracy_decimals: 1
      entity_category: diagnostic
    core1:
      name: "CPU Usage Core 1"
      unit_of_measurement: "%"
      accuracy_decimals: 1
      entity_category: diagnostic

  - platform: template
    name: "Heap Free"
    id: heap_free_kb
    unit_of_measurement: "KB"
    accuracy_decimals: 0
    update_interval: 20s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;

  - platform: template
    name: "Heap Min Free"
    id: heap_min_free_kb
    unit_of_measurement: "KB"
    accuracy_decimals: 0
    update_interval: 60s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_minimum_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;

  - platform: template
    name: "PSRAM Total"
    id: psram_total_mb
    unit_of_measurement: "MB"
    accuracy_decimals: 2
    update_interval: 60s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);

  - platform: template
    name: "PSRAM Free"
    id: psram_free_mb
    unit_of_measurement: "MB"
    accuracy_decimals: 2
    update_interval: 20s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);

number:
  - platform: template
    name: "OLED Contrast"
    id: oled_contrast_set
    internal: false
    unit_of_measurement: "%"
    min_value: 0.0
    max_value: 1.0
    step: 0.05
    mode: slider
    update_interval: 10s
    lambda: |-
      float v = id(oled_contrast);
      if (v < 0.0f) v = 0.0f;
      if (v > 1.0f) v = 1.0f;
      return v;
    set_action:
      - lambda: |-
          float v = x;
          if (v < 0.0f) v = 0.0f;
          if (v > 1.0f) v = 1.0f;
          id(oled_contrast) = v;
      - lambda: |-
          float v = id(oled_contrast);
          if (v < 0.0f) v = 0.0f;
          if (v > 1.0f) v = 1.0f;
          const uint8_t contrast = (uint8_t) (v * 255.0f);
          id(oled_display).set_contrast(contrast);
          id(oled_contrast_last_applied) = v;
          id(oled_contrast_last_applied_raw) = contrast;
          id(oled_contrast_apply_count)++;
          id(oled_contrast_last_apply_ms) = millis();

text_sensor:
  - platform: template
    name: "OLED Contrast Debug"
    id: oled_contrast_debug
    internal: true
    update_interval: 1s
    entity_category: diagnostic
    lambda: |-
      return str_sprintf("v=%.2f raw=%d count=%u ms=%u",
                         id(oled_contrast_last_applied),
                         id(oled_contrast_last_applied_raw),
                         (unsigned) id(oled_contrast_apply_count),
                         (unsigned) id(oled_contrast_last_apply_ms));

switch:
  - platform: template
    name: "CPU Usage Debug Logging"
    id: cpu_usage_debug_logging
    internal: false
    entity_category: diagnostic
    optimistic: true
    on_turn_on:
      - lambda: |-
          ESP_LOGI("cpu_usage", "CPU debug logging enabled (switch)");
          id(cpu_usage_main).set_logging_enabled(true);
    on_turn_off:
      - lambda: |-
          ESP_LOGI("cpu_usage", "CPU debug logging disabled (switch)");
          id(cpu_usage_main).set_logging_enabled(false);

# === Test helpers ===
button:
  - platform: template
    name: "Arylic Test Volume 20"
    id: arylic_test_volume_20
    internal: true
    entity_category: diagnostic
    on_press:
      - script.execute:
          id: arylic_set_volume
          target: 20
