switch:
  - platform: template
    name: "Ambient Strip Enabled"
    id: ambient_strip_enabled_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(ambient_strip_enabled) = true;
    turn_off_action:
      - lambda: |-
          id(ambient_strip_enabled) = false;

button:
  - platform: restart
    id: restart_button
    name: "Control Board Reboot"
    internal: true

script:

  - id: menu_back_one
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(main_menu).is_active();'
          then:
            - display_menu.left: main_menu
          else:
            - display_menu.show: main_menu
            - delay: 10ms
            - display_menu.left: main_menu

  - id: menu_to_root
    mode: restart
    then:
      - display_menu.show: main_menu
      - delay: 10ms
      - display_menu.left: main_menu
      - delay: 10ms
      - display_menu.left: main_menu
      - delay: 10ms
      - display_menu.left: main_menu
      - delay: 10ms
      - display_menu.left: main_menu
      - delay: 10ms
      - display_menu.left: main_menu
      - delay: 10ms
      - display_menu.left: main_menu

  - id: apply_target_hsb_debounced
    mode: restart
    then:
      - delay: 100ms
      - script.execute: apply_target_hsb

  - id: apply_oled_contrast
    mode: restart
    then:
      - lambda: |-
          float pct = id(oled_contrast).state;
          if (pct < 1.0f) pct = 1.0f;
          if (pct > 100.0f) pct = 100.0f;
          const uint8_t contrast = (uint8_t) (pct * 2.55f);
          id(oled_display).set_contrast(contrast);

  - id: enter_slider_hue
    mode: restart
    then:
      - lambda: |-
          id(slider_mode) = 1;
          float pct = id(brightness_slider).has_state() ? id(brightness_slider).state : 0.0f;
          if (pct < 1.0f) pct = 1.0f;
          if (pct > 100.0f) pct = 100.0f;
          id(last_slider_pct_light) = pct;
          id(lighting_slider_entry_pct) = pct;
          id(lighting_slider_changed) = false;
          id(lighting_slider_pickup) = false;
      - script.execute: sync_target_state

  - id: enter_slider_sat
    mode: restart
    then:
      - lambda: |-
          id(slider_mode) = 2;
          float pct = id(brightness_slider).has_state() ? id(brightness_slider).state : 0.0f;
          if (pct < 1.0f) pct = 1.0f;
          if (pct > 100.0f) pct = 100.0f;
          id(last_slider_pct_light) = pct;
          id(lighting_slider_entry_pct) = pct;
          id(lighting_slider_changed) = false;
          id(lighting_slider_pickup) = false;
      - script.execute: sync_target_state

  - id: enter_slider_brightness
    mode: restart
    then:
      - lambda: |-
          id(slider_mode) = 3;
          float pct = id(brightness_slider).has_state() ? id(brightness_slider).state : 0.0f;
          if (pct < 1.0f) pct = 1.0f;
          if (pct > 100.0f) pct = 100.0f;
          id(last_slider_pct_light) = pct;
          id(lighting_slider_entry_pct) = pct;
          id(lighting_slider_changed) = false;
          id(lighting_slider_pickup) = false;
      - script.execute: sync_target_state

  - id: sync_strip_selected_room
    mode: restart
    then:
      - lambda: |-
          const char *rgb = nullptr;
          float brightness = 1.0f;
          const int room = id(selected_room);
          if (room == 0) {
            if (!id(living_rgb).has_state()) return;
            rgb = id(living_rgb).state.c_str();
            if (id(living_brightness_attr).has_state()) {
              brightness = id(living_brightness_attr).state / 255.0f;
            }
          } else if (room == 1) {
            if (!id(dining_rgb).has_state()) return;
            rgb = id(dining_rgb).state.c_str();
            if (id(dining_brightness_attr).has_state()) {
              brightness = id(dining_brightness_attr).state / 255.0f;
            }
          } else if (room == 2) {
            if (!id(kitchen_rgb).has_state()) return;
            rgb = id(kitchen_rgb).state.c_str();
            if (id(kitchen_brightness_attr).has_state()) {
              brightness = id(kitchen_brightness_attr).state / 255.0f;
            }
          } else if (room == 3) {
            if (!id(bedroom_rgb).has_state()) return;
            rgb = id(bedroom_rgb).state.c_str();
            if (id(bedroom_brightness_attr).has_state()) {
              brightness = id(bedroom_brightness_attr).state / 255.0f;
            }
          } else {
            return;
          }

          int r = 0, g = 0, b = 0;
          if (!rgb || sscanf(rgb, "[%d, %d, %d]", &r, &g, &b) != 3) {
            return;
          }
          if (id(ambient_strip_enabled)) {
            auto call = id(ambient_strip).turn_on();
            call.set_rgb(r / 255.0f, g / 255.0f, b / 255.0f);
            call.set_white(0.0f);
            call.set_brightness(brightness);
            call.perform();
          }

  - id: sync_target_state
    mode: restart
    then:
      - lambda: |-
          int room = id(selected_room);
          int target = id(selected_target);
          const char *hs = nullptr;
          float brightness = 255.0f;
          if (room == 0) {
            if (target == 0) {
              hs = id(living_hs).has_state() ? id(living_hs).state.c_str() : nullptr;
              brightness = id(living_brightness_attr).has_state() ? id(living_brightness_attr).state : 255.0f;
            } else if (target == 1) {
              hs = id(living_star_hs).has_state() ? id(living_star_hs).state.c_str() : nullptr;
              brightness = id(living_star_brightness).has_state() ? id(living_star_brightness).state : 255.0f;
            } else if (target == 2) {
              hs = id(living_reading_hs).has_state() ? id(living_reading_hs).state.c_str() : nullptr;
              brightness = id(living_reading_brightness).has_state() ? id(living_reading_brightness).state : 255.0f;
            } else if (target == 3) {
              hs = id(living_tube_hs).has_state() ? id(living_tube_hs).state.c_str() : nullptr;
              brightness = id(living_tube_brightness).has_state() ? id(living_tube_brightness).state : 255.0f;
            } else if (target == 4) {
              hs = id(living_turntable_hs).has_state() ? id(living_turntable_hs).state.c_str() : nullptr;
              if (id(living_turntable_brightness).has_state()) {
                const std::string b = id(living_turntable_brightness).state;
                if (!b.empty() && b != "None") {
                  brightness = strtof(b.c_str(), nullptr);
                }
              }
            }
          } else if (room == 1) {
            if (target == 0) {
              hs = id(dining_hs).has_state() ? id(dining_hs).state.c_str() : nullptr;
              brightness = id(dining_brightness_attr).has_state() ? id(dining_brightness_attr).state : 255.0f;
            } else if (target == 1) {
              hs = id(dining_chandelier_hs).has_state() ? id(dining_chandelier_hs).state.c_str() : nullptr;
              brightness = id(dining_chandelier_brightness).has_state() ? id(dining_chandelier_brightness).state : 255.0f;
            }
          } else if (room == 2) {
            if (target == 0) {
              hs = id(kitchen_hs).has_state() ? id(kitchen_hs).state.c_str() : nullptr;
              brightness = id(kitchen_brightness_attr).has_state() ? id(kitchen_brightness_attr).state : 255.0f;
            } else if (target == 1) {
              hs = id(kitchen_clock_hs).has_state() ? id(kitchen_clock_hs).state.c_str() : nullptr;
              brightness = id(kitchen_clock_brightness).has_state() ? id(kitchen_clock_brightness).state : 255.0f;
            }
          } else if (room == 3) {
            if (target == 0) {
              hs = id(bedroom_hs).has_state() ? id(bedroom_hs).state.c_str() : nullptr;
              brightness = id(bedroom_brightness_attr).has_state() ? id(bedroom_brightness_attr).state : 255.0f;
            }
          }

          float hue = id(current_hue);
          float sat = id(current_sat);
          if (hs && *hs) {
            std::string hs_str(hs);
            for (char &c : hs_str) {
              if (c == '[' || c == ']' || c == '(' || c == ')') {
                c = ' ';
              }
            }
            float h = 0.0f, s = 0.0f;
            if (sscanf(hs_str.c_str(), "%f , %f", &h, &s) == 2 ||
                sscanf(hs_str.c_str(), "%f %f", &h, &s) == 2) {
              hue = h;
              sat = s;
            }
          }
          id(current_hue) = hue;
          id(current_sat) = sat;
          id(current_bri) = (brightness / 255.0f) * 100.0f;
            id(target_hue).publish_state(id(current_hue));
            id(target_sat).publish_state(id(current_sat));
            id(target_bri).publish_state(id(current_bri));
      - script.execute: apply_ambient_from_hsb

  - id: apply_ambient_from_hsb
    mode: restart
    then:
      - lambda: |-
          float h = id(current_hue) / 360.0f;
          float s = id(current_sat) / 100.0f;
          float v = id(current_bri) / 100.0f;
          float r = 0.0f, g = 0.0f, b = 0.0f;
          int i = (int)(h * 6.0f);
          float f = h * 6.0f - i;
          float p = v * (1.0f - s);
          float q = v * (1.0f - f * s);
          float t = v * (1.0f - (1.0f - f) * s);
          switch (i % 6) {
            case 0: r = v; g = t; b = p; break;
            case 1: r = q; g = v; b = p; break;
            case 2: r = p; g = v; b = t; break;
            case 3: r = p; g = q; b = v; break;
            case 4: r = t; g = p; b = v; break;
            case 5: r = v; g = p; b = q; break;
          }

          auto linearize = [](float c) -> float {
            return (c > 0.04045f) ? powf((c + 0.055f) / 1.055f, 2.4f) : (c / 12.92f);
          };
          float rl = linearize(r);
          float gl = linearize(g);
          float bl = linearize(b);
          float X = rl * 0.4124f + gl * 0.3576f + bl * 0.1805f;
          float Y = rl * 0.2126f + gl * 0.7152f + bl * 0.0722f;
          float Z = rl * 0.0193f + gl * 0.1192f + bl * 0.9505f;
          float denom = X + Y + Z;
          if (id(ambient_strip_enabled)) {
            auto call = id(ambient_strip).turn_on();
            call.set_rgb(r, g, b);
            call.set_white(0.0f);
            call.set_brightness(v);
            call.perform();
          }

  - id: apply_target_hsb
