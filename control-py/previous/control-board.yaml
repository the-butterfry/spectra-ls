          then:
            - script.execute: apply_hsb_bedroom

  - id: refresh_target_mode_throttled
    mode: restart
    parameters:
      entity_id: string
    then:
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              return (now - id(last_ha_sync_ms)) >= 10000;
          then:
            - lambda: |-
                id(last_ha_sync_ms) = millis();
            - homeassistant.service:
                service: homeassistant.update_entity
                data:
                  entity_id: !lambda 'return entity_id;'
            - delay: 200ms
      - lambda: |-
          const char *mode = nullptr;
          const char *supported = nullptr;
          float color_temp = -1.0f;
          int room = id(selected_room);
          int target = id(selected_target);
          if (room == 0) {
            if (target == 0 || target == 1) {
              if (id(living_star_color_mode).has_state()) mode = id(living_star_color_mode).state.c_str();
              if (id(living_star_supported_modes).has_state()) supported = id(living_star_supported_modes).state.c_str();
              if (id(living_star_color_temp).has_state()) color_temp = id(living_star_color_temp).state;
            } else if (target == 2) {
              if (id(living_reading_color_mode).has_state()) mode = id(living_reading_color_mode).state.c_str();
              if (id(living_reading_supported_modes).has_state()) supported = id(living_reading_supported_modes).state.c_str();
              if (id(living_reading_color_temp).has_state()) color_temp = id(living_reading_color_temp).state;
            } else if (target == 3) {
              if (id(living_tube_color_mode).has_state()) mode = id(living_tube_color_mode).state.c_str();
              if (id(living_tube_supported_modes).has_state()) supported = id(living_tube_supported_modes).state.c_str();
              if (id(living_tube_color_temp).has_state()) color_temp = id(living_tube_color_temp).state;
            } else if (target == 4) {
              if (id(living_turntable_color_mode).has_state()) mode = id(living_turntable_color_mode).state.c_str();
              if (id(living_turntable_supported_modes).has_state()) supported = id(living_turntable_supported_modes).state.c_str();
              if (id(living_turntable_color_temp).has_state()) color_temp = id(living_turntable_color_temp).state;
            }
          } else if (room == 1) {
            if (target == 0 || target == 1) {
              if (id(dining_chandelier_color_mode).has_state()) mode = id(dining_chandelier_color_mode).state.c_str();
              if (id(dining_chandelier_supported_modes).has_state()) supported = id(dining_chandelier_supported_modes).state.c_str();
              if (id(dining_chandelier_color_temp).has_state()) color_temp = id(dining_chandelier_color_temp).state;
            }
          } else if (room == 2) {
            if (target == 0 || target == 1) {
              if (id(kitchen_clock_color_mode).has_state()) mode = id(kitchen_clock_color_mode).state.c_str();
              if (id(kitchen_clock_supported_modes).has_state()) supported = id(kitchen_clock_supported_modes).state.c_str();
              if (id(kitchen_clock_color_temp).has_state()) color_temp = id(kitchen_clock_color_temp).state;
            }
          } else if (room == 3) {
            if (target == 0 || target == 1) {
              if (id(bedroom_light_color_mode).has_state()) mode = id(bedroom_light_color_mode).state.c_str();
              if (id(bedroom_light_supported_modes).has_state()) supported = id(bedroom_light_supported_modes).state.c_str();
              if (id(bedroom_light_color_temp).has_state()) color_temp = id(bedroom_light_color_temp).state;
            }
          }

          id(current_color_mode) = mode ? std::string(mode) : std::string("");
          id(current_supported_modes) = supported ? std::string(supported) : std::string("");
          id(current_color_temp) = color_temp;

  - id: apply_hsb_entity
    mode: restart
    parameters:
      entity_id: string
    then:
      - script.execute:
          id: refresh_target_mode_throttled
          entity_id: !lambda 'return entity_id;'
      - if:
          condition:
            lambda: |-
              const std::string mode = id(current_color_mode);
              const std::string supported = id(current_supported_modes);
              auto contains = [](const std::string &hay, const char *needle) {
                return hay.find(needle) != std::string::npos;
              };
              const bool supports_color = contains(supported, "hs") || contains(supported, "rgb") || contains(supported, "xy");
              const bool mode_color = (mode == "hs" || mode == "rgb" || mode == "xy" || mode == "rgbw" || mode == "rgbww");
              return mode_color || (mode.empty() && supports_color);
          then:
            - homeassistant.service:
                service: script.esphome_set_hsb
                data:
                  entity_id: !lambda 'return entity_id;'
                  h: !lambda 'return id(current_hue);'
                  s: !lambda 'return id(current_sat);'
                  b: !lambda 'return id(current_bri);'
          else:
            - if:
                condition:
                  lambda: 'return id(current_color_temp) > 0.0f;'
                then:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: !lambda 'return entity_id;'
                        brightness_pct: !lambda 'return id(current_bri);'
                        color_temp: !lambda 'return id(current_color_temp);'
                else:
                  - homeassistant.service:
                      service: light.turn_on
                      data:
                        entity_id: !lambda 'return entity_id;'
                        brightness_pct: !lambda 'return id(current_bri);'

