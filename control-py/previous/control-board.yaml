          else:
            - homeassistant.service:
                service: media_player.media_next_track
                data:
                  entity_id: ${audio_player_wiim}

display:
  - platform: ssd1306_i2c
    id: oled_display
    model: ${oled_model}
    address: ${oled_address}
    rotation: ${oled_rotation}
    update_interval: 300ms
    lambda: |-
      it.fill(COLOR_OFF);
      if (id(audio_controls_active) || id(screensaver_active)) {
        const int w = it.get_width();
        const int h = it.get_height();
        const int btn_w = 36;
        const int btn_h = 24;
        const int gap = 6;
        const int total_w = (btn_w * 3) + (gap * 2);
        const int start_x = (w - total_w) / 2;
        const int y = 32;
        const bool is_playing = id(audio_state).has_state() && id(audio_state).state == "playing";
        const char *play_pause_icon = is_playing ? "\uE034" : "\uE037";

        bool use_wiim = false;
        auto is_bluetooth = [](const std::string &input) -> bool {
          std::string s = input;
          for (auto &c : s) {
            c = (char) ::tolower(c);
          }
          return s.find("bluetooth") != std::string::npos || s.find("bt") != std::string::npos;
        };
        if (!id(audio_state).has_state() || id(audio_state).state == "unavailable") {
          use_wiim = true;
        }
        if (!use_wiim && id(audio_input_source).has_state()) {
          use_wiim = is_bluetooth(id(audio_input_source).state.c_str());
        }
        if (!use_wiim && id(audio_input).has_state()) {
          use_wiim = is_bluetooth(id(audio_input).state.c_str());
        }
        const bool wiim_has = (id(wiim_title).has_state() && !id(wiim_title).state.empty()) ||
                              (id(wiim_artist).has_state() && !id(wiim_artist).state.empty());
        const bool ma_has = (id(audio_title).has_state() && !id(audio_title).state.empty()) ||
                            (id(audio_artist).has_state() && !id(audio_artist).state.empty());
        if (!use_wiim && wiim_has && (!ma_has || (id(audio_state).has_state() && id(audio_state).state != "playing"))) {
          use_wiim = true;
        }
        std::string title = use_wiim
          ? (id(wiim_title).has_state() ? id(wiim_title).state.c_str() : "")
          : (id(audio_title).has_state() ? id(audio_title).state.c_str() : "");
        std::string artist = use_wiim
          ? (id(wiim_artist).has_state() ? id(wiim_artist).state.c_str() : "")
          : (id(audio_artist).has_state() ? id(audio_artist).state.c_str() : "");
        const int line_x = 0;
        const int line_w = w;
        const int char_w = 6;
        const int scroll_gap = 12;
        const uint32_t scroll_ms = 200;
        const uint32_t now_ms = millis();
        draw_scrolling_text(it, line_x, 0, line_w, title, id(font_menu), now_ms, scroll_ms, char_w, scroll_gap, 0);
        draw_scrolling_text(it, line_x, 12, line_w, artist, id(font_menu), now_ms, scroll_ms, char_w, scroll_gap, 6);

        auto draw_btn = [&](int idx, int x, const char *label) {
          if (id(audio_controls_index) == idx) {
            it.filled_rectangle(x, y, btn_w, btn_h, COLOR_ON);
            it.print(x + (btn_w / 2), y + (btn_h / 2), id(font_icons), COLOR_OFF, TextAlign::CENTER, label);
          } else {
            it.rectangle(x, y, btn_w, btn_h, COLOR_ON);
            it.print(x + (btn_w / 2), y + (btn_h / 2), id(font_icons), TextAlign::CENTER, label);
          }
        };

        draw_btn(0, start_x, "\uE045");
        draw_btn(1, start_x + btn_w + gap, play_pause_icon);
        draw_btn(2, start_x + (btn_w + gap) * 2, "\uE044");
        return;
      }
      if (id(main_menu).is_active()) {
        it.menu(0, 0, id(main_menu), it.get_width(), it.get_height());
        return;
      }

interval:
  - interval: 1s
    then:
      - script.execute: update_screensaver_state

graphical_display_menu:
  - id: main_menu
    active: true
    mode: rotary
    font: font_menu
    menu_item_value: !lambda |-
      std::string label = " ";
      if (it->is_item_selected && it->is_menu_editing) {
        label.append("*");
        label.append(it->item->get_value_text());
        label.append("*");
      } else {
        label.append("[");
        label.append(it->item->get_value_text());
        label.append("]");
      }
      return label;
    items:
      - !include menus/lighting.yaml
      - !include menus/audio.yaml
      - !include menus/settings.yaml
      - type: label
        text: "Devices (soon)"


binary_sensor:
  - platform: gpio
    pin:
      number: ${enc_press_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Press"
    id: enc_press
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      - lambda: |-
          id(last_input_ms) = millis();
      - script.execute: handle_select_press

  - platform: gpio
    pin:
      number: ${back_button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "Back Button"
    id: back_button
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_click:
      - min_length: 10ms
        max_length: 600ms
        then:
          - lambda: |-
              id(last_input_ms) = millis();
              id(screensaver_active) = false;
              id(slider_mode) = 0;
          - if:
              condition:
                lambda: 'return id(audio_controls_active) || id(screensaver_controls);'
              then:
                - lambda: |-
                    id(audio_controls_active) = false;
                    id(audio_mode) = false;
                    id(screensaver_controls) = false;
                    id(audio_slider_armed) = false;
                    id(audio_slider_entry_pct) = -1.0f;
                - script.execute: menu_back_one
              else:
                - script.execute: menu_back_one
      - min_length: 600ms
        max_length: 5000ms
        then:
          - lambda: |-
              id(screensaver_active) = false;
              id(slider_mode) = 0;
          - lambda: |-
              id(audio_controls_active) = false;
              id(audio_mode) = false;
              id(audio_slider_armed) = false;
              id(audio_slider_entry_pct) = -1.0f;
              id(screensaver_controls) = false;
          - script.execute: menu_to_root

  - platform: gpio
    pin:
      number: ${confirm_button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "Confirm Button"
    id: confirm_button
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      - lambda: |-
          id(last_input_ms) = millis();
      - script.execute: handle_select_press

sensor:
  - platform: template
    name: "Audio Volume Set Count"
    id: audio_volume_set_count
    unit_of_measurement: "calls"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      return (float) id(volume_set_count);

  - platform: template
    name: "PSRAM Total"
    id: psram_total_mb
    unit_of_measurement: "MB"
    accuracy_decimals: 2
    update_interval: 60s
    lambda: |-
      return heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);

  - platform: template
    name: "PSRAM Free"
    id: psram_free_mb
    unit_of_measurement: "MB"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      return heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);

  - platform: homeassistant
    id: living_brightness_attr
    entity_id: ${living_light_primary}
    attribute: brightness
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_room) == 0;'
          then:
            - script.execute: sync_target_state

  - platform: homeassistant
    id: dining_brightness_attr
    entity_id: ${dining_light_primary}
    attribute: brightness
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_room) == 1;'
          then:
            - script.execute: sync_target_state

  - platform: homeassistant
    id: kitchen_brightness_attr
    entity_id: ${kitchen_light_primary}
    attribute: brightness
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_room) == 2;'
          then:
            - script.execute: sync_target_state

  - platform: homeassistant
    id: bedroom_brightness_attr
    entity_id: ${bedroom_light_primary}
    attribute: brightness
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return id(selected_room) == 3;'
          then:
            - script.execute: sync_target_state

  - platform: homeassistant
    id: living_star_brightness
    entity_id: ${living_light_1}
    attribute: brightness
    internal: true
  - platform: homeassistant
    id: living_reading_brightness
    entity_id: ${living_light_2}
    attribute: brightness
    internal: true
  - platform: homeassistant
    id: living_tube_brightness
    entity_id: ${living_light_3}
    attribute: brightness
    internal: true
  - platform: homeassistant
    id: dining_chandelier_brightness
    entity_id: ${dining_light_1}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: kitchen_clock_brightness
    entity_id: ${kitchen_light_1}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: living_star_color_temp
    entity_id: ${living_light_1}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: living_reading_color_temp
    entity_id: ${living_light_2}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: living_tube_color_temp
    entity_id: ${living_light_3}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: living_turntable_color_temp
    entity_id: ${living_light_4}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: dining_chandelier_color_temp
    entity_id: ${dining_light_1}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: kitchen_clock_color_temp
    entity_id: ${kitchen_light_1}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: bedroom_light_color_temp
    entity_id: ${bedroom_light_1}
    attribute: color_temp
    internal: true

  - platform: homeassistant
    id: audio_volume_level
    entity_id: ${audio_player}
    attribute: volume_level
    internal: true
    on_value:
      - lambda: |-
          const float pct = x * 100.0f;
          id(audio_volume).publish_state(pct);
          id(last_volume_pct) = pct;
          id(audio_slider_pickup) = true;

  - platform: homeassistant
    id: audio_volume_level_wiim
    entity_id: ${audio_player_wiim}
    attribute: volume_level
    internal: true
    on_value:
      - if:
          condition:
            lambda: |-
              return !id(audio_state).has_state() || id(audio_state).state == "unavailable";
          then:
            - lambda: |-
                const float pct = x * 100.0f;
                id(audio_volume).publish_state(pct);
                id(last_volume_pct) = pct;
                id(audio_slider_pickup) = true;

  - platform: adc
    id: brightness_slider
    pin: ${slider_pin}
    unit_of_measurement: "%"
    accuracy_decimals: 0
    attenuation: 12db
    update_interval: 75ms
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      - lambda: |-
          float pct = (x / 3.3f) * 100.0f;
          if (pct < 1.0f) pct = 1.0f;
          if (pct > 100.0f) pct = 100.0f;
          return pct;
    on_value:
      - lambda: |-
          const float delta_light = (id(last_slider_pct_light) < 0.0f) ? 999.0f : fabsf(id(last_slider_pct_light) - x);
          id(lighting_slider_changed) = (delta_light >= 1.0f);
          if (id(lighting_slider_changed)) {
            id(last_slider_pct_light) = x;
          }
          const float delta_audio = (id(last_slider_pct_audio) < 0.0f) ? 999.0f : fabsf(id(last_slider_pct_audio) - x);
          id(audio_slider_changed) = (delta_audio >= 1.0f);
          if (id(audio_slider_changed)) {
            id(last_slider_pct_audio) = x;
          }
          if (id(lighting_slider_changed) || id(audio_slider_changed)) {
            id(last_input_ms) = millis();
            id(screensaver_active) = false;
          }
      - if:
          condition:
            lambda: 'return id(slider_mode) > 0;'
          then:
            - lambda: |-
                if (id(lighting_slider_pickup)) {
                  if (fabsf(id(lighting_slider_entry_pct) - x) < 5.0f) {
                    return;
                  }
                  id(lighting_slider_pickup) = false;
                }
                if (id(slider_mode) == 1) {
                  float hue = (x / 100.0f) * 360.0f;
                  if (hue < 0.0f) hue = 0.0f;
                  if (hue > 360.0f) hue = 360.0f;
                  id(current_hue) = hue;
                  id(target_hue).publish_state(hue);
                } else if (id(slider_mode) == 2) {
                  id(current_sat) = x;
                  id(target_sat).publish_state(x);
                } else if (id(slider_mode) == 3) {
                  id(current_bri) = x;
                  id(target_bri).publish_state(x);
                } else {
                  return;
                }
            - script.execute: apply_target_hsb_debounced
      - if:
          condition:
            lambda: |-
              return ((id(audio_controls_active) || id(screensaver_active)) && !id(main_menu).is_active()) ||
                     (id(audio_mode) && id(main_menu).is_active());
          then:
            - lambda: |-
                if (!id(audio_slider_changed)) {
                  return;
                }
                if (id(last_volume_pct) < 0.0f) {
                  return;
                }
                if (id(audio_slider_pickup)) {
                  if (fabsf(id(last_volume_pct) - x) > 2.0f) {
                    return;
                  }
                  id(audio_slider_pickup) = false;
                }
                const uint32_t now = millis();
                if (now - id(last_encoder_ms) < 100) {
                  return;
                }
                if (fabsf(id(last_volume_pct) - x) < 1.0f && now - id(last_volume_set_ms) < 100) {
                  return;
                }
                id(last_volume_pct) = x;
                id(last_volume_set_ms) = now;
            - script.execute:
                id: set_audio_volume_throttled
                volume_pct: !lambda 'return x;'

  - platform: rotary_encoder
    name: "Menu Encoder"
    id: menu_encoder
    pin_a: ${enc_a_pin}
    pin_b: ${enc_b_pin}
    resolution: 1
    filters:
      - debounce: 20ms
    on_clockwise:
      - lambda: |-
          id(last_input_ms) = millis();
          id(screensaver_active) = false;
          id(last_encoder_ms) = millis();
      - if:
          condition:
            lambda: 'return id(slider_mode) > 0;'
          then:
            - lambda: |-
                if (id(slider_mode) == 1) {
                  float hue = id(current_hue) + 3.0f;
                  if (hue > 360.0f) hue = 360.0f;
                  id(current_hue) = hue;
                  id(target_hue).publish_state(hue);
                } else if (id(slider_mode) == 2) {
                  float sat = id(current_sat) + 2.0f;
                  if (sat > 100.0f) sat = 100.0f;
                  id(current_sat) = sat;
                  id(target_sat).publish_state(sat);
                } else if (id(slider_mode) == 3) {
                  float bri = id(current_bri) + 2.0f;
                  if (bri > 100.0f) bri = 100.0f;
                  id(current_bri) = bri;
                  id(target_bri).publish_state(bri);
                } else {
                  return;
                }
            - script.execute: apply_target_hsb_debounced
          else:
            - if:
                condition:
                  lambda: 'return id(audio_controls_active);'
                then:
                  - lambda: |-
                      id(audio_controls_index) = (id(audio_controls_index) + 1) % 3;
                else:
                  - display_menu.down: main_menu
    on_anticlockwise:
      - lambda: |-
          id(last_input_ms) = millis();
          id(screensaver_active) = false;
          id(last_encoder_ms) = millis();
      - if:
          condition:
            lambda: 'return id(slider_mode) > 0;'
          then:
            - lambda: |-
                if (id(slider_mode) == 1) {
                  float hue = id(current_hue) - 3.0f;
                  if (hue < 0.0f) hue = 0.0f;
                  id(current_hue) = hue;
                  id(target_hue).publish_state(hue);
                } else if (id(slider_mode) == 2) {
                  float sat = id(current_sat) - 2.0f;
                  if (sat < 0.0f) sat = 0.0f;
                  id(current_sat) = sat;
                  id(target_sat).publish_state(sat);
                } else if (id(slider_mode) == 3) {
                  float bri = id(current_bri) - 2.0f;
                  if (bri < 1.0f) bri = 1.0f;
                  id(current_bri) = bri;
                  id(target_bri).publish_state(bri);
                } else {
                  return;
                }
            - script.execute: apply_target_hsb_debounced
          else:
            - if:
                condition:
                  lambda: 'return id(audio_controls_active);'
                then:
                  - lambda: |-
                      id(audio_controls_index) = (id(audio_controls_index) + 2) % 3;
                else:
                  - display_menu.up: main_menu