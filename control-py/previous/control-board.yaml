  - id: update_screensaver_state
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          const uint32_t idle_ms = now - id(last_input_ms);
          bool playing = false;
          if (id(audio_state).has_state()) {
            auto s = id(audio_state).state;
            playing = (s == "playing");
          }
          const bool should_saver = playing && idle_ms > ${screensaver_idle_ms};
          if (should_saver) {
            if (id(main_menu).is_active()) {
              id(main_menu).hide();
            }
            id(audio_slider_pickup) = true;
            id(slider_mode) = 0;
            if (!id(audio_controls_active)) {
              id(audio_controls_active) = true;
              id(audio_controls_index) = 1;
              id(screensaver_controls) = true;
            }
            id(audio_mode) = true;
            id(audio_slider_armed) = false;
            float pct = id(brightness_slider).has_state() ? id(brightness_slider).state : -1.0f;
            id(audio_slider_entry_pct) = pct;
            if (pct >= 0.0f) {
              id(last_slider_pct_audio) = pct;
              id(audio_slider_changed) = false;
            }
            id(screensaver_active) = true;
          } else {
            if (id(screensaver_active) && id(screensaver_controls)) {
              id(audio_controls_active) = false;
              id(screensaver_controls) = false;
              id(audio_mode) = false;
              id(audio_slider_armed) = false;
              id(audio_slider_entry_pct) = -1.0f;
            }
            id(screensaver_active) = false;
          }

  - id: show_audio_controls
    mode: restart
    then:
      - lambda: |-
          id(audio_controls_active) = true;
          id(audio_controls_index) = 1;
          id(audio_mode) = true;
          id(screensaver_active) = false;
          id(screensaver_controls) = false;
          id(last_input_ms) = millis();
          id(audio_slider_pickup) = true;
          id(slider_mode) = 0;
          id(audio_slider_armed) = false;
          float pct = id(brightness_slider).has_state() ? id(brightness_slider).state : -1.0f;
          id(audio_slider_entry_pct) = pct;
          if (pct >= 0.0f) {
            id(last_slider_pct_audio) = pct;
            id(audio_slider_changed) = false;
          }
          id(main_menu).hide();

  - id: set_audio_volume_throttled
    mode: restart
    parameters:
      volume_pct: float
    then:
      - lambda: |-
          float pct = volume_pct;
          if (pct < 0.0f) pct = 0.0f;
          if (pct > 100.0f) pct = 100.0f;
          id(pending_volume_pct) = pct;
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              const float last = id(last_volume_sent_pct);
              const float delta = (last < 0.0f) ? 999.0f : fabsf(last - id(pending_volume_pct));
              if (delta < 2.0f) {
                return false;
              }
              if (now - id(last_volume_sent_ms) < 300) {
                return false;
              }
              return true;
          then:
            - if:
                condition:
                  lambda: |-
                    return id(audio_state).has_state() && id(audio_state).state != "unavailable";
                then:
                  - homeassistant.service:
                      service: media_player.volume_set
                      data:
                        entity_id: ${audio_player}
                        volume_level: !lambda 'return id(pending_volume_pct) / 100.0f;'
                else:
                  - homeassistant.service:
                      service: media_player.volume_set
                      data:
                        entity_id: ${audio_player_wiim}
                        volume_level: !lambda 'return id(pending_volume_pct) / 100.0f;'
            - lambda: |-
                id(last_volume_sent_ms) = millis();
                id(last_volume_sent_pct) = id(pending_volume_pct);
                id(volume_set_count) += 1;
                id(audio_volume_set_count).publish_state((float) id(volume_set_count));

  - id: handle_select_press
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(slider_mode) > 0 && id(main_menu).is_active();'
          then:
            - lambda: |-
                id(slider_mode) = 0;
            - display_menu.left: main_menu
          else:
            - if:
                condition:
                  lambda: 'return id(audio_controls_active);'
                then:
                  - if:
                      condition:
                        lambda: 'return id(audio_controls_index) == 0;'
                      then:
                        - script.execute: audio_control_prev
                  - if:
                      condition:
                        lambda: 'return id(audio_controls_index) == 1;'
                      then:
                        - script.execute: audio_control_play_pause
                  - if:
                      condition:
                        lambda: 'return id(audio_controls_index) == 2;'
                      then:
                        - script.execute: audio_control_next
                else:
                  - if:
                      condition:
                        lambda: 'return id(screensaver_active) || !id(main_menu).is_active();'
                      then:
                        - script.execute: show_audio_controls
                      else:
                        - lambda: |-
