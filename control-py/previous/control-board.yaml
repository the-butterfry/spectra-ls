# Description: Legacy ESPHome config for Control Board v1 (archived).
# Version: 2026.03.09
# Last updated: 2026-03-09
# Update version/date whenever you change this file.
substitutions:
  device_name: control-board
  friendly_name: "Control Board"

  wifi_ssid: !secret esphome_wifi_ssid_iot
  wifi_password: !secret esphome_wifi_password_iot
  static_ip: 192.168.30.39
  gateway_ip: 192.168.30.1
  subnet_mask: 255.255.255.0
  dns1_ip: 192.168.30.1
  dns2_ip: 1.1.1.1

  # I2C OLED (SSD1309-compatible, uses SSD1306 128x64 model in ESPHome)
  oled_sda_pin: GPIO8
  oled_scl_pin: GPIO9
  oled_address: 0x3C
  oled_model: "SSD1306 128x64"

  # Inputs
  enc_a_pin: GPIO21
  enc_b_pin: GPIO47
  enc_press_pin: GPIO42
  back_button_pin: GPIO40
  confirm_button_pin: GPIO41

  # Display tuning
  oled_rotation: "0"

  # Audio entities
  audio_player: media_player.living_room_speakers
  audio_player_wiim: media_player.living_room_2
  audio_input_sensor: sensor.living_room_current_input

  # UI timing
  screensaver_idle_ms: "30000"

  # Ambient RGBW strip (WS2814 FCOB)
  ambient_data_pin: GPIO13
  ambient_led_count: "480"
  ambient_color_order: "RGB"

  # Slider (10k potentiometer)
  slider_pin: GPIO4

  # Onboard RGB status LED (addressable)
  status_led_pin: GPIO48

  # Rooms
  room_label_living: "Living Room"
  room_label_dining: "Dining Room"
  room_label_kitchen: "Kitchen"
  room_label_bedroom: "Bedroom"
  room_living: living_room
  room_dining: dining_room
  room_kitchen: kitchen
  room_bedroom: bedroom

  # Light entities (edit freely to add/remove lights)
  living_light_primary: light.star_lamp
  living_light_1: light.star_lamp
  living_light_2: light.reading
  living_light_3: light.play_gradient_tube
  living_light_4: light.turntable_light

  dining_light_primary: light.polaroid_chandelier
  dining_light_1: light.polaroid_chandelier

  kitchen_light_primary: light.pola_light
  kitchen_light_1: light.pola_light

  bedroom_light_primary: light.bedroom
  bedroom_light_1: light.bedroom

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - scroll_text.h
  on_boot:
    then:
      - lambda: |-
          const float total_mb = heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);
          const float free_mb = heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);
          ESP_LOGI("psram", "PSRAM total: %.2f MB, free: %.2f MB", total_mb, free_mb);
      - script.execute: apply_oled_contrast

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 8MB  

psram:
  mode: octal
  speed: 80MHz
  
wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: true
  power_save_mode: NONE
  reboot_timeout: 0s

  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway_ip}
    subnet: ${subnet_mask}
    dns1: ${dns1_ip}
    dns2: ${dns2_ip}
  ap:
    ssid: "Control Board Fallback"
    password: "fallback123"

logger:
  level: INFO

api:
  encryption:
    key: "l3cCPRUwr1KMrP/IC4oG9n/MIkyojC4JhKhUwMQE2ec="

ota:
  - platform: esphome
    password: "96bca90a4435a9c0e453100d0bd93b3f"

web_server:
  port: 80
  include_internal: true
  log: true
  version: 3

i2c:
  sda: ${oled_sda_pin}
  scl: ${oled_scl_pin}
  frequency: 400kHz
  scan: true

light:
  - platform: esp32_rmt_led_strip
    id: ambient_strip
    name: "Ambient RGBW"
    internal: true
    pin: ${ambient_data_pin}
    num_leds: ${ambient_led_count}
    rgb_order: ${ambient_color_order}
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_OFF

number:
  - platform: template
    id: oled_contrast
    name: "Screen Brightness"
    min_value: 1
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    set_action:
      - lambda: |-
          id(oled_contrast).publish_state(x);
    on_value:
      then:
        - script.execute: apply_oled_contrast

  - platform: template
    # ESPHome rule: template numbers that use `lambda` cannot also use
    # `optimistic` or `restore_value` (schema validation error). Only use
    # those options when no `lambda` is defined.
    id: target_hue
    name: "Target Hue"
    min_value: 0
    max_value: 360
    step: 3
    set_action:
      - lambda: |-
          id(current_hue) = x;
          id(target_hue).publish_state(x);
      - script.execute: apply_target_hsb_debounced
    lambda: |-
      return id(current_hue);

  - platform: template
    id: target_sat
    name: "Target Saturation"
    min_value: 0
    max_value: 100
    step: 2
    set_action:
      - lambda: |-
          id(current_sat) = x;
          id(target_sat).publish_state(x);
      - script.execute: apply_target_hsb_debounced
    lambda: |-
      return id(current_sat);

  - platform: template
    id: target_bri
    name: "Target Brightness"
    min_value: 1
    max_value: 100
    step: 2
    set_action:
      - lambda: |-
          id(current_bri) = x;
          id(target_bri).publish_state(x);
      - script.execute: apply_target_hsb_debounced
    lambda: |-
      return id(current_bri);

  - platform: template
    id: audio_volume
    name: "Audio Volume"
    min_value: 0
    max_value: 100
    step: 1
    set_action:
      - script.execute:
          id: set_audio_volume_throttled
          volume_pct: !lambda 'return x;'
    lambda: |-
      if (id(audio_volume_level).has_state()) {
        return id(audio_volume_level).state * 100.0f;
      }
      return 0.0f;

font:
  - file: "gfonts://Roboto"
    id: font_menu
    size: 11
  - file: "gfonts://Roboto"
    id: font_small
    size: 8
  - file: "gfonts://Material Symbols Rounded"
    id: font_icons
    size: 16
    glyphs:
      - "\uE037" # play_arrow
      - "\uE034" # pause
      - "\uE044" # skip_next
      - "\uE045" # skip_previous

