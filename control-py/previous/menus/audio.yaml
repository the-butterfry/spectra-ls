# Description: Legacy Audio menu definition (Control Board v1).
# Version: 2026.03.09
# Last updated: 2026-03-09
# Update version/date whenever you change this file.
type: menu
text: "Audio"
on_enter:
  then:
    - lambda: |-
        id(audio_mode) = true;
        id(last_input_ms) = millis();
        id(audio_slider_pickup) = true;
        id(audio_slider_armed) = false;
        float pct = id(brightness_slider).has_state() ? id(brightness_slider).state : -1.0f;
        id(audio_slider_entry_pct) = pct;
        if (pct >= 0.0f) {
          id(last_slider_pct_audio) = pct;
          id(audio_slider_changed) = false;
        }
on_leave:
  then:
    - lambda: |-
        id(audio_mode) = false;
        id(audio_slider_armed) = false;
        id(audio_slider_entry_pct) = -1.0f;
items:
  - type: back
    text: "Back"
  - type: command
    text: "Now Playing"
    on_value:
      then:
        - script.execute: show_audio_controls
  - type: menu
    text: "Input"
    items:
      - type: back
        text: "Back"
      - type: command
        text: "Wifi"
        on_value:
          then:
            - homeassistant.service:
                service: media_player.select_source
                data:
                  entity_id: ${audio_player_wiim}
                  source: "Wifi"
            - display_menu.left: main_menu
      - type: command
        text: "Bluetooth"
        on_value:
          then:
            - homeassistant.service:
                service: media_player.select_source
                data:
                  entity_id: ${audio_player_wiim}
                  source: "Bluetooth"
            - display_menu.left: main_menu
