# Description: Service definitions for Spectra LS Phase 2/3 diagnostics, Phase 4 Slice-01/Slice-03 diagnostics scaffolding, Phase 5 metadata trial contract, and Phase 6/8 control-center settings, fast-remap presets, and execution.
# Version: 2026.04.22.13
# Last updated: 2026-04-22

execute_control_center_input:
  name: Execute control-center input
  description: Execute one mapped control-center input event with dry-run-first safety semantics.
  fields:
    input_event:
      name: Input event
      description: Input event key (encoder/button) to execute.
      required: true
      selector:
        select:
          options:
            - encoder_turn
            - encoder_press
            - encoder_long_press
            - button_1
            - button_2
            - button_3
            - button_4
    dry_run:
      name: Dry run
      description: Keep true to validate mapping execution without calling runtime write services.
      required: false
      selector:
        boolean:
    target_hint:
      name: Target hint
      description: Optional target hint for diagnostics and future dispatch policies.
      required: false
      selector:
        text:
    delta:
      name: Delta
      description: Optional numeric delta for encoder turn events.
      required: false
      selector:
        number:
          min: -100
          max: 100
          step: 1
    correlation_id:
      name: Correlation ID
      description: Optional correlation tag for this execution attempt.
      required: false
      selector:
        text:

set_control_center_settings:
  name: Set control-center settings
  description: Update Phase-6 control-center mappings for encoder and button scene bindings.
  fields:
    mapping_preset:
      name: Mapping preset
      description: Quick remap preset (`media_default`, `scene_focus`, `target_navigation`, `custom`).
      required: false
      selector:
        select:
          options:
            - media_default
            - scene_focus
            - target_navigation
            - custom
    read_only_mode:
      name: Read-only mode
      description: Keep true to preserve read-only-first posture while staging mappings.
      required: false
      selector:
        boolean:
    encoder_turn_action:
      name: Encoder turn action
      description: Action mapping for encoder rotation.
      required: false
      selector:
        select:
          options:
            - volume
            - brightness
            - target_cycle
            - source_cycle
    encoder_press_action:
      name: Encoder press action
      description: Action mapping for encoder press.
      required: false
      selector:
        select:
          options:
            - play_pause
            - mute_toggle
            - scene_quick_trigger
            - no_op
    encoder_long_press_action:
      name: Encoder long-press action
      description: Action mapping for encoder long-press.
      required: false
      selector:
        select:
          options:
            - play_pause
            - mute_toggle
            - scene_quick_trigger
            - no_op
    button_1_scene:
      name: Button 1 scene
      description: Scene entity ID bound to button 1 (e.g., `scene.living_room_evening`).
      required: false
      selector:
        text:
    button_2_scene:
      name: Button 2 scene
      description: Scene entity ID bound to button 2.
      required: false
      selector:
        text:
    button_3_scene:
      name: Button 3 scene
      description: Scene entity ID bound to button 3.
      required: false
      selector:
        text:
    button_4_scene:
      name: Button 4 scene
      description: Scene entity ID bound to button 4.
      required: false
      selector:
        text:

rebuild_registry:
  name: Rebuild registry
  description: Refresh the Spectra LS normalized target registry snapshot.

validate_contracts:
  name: Validate contracts
  description: Validate presence of required legacy contract entities and refresh diagnostics snapshot.

dump_route_trace:
  name: Dump route trace
  description: Refresh and expose the latest read-only route-trace decision in diagnostics.

set_write_authority:
  name: Set write authority
  description: Set single-writer authority mode for guarded routing write trials (`legacy` or `component`).
  fields:
    mode:
      name: Authority mode
      description: Write authority mode (`legacy` blocks component writes, `component` enables guarded write trials).
      required: true
      selector:
        select:
          options:
            - legacy
            - component
    reason:
      name: Reason
      description: Optional operator note for auditability in write-control diagnostics.
      example: "Enable P3-S01 trial"
      required: false
      selector:
        text:

route_write_trial:
  name: Route write trial
  description: Execute one guarded P3-S01 routing write attempt using current route-trace output.
  fields:
    correlation_id:
      name: Correlation ID
      description: Optional correlation tag for tracing a specific trial attempt.
      required: false
      selector:
        text:
    force:
      name: Force
      description: If enabled, bypass debounce/reentrancy soft guards for an explicit operator-forced attempt.
      required: false
      selector:
        boolean:

metadata_write_trial:
  name: Metadata write trial
  description: Execute a guarded P5-S02 metadata trial contract action with dry-run-first fail-closed semantics and audit payload emission.
  fields:
    mode:
      name: Requested mode
      description: Requested metadata authority mode (`legacy` or `component`) recorded in trial audit fields.
      required: true
      selector:
        select:
          options:
            - legacy
            - component
    window_id:
      name: Window ID
      description: Required bounded-window identifier for audit traceability.
      required: true
      selector:
        text:
    reason:
      name: Reason
      description: Required operator reason for trial request.
      required: true
      selector:
        text:
    dry_run:
      name: Dry run
      description: Keep true for mechanism-definition validation (default true).
      required: false
      selector:
        boolean:
    expected_target:
      name: Expected target
      description: Optional expected active target for fail-closed validation.
      required: false
      selector:
        text:
    expected_route:
      name: Expected route
      description: Optional expected route decision for fail-closed validation.
      required: false
      selector:
        text:
    correlation_id:
      name: Correlation ID
      description: Optional correlation tag for this metadata trial request.
      required: false
      selector:
        text:

run_p3_s01_sequence:
  name: Run P3-S01 sequence
  description: Run one-shot P3-S01 sequence (set authority, rebuild, validate contracts, refresh route trace, execute guarded write trial).
  fields:
    mode:
      name: Authority mode
      description: Authority mode to set before the sequence (`component` default for trial, `legacy` for baseline block behavior).
      required: false
      selector:
        select:
          options:
            - component
            - legacy
    reason:
      name: Reason
      description: Optional note captured with authority-change diagnostics.
      required: false
      selector:
        text:
    correlation_id:
      name: Correlation ID
      description: Optional correlation tag for the final guarded write attempt.
      required: false
      selector:
        text:
    force:
      name: Force
      description: If enabled, bypass debounce/reentrancy soft guards on the final guarded write attempt.
      required: false
      selector:
        boolean:

run_p3_s02_sequence:
  name: Run P3-S02 sequence
  description: Run one-shot P3-S02 selection-handoff validation sequence (authority set, rebuild, validate contracts, refresh route trace, optional guarded write trial, emit selection-handoff verdict).
  fields:
    mode:
      name: Authority mode
      description: Optional authority mode set before validation sequence (`component` default, `legacy` for baseline compatibility checks).
      required: false
      selector:
        select:
          options:
            - component
            - legacy
    reason:
      name: Reason
      description: Optional operator note captured with authority diagnostics.
      required: false
      selector:
        text:
    run_write_trial:
      name: Run write trial
      description: Optional; when enabled, execute one guarded `route_write_trial` before evaluating selection-handoff readiness.
      required: false
      selector:
        boolean:
    correlation_id:
      name: Correlation ID
      description: Optional correlation tag used only if write trial is enabled.
      required: false
      selector:
        text:
    force:
      name: Force
      description: Optional; bypass debounce/reentrancy soft guards only when write trial is enabled.
      required: false
      selector:
        boolean:

validate_metadata_prep:
  name: Validate metadata prep
  description: Refresh and expose Phase 3 Slice-03 metadata-preparation diagnostics in shadow attributes.

run_p3_s03_sequence:
  name: Run P3-S03 sequence
  description: Run one-shot P3-S03 diagnostics sequence (authority set, registry rebuild, contracts, route trace, handoff, metadata-prep validation).
  fields:
    mode:
      name: Authority mode
      description: Optional authority mode to capture in diagnostics (`legacy` default, `component` for explicit trial context).
      required: false
      selector:
        select:
          options:
            - legacy
            - component
    reason:
      name: Reason
      description: Optional operator note captured with authority diagnostics.
      required: false
      selector:
        text:

run_p5_s02_sequence:
  name: Run P5-S02 sequence
  description: Run one-shot P5-S02 bounded-window sequence (authority baseline, registry/contracts/route/handoff/metadata refresh, guarded metadata trial, post-trial metadata refresh).
  fields:
    mode:
      name: Authority mode
      description: Optional authority mode to set for the sequence (`legacy` default; keep legacy for baseline closeout-safe posture).
      required: false
      selector:
        select:
          options:
            - legacy
            - component
    window_id:
      name: Window ID
      description: Required bounded-window identifier for trial audit traceability.
      required: true
      selector:
        text:
    reason:
      name: Reason
      description: Optional operator note reused for authority-change and metadata-trial audit fields.
      required: false
      selector:
        text:
    dry_run:
      name: Dry run
      description: Keep true for mechanism-definition/gate-prep windows (default true).
      required: false
      selector:
        boolean:
    expected_target:
      name: Expected target
      description: Optional expected active target for fail-closed preflight validation.
      required: false
      selector:
        text:
    expected_route:
      name: Expected route
      description: Optional expected route decision for fail-closed preflight validation.
      required: false
      selector:
        text:
    correlation_id:
      name: Correlation ID
      description: Optional correlation tag for the metadata trial action within this sequence.
      required: false
      selector:
        text:

validate_capability_profile:
  name: Validate capability profile
  description: Refresh and expose Phase 4 Slice-01 capability-matrix and profile-schema diagnostics in shadow attributes.

run_f4_s01_sequence:
  name: Run F4-S01 sequence
  description: Run one-shot F4-S01 diagnostics sequence (authority set, registry/contracts/route/handoff/metadata refresh, capability-profile validation).
  fields:
    mode:
      name: Authority mode
      description: Optional authority mode to capture in diagnostics (`legacy` default; keep legacy for no-authority-expansion checks).
      required: false
      selector:
        select:
          options:
            - legacy
            - component
    reason:
      name: Reason
      description: Optional operator note captured with authority diagnostics.
      required: false
      selector:
        text:

validate_action_catalog:
  name: Validate action catalog
  description: Refresh and expose Phase 4 Slice-02 programmable action-catalog safety diagnostics in shadow attributes.

run_f4_s02_sequence:
  name: Run F4-S02 sequence
  description: Run one-shot F4-S02 diagnostics sequence (authority set, registry/contracts/route/handoff/metadata/capability refresh, action-catalog safety validation).
  fields:
    mode:
      name: Authority mode
      description: Optional authority mode to capture in diagnostics (`legacy` default; keep legacy for no-authority-expansion checks).
      required: false
      selector:
        select:
          options:
            - legacy
            - component
    reason:
      name: Reason
      description: Optional operator note captured with authority diagnostics.
      required: false
      selector:
        text:

validate_crossfade_balance:
  name: Validate crossfade balance
  description: Refresh and expose Phase 4 Slice-03 crossfade/balance contract diagnostics in shadow attributes.

run_f4_s03_sequence:
  name: Run F4-S03 sequence
  description: Run one-shot F4-S03 diagnostics sequence (authority set, registry/contracts/route/handoff/metadata/capability/action refresh, crossfade-balance validation).
  fields:
    mode:
      name: Authority mode
      description: Optional authority mode to capture in diagnostics (`legacy` default; keep legacy for no-authority-expansion checks).
      required: false
      selector:
        select:
          options:
            - legacy
            - component
    reason:
      name: Reason
      description: Optional operator note captured with authority diagnostics.
      required: false
      selector:
        text:
