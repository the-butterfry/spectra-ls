# Description: Hardware UART wiring + RP2040/Arylic hubs + raw ADC taps.
# Version: 2026.03.20.2
# Last updated: 2026-03-20
# Update version/date whenever you change this file.
#
# Sections:
#  - UART bus (ESP32 <-> RP2040)
#  - Device hub (rp2040_uart)
#  - Raw ADC taps (handled in lighting/audio packages)

# === UART bus (RP2040) ===
uart:
  - id: uart_rp2040
    tx_pin: ${rp2040_uart_tx}
    rx_pin: ${rp2040_uart_rx}
    baud_rate: 115200
    rx_buffer_size: 256

# === Device hub ===
rp2040_uart:
  id: rp2040_uart_hub
  uart_id: uart_rp2040

## Raw ADC taps are recorded in lighting/audio packages for input processing.
