    then:
      - lambda: |-
          std::string src = id(arylic_source).has_state() ? id(arylic_source).state.c_str() : "";
          std::string next = (src == "BT") ? "NET" : "BT";
          const bool tcp_ok = esphome::arylic_tcp::send_source("${arylic_tcp_host}", (uint16_t) ${arylic_tcp_port}, next);
          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "SRC send failed target=%s", next.c_str());
          }
          id(arylic_source_state) = next;

  - id: arylic_cycle_source
    mode: restart
    then:
      - lambda: |-
          auto split_csv = [](const std::string &input) {
            std::vector<std::string> out;
            std::string token;
            auto push_token = [&](std::string &value) {
              size_t start = value.find_first_not_of(" \t");
              size_t end = value.find_last_not_of(" \t");
              if (start == std::string::npos || end == std::string::npos) {
                value.clear();
                return;
              }
              value = value.substr(start, end - start + 1);
              if (!value.empty()) out.push_back(value);
              value.clear();
            };
            for (char c : input) {
              if (c == ',') {
                push_token(token);
              } else {
                token.push_back(c);
              }
            }
            push_token(token);
            return out;
          };

          std::vector<std::string> codes = split_csv("${arylic_source_cycle_codes}");
          if (codes.empty()) return;
          std::vector<std::string> labels = split_csv("${arylic_source_cycle_labels}");
          if (labels.size() != codes.size()) labels = codes;

          std::string current = id(arylic_source).has_state() ? id(arylic_source).state.c_str() : "";
          int idx = -1;
          for (size_t i = 0; i < codes.size(); i++) {
            if (codes[i] == current) {
              idx = (int) i;
              break;
            }
          }
          const int next = (idx < 0) ? 0 : ((idx + 1) % (int) codes.size());
          const std::string next_code = codes[next];
          const std::string next_label = (labels.size() > (size_t) next) ? labels[next] : next_code;

          const bool tcp_ok = esphome::arylic_tcp::send_source("${arylic_tcp_host}", (uint16_t) ${arylic_tcp_port}, next_code);
          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "SRC send failed target=%s", next_code.c_str());
          }
          id(arylic_source_state) = next_code;
          id(source_popup_label) = next_label;
          id(source_popup_until_ms) = millis() + ${source_popup_ms};

  - id: arylic_volume_delta
    mode: restart
    parameters:
      delta: int
    then:
      - lambda: |-
          if (delta == 0) return;
          ESP_LOGI("input", "Encoder Volume delta=%d", delta);
          int current = id(arylic_volume_cached);
          if (current < 0 && id(arylic_volume).has_state()) {
            current = (int) id(arylic_volume).state;
          }
          if (current < 0) return;
          int target = current + delta;
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          if (target < 0) target = 0;
          if (target > max_vol) target = max_vol;
          const uint32_t now = millis();
          const uint32_t min_interval = (uint32_t) (1000 / ${encoder_rate_limit_hz});
          id(audio_ring_active_until_ms) = now + ${ring_active_window_ms};
          if (now - id(arylic_last_vol_sent_ms) < min_interval) {
            id(arylic_volume_cached) = target;
            return;
          }
          std::string target_entity = id(np_active_target_entity);
          if (target_entity.empty() && id(ma_active_target).has_state() && !id(ma_active_target).state.empty()) {
            target_entity = id(ma_active_target).state.c_str();
          }
          if (target >= 5 && id(arylic_mute_state) && (now - id(ma_unmute_last_ms) > 1000)) {
            id(arylic_mute_state) = false;
            id(ma_unmute_last_ms) = now;
            if (!target_entity.empty()) {
              id(ma_unmute_entity) = target_entity;
              id(ma_unmute_pending) = true;
            }
          }
          const char *host = "${arylic_tcp_host}";
          uint16_t port = (uint16_t) ${arylic_tcp_port};
          if (!target_entity.empty()) {
            if (target_entity == std::string("${np_lr_target_entity}") ||
                target_entity == std::string("${ha_audio_player_3}") ||
                target_entity == std::string("${ha_audio_player_4}")) {
              host = "${arylic_lr_tcp_host}";
              port = (uint16_t) ${arylic_lr_tcp_port};
            }
          } else if (id(arylic_lr_playing_state)) {
            host = "${arylic_lr_tcp_host}";
            port = (uint16_t) ${arylic_lr_tcp_port};
          }
          const bool tcp_ok = esphome::arylic_tcp::send_volume(host, port, target);
          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "VOL send failed host=%s target=%d entity=%s", host, target, target_entity.c_str());
          }
          float ha_vol = (float) target / 100.0f;
          if (ha_vol < 0.0f) ha_vol = 0.0f;
          if (ha_vol > 1.0f) ha_vol = 1.0f;
          id(ma_vol_target) = target;
          id(ma_vol_target_f) = ha_vol;
          id(ma_vol_last_send_ms) = now;
          id(arylic_last_vol_sent_ms) = now;
          id(arylic_volume_cached) = target;
          id(ma_vol_pending) = true;

