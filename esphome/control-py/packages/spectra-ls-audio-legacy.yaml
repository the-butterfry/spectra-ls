number:
  - platform: template
    name: "Arylic Volume Set"
    id: arylic_volume_set
    internal: true
    unit_of_measurement: "%"
    min_value: ${audio_ui_min}
    max_value: ${audio_ui_max}
    step: 1
    update_interval: 500ms
    lambda: |-
      int actual = id(arylic_volume).has_state() ? (int) id(arylic_volume).state : (int) id(arylic_volume_cached);
      if (actual < 0) actual = 0;
      int max_vol = (int) ${audio_max_volume_pct};
      if (max_vol <= 0 || max_vol > 100) max_vol = 100;
      if (actual > max_vol) actual = max_vol;
      const int ui_min = ${audio_ui_min};
      const int ui_max = ${audio_ui_max};
      const int ui_span = ui_max - ui_min;
      if (ui_span <= 0 || max_vol <= 0) return (float) ui_min;
      const float ratio = (float) actual / (float) max_vol;
      int ui = ui_min + (int) (ratio * (float) ui_span + 0.5f);
      if (ui < ui_min) ui = ui_min;
      if (ui > ui_max) ui = ui_max;
      return (float) ui;
    set_action:
      - lambda: |-
          int ui = (int) x;
          const int ui_min = ${audio_ui_min};
          const int ui_max = ${audio_ui_max};
          if (ui < ui_min) ui = ui_min;
          if (ui > ui_max) ui = ui_max;
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          const int ui_span = ui_max - ui_min;
          float ratio = (ui_span > 0) ? ((float) (ui - ui_min) / (float) ui_span) : 0.0f;
          int target = (int) (ratio * (float) max_vol + 0.5f);
          if (target < 0) target = 0;
          if (target > max_vol) target = max_vol;
          id(arylic_volume_cached) = target;
          id(audio_ring_active_until_ms) = millis() + ${ring_active_window_ms};
          const uint32_t now = millis();
          float ha_vol = (float) target / 100.0f;
          if (ha_vol < 0.0f) ha_vol = 0.0f;
          if (ha_vol > 1.0f) ha_vol = 1.0f;
          id(ma_vol_target) = target;
          id(ma_vol_target_f) = ha_vol;
          id(ma_vol_last_send_ms) = now;
          id(arylic_last_vol_sent_ms) = now;
          id(ma_vol_pending) = true;

select:
  - platform: template
    name: "Arylic Source"
    id: arylic_source_select
    options:
      - "WiFi"
      - "Bluetooth"
      - "Line In 1"
      - "Line In 2"
      # Add more inputs later if you wire them (e.g., USB, USB DAC, Optical, Coax, I2S, HDMI)
    update_interval: 1s
    lambda: |-
      if (!id(arylic_source).has_state()) return std::string("WiFi");
      std::string src = id(arylic_source).state.c_str();
      if (src == "NET") return std::string("WiFi");
      if (src == "BT") return std::string("Bluetooth");
      if (src == "LINE-IN") return std::string("Line In 1");
      if (src == "LINE-IN2") return std::string("Line In 2");
      return std::string("WiFi");
    set_action:
      - lambda: |-
          std::string target;
          if (x == "WiFi") target = "NET";
          else if (x == "Bluetooth") target = "BT";
          else if (x == "Line In 1") target = "LINE-IN";
          else if (x == "Line In 2") target = "LINE-IN2";
          if (!target.empty()) {
            const bool tcp_ok = esphome::arylic_tcp::send_source("${arylic_tcp_host}", (uint16_t) ${arylic_tcp_port}, target);
            if (!tcp_ok) {
              ESP_LOGW("arylic_tcp", "SRC send failed target=%s", target.c_str());
            }
            id(arylic_source_state) = target;
          }

text_sensor:
  - platform: homeassistant
    id: ha_audio_position
    entity_id: sensor.ma_active_position
    internal: true
    on_value:
      - lambda: |-
          std::string s = x.c_str();
          if (s.empty()) return;
          std::string low;
          low.reserve(s.size());
          for (char ch : s) {
            if (ch >= 'A' && ch <= 'Z') low.push_back((char) (ch - 'A' + 'a'));
            else low.push_back(ch);
          }
          if (low == "unknown" || low == "unavailable" || low == "none") return;
          char *end = nullptr;
          float v = strtof(s.c_str(), &end);
          if (end == s.c_str()) return;
          id(ha_audio_pos_last_value) = v;
          id(ha_audio_pos_last_ms) = millis();
