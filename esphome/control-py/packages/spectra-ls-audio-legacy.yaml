sensor:
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: encoder
    sensor_id: 3
    name: "RP Volume Enc Delta"
    id: rp_volume_enc_delta
    internal: true
    accuracy_decimals: 0
    on_value:
      - script.execute:
          id: arylic_volume_delta
          delta: !lambda 'return (int) x;'
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 102
    name: "RP Volume Pot Raw"
    id: rp_volume_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          static uint32_t last_log = 0;
          static uint32_t last_send_log = 0;
          static int last_sent_target = -1;
          static uint32_t last_send_ms = 0;
          const uint32_t now = millis();
          if (id(menu_active)) {
            id(last_input_ms) = now;
          } else {
            id(screen_mode) = 1;
            id(audio_empty_active) = false;
            id(last_input_ms) = now;
          }
          float raw_pct = (float) x;
          if (raw_pct > 100.0f) raw_pct = (raw_pct / 65535.0f) * 100.0f;
          if (raw_pct < 0.0f) raw_pct = 0.0f;
          if (raw_pct > 100.0f) raw_pct = 100.0f;
          if (raw_pct <= 2.0f) raw_pct = 0.0f;
          if (raw_pct >= 98.0f) raw_pct = 100.0f;
          id(pot_volume_pct_cached) = (int) (raw_pct + 0.5f);
          id(pot_volume_pct_last_ms) = now;
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          int target = (int) (raw_pct * (float) max_vol / 100.0f + 0.5f);
          if (target < 0) target = 0;
          if (target > max_vol) target = max_vol;
                int current_vol = -1;
                if (id(arylic_volume).has_state()) {
                  current_vol = (int) id(arylic_volume).state;
                }
                if (current_vol < 0) {
                  float ha_vol = -1.0f;
                  if (id(ha_audio_volume).has_state()) {
                    ha_vol = id(ha_audio_volume).state * 100.0f;
                  } else if (id(ha_audio2_volume).has_state()) {
                    ha_vol = id(ha_audio2_volume).state * 100.0f;
                  } else if (id(ha_audio3_volume).has_state()) {
                    ha_vol = id(ha_audio3_volume).state * 100.0f;
                  } else if (id(ha_audio4_volume).has_state()) {
                    ha_vol = id(ha_audio4_volume).state * 100.0f;
                  } else if (id(ha_audio5_volume).has_state()) {
                    ha_vol = id(ha_audio5_volume).state * 100.0f;
                  } else if (id(ha_audio6_volume).has_state()) {
                    ha_vol = id(ha_audio6_volume).state * 100.0f;
                  }
                  if (ha_vol >= 0.0f && ha_vol <= 100.0f) {
                    current_vol = (int) (ha_vol + 0.5f);
                  } else if (ha_vol < 0.0f || ha_vol > 100.0f) {
                    if (now - last_send_log > 1000) {
                      ESP_LOGW("input", "MA volume out of range: %.1f (ignored)", ha_vol);
                      last_send_log = now;
                    }
                  }
                }
                if (current_vol < 0 && id(arylic_volume_cached) >= 0) {
                  current_vol = id(arylic_volume_cached);
                }
                if (current_vol >= 0) {
                  if (current_vol != id(pot_volume_catch_current)) {
                    id(pot_volume_catch_current) = current_vol;
                    id(pot_volume_catch_value) = current_vol;
                    id(pot_volume_catch_active) = false;
                    id(pot_volume_catch_complete) = false;
                  }
                  if (!id(pot_volume_catch_complete) && target > current_vol) {
                    id(pot_volume_catch_active) = true;
                    id(pot_volume_catch_value) = current_vol;
                  }
                  if (id(pot_volume_catch_active)) {
                    if (target <= id(pot_volume_catch_value)) {
                      id(pot_volume_catch_active) = false;
                      id(pot_volume_catch_complete) = true;
                    } else {
                      if (now - last_send_log > 500) {
                        ESP_LOGI("input", "Pot catch: target=%d > current=%d (hold)", target, id(pot_volume_catch_value));
                        last_send_log = now;
                      }
                      id(pot_volume_target) = target;
                      id(pot_volume_last_ms) = now;
                      return;
                    }
                  }
                }
                const uint32_t min_interval = (uint32_t) ${volume_pot_send_interval_ms};
                if (target == last_sent_target) return;
                if (now - last_send_ms < min_interval) return;
                last_send_ms = now;
                last_sent_target = target;
                const uint32_t idle_ms = now - id(last_input_ms);
                const uint32_t blank_ms = id(menu_active) ? (uint32_t) ${menu_blank_idle_ms} : (uint32_t) ${screensaver_idle_ms};
                bool screen_awake = (blank_ms == 0) || (idle_ms < blank_ms);
                const bool audio_wake_active = id(audio_wake_until_ms) > 0 && now < id(audio_wake_until_ms);
                if (audio_wake_active) screen_awake = true;
                if (id(playing_effective)) screen_awake = true;
                if (screen_awake) {
                  id(last_input_ms) = now;
                }
                if (now - last_log > 500) {
                  ESP_LOGI("input", "Volume pot raw=%d target=%d screen_awake=%d", (int) x, target, screen_awake ? 1 : 0);
                  last_log = now;
                }
                id(audio_ring_active_until_ms) = now + ${ring_active_window_ms};
                if (target != id(arylic_volume_cached) && screen_awake) {
                  id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
                }
                id(pot_volume_target) = target;
                id(pot_volume_last_ms) = now;
                if (now - last_send_log > 500) {
                  ESP_LOGI("input", "Pot send arylic VOL target=%d last_sent=%u now=%u", target,
                           (unsigned) id(arylic_last_vol_sent_ms), (unsigned) now);
                  last_send_log = now;
                }
                std::string target_entity = id(np_active_target_entity);
                if (target_entity.empty() && id(ma_active_target).has_state() && !id(ma_active_target).state.empty()) {
                  target_entity = id(ma_active_target).state.c_str();
                }
                if (target >= 5 && id(arylic_mute_state) && (now - id(ma_unmute_last_ms) > 1000)) {
                  id(arylic_mute_state) = false;
                  id(ma_unmute_last_ms) = now;
                  if (!target_entity.empty()) {
                    id(ma_unmute_entity) = target_entity;
                    id(ma_unmute_pending) = true;
                  }
                }
                const char *host = "${arylic_tcp_host}";
                uint16_t port = (uint16_t) ${arylic_tcp_port};
                if (!target_entity.empty()) {
                  if (target_entity == std::string("${np_lr_target_entity}") ||
                      target_entity == std::string("${ha_audio_player_3}") ||
                      target_entity == std::string("${ha_audio_player_4}")) {
                    host = "${arylic_lr_tcp_host}";
                    port = (uint16_t) ${arylic_lr_tcp_port};
                  }
                } else if (id(arylic_lr_playing_state)) {
                  host = "${arylic_lr_tcp_host}";
                  port = (uint16_t) ${arylic_lr_tcp_port};
                }
                const bool tcp_ok = esphome::arylic_tcp::send_volume(host, port, target);
                if (!tcp_ok) {
                  ESP_LOGW("arylic_tcp", "VOL send failed host=%s target=%d entity=%s", host, target, target_entity.c_str());
                }
                float ha_vol = (float) target / 100.0f;
                if (ha_vol < 0.0f) ha_vol = 0.0f;
                if (ha_vol > 1.0f) ha_vol = 1.0f;
                id(ma_vol_target) = target;
                id(ma_vol_target_f) = ha_vol;
                id(ma_vol_last_send_ms) = now;
                id(arylic_last_vol_sent_ms) = now;
                id(arylic_volume_cached) = target;
                id(pot_volume_deferred) = false;
                id(ma_vol_pending) = true;
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 104
    name: "RP EQ Low Pot Raw"
    id: rp_eq_low_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - if:
          condition:
            lambda: |-
              static int last_sent = 999;
              float pct = (float) x;
              if (pct < 0.0f) pct = 0.0f;
              if (pct > 100.0f) pct = 100.0f;
              float val = (pct / 100.0f) * 24.0f - 12.0f;
              int eq = (int) (val >= 0.0f ? (val + 0.5f) : (val - 0.5f));
              if (eq < -12) eq = -12;
              if (eq > 12) eq = 12;
              if (eq == last_sent) return false;
              last_sent = eq;
              id(eq_low_target) = eq;
              return true;
          then:
            - script.execute:
                id: arylic_set_bass
                target: !lambda 'return (int) id(eq_low_target);'
