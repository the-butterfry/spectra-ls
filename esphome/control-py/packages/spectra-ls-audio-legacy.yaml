interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: |-
              if (!id(np_active_target_dirty)) return false;
              if (id(np_active_target_entity).empty()) return false;
              const uint32_t now = millis();
              if (id(np_active_target_last_set_ms) > 0 && (now - id(np_active_target_last_set_ms)) < 1000) return false;
              return true;
          then:
            - homeassistant.service:
                service: input_select.select_option
                data:
                  entity_id: input_select.ma_active_target
                  option: !lambda 'return id(np_active_target_entity);'
            - homeassistant.service:
                service: input_boolean.turn_on
                data:
                  entity_id: input_boolean.ma_override_active
            - homeassistant.service:
                service: timer.start
                data:
                  entity_id: timer.ma_override_timeout
            - lambda: |-
                id(np_active_target_dirty) = false;
                id(np_active_target_last_set_ms) = millis();
  - interval: 200ms
    then:
      - lambda: |-
          if (!id(pot_volume_deferred)) return;
          const uint32_t now = millis();
          if (now < id(pot_volume_deferred_until_ms)) return;
          const int target = id(pot_volume_target);
          if (target < 0) {
            id(pot_volume_deferred) = false;
            return;
          }
          ESP_LOGI("input", "Pot deferred send MA VOL target=%d", target);
          std::string target_entity = id(np_active_target_entity);
          if (target_entity.empty() && id(ma_active_target).has_state() && !id(ma_active_target).state.empty()) {
            target_entity = id(ma_active_target).state.c_str();
          }
          if (target >= 5 && id(arylic_mute_state) && (now - id(ma_unmute_last_ms) > 1000)) {
            id(arylic_mute_state) = false;
            id(ma_unmute_last_ms) = now;
            if (!target_entity.empty()) {
              id(ma_unmute_entity) = target_entity;
              id(ma_unmute_pending) = true;
            }
          }
          const char *host = "${arylic_tcp_host}";
          uint16_t port = (uint16_t) ${arylic_tcp_port};
          if (!target_entity.empty()) {
            if (target_entity == std::string("${np_lr_target_entity}") ||
                target_entity == std::string("${ha_audio_player_3}") ||
                target_entity == std::string("${ha_audio_player_4}")) {
              host = "${arylic_lr_tcp_host}";
              port = (uint16_t) ${arylic_lr_tcp_port};
            }
          } else if (id(arylic_lr_playing_state)) {
            host = "${arylic_lr_tcp_host}";
            port = (uint16_t) ${arylic_lr_tcp_port};
          }
          const bool tcp_ok = esphome::arylic_tcp::send_volume(host, port, target);
          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "VOL send failed host=%s target=%d entity=%s", host, target, target_entity.c_str());
          }
          float ha_vol = (float) target / 100.0f;
          if (ha_vol < 0.0f) ha_vol = 0.0f;
          if (ha_vol > 1.0f) ha_vol = 1.0f;
          id(ma_vol_target) = target;
          id(ma_vol_target_f) = ha_vol;
          id(ma_vol_last_send_ms) = now;
          id(arylic_last_vol_sent_ms) = now;
          id(arylic_volume_cached) = target;
          id(pot_volume_deferred) = false;
          id(ma_vol_pending) = true;
  - interval: 150ms
    then:
      - if:
          condition:
            lambda: |-
              if (${volume_tcp_only}) {
                id(ma_unmute_pending) = false;
                id(ma_unmute_entity).clear();
                return false;
              }
              return id(ma_unmute_pending) && !id(ma_unmute_entity).empty();
          then:
            - homeassistant.service:
                service: media_player.volume_mute
                data:
                  entity_id: !lambda 'return id(ma_unmute_entity).c_str();'
                  is_volume_muted: "false"
            - lambda: |-
                id(ma_unmute_pending) = false;
                id(ma_unmute_entity).clear();
      - if:
          condition:
            lambda: |-
              if (!id(ma_vol_pending)) return false;
              if (${volume_tcp_only}) {
                id(ma_vol_pending) = false;
                return false;
              }
              return true;
          then:
            - if:
                condition:
                  lambda: |-
                    return !id(np_active_target_entity).empty();
                then:
                  - homeassistant.service:
                      service: media_player.volume_set
                      data:
                        entity_id: !lambda 'return id(np_active_target_entity).c_str();'
                        volume_level: !lambda 'return id(ma_vol_target_f);'
                else:
                  - homeassistant.service:
                      service: script.ma_set_volume
                      data:
                        volume: !lambda 'return id(ma_vol_target_f);'
            - lambda: |-
                id(ma_vol_pending) = false;
  - interval: ${ha_audio_refresh_ms}ms
    then:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: sensor.ma_active_title
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: sensor.ma_active_position
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: sensor.ma_active_state

script:
  - id: focus_audio
    mode: restart
    then:
      - lambda: |-
          id(screen_mode) = 1;
          id(lighting_adjust_mode) = 0;

  - id: meta_override_cycle
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          id(meta_override_idx) = -1;
          id(meta_override_last_change_ms) = now;
          id(meta_override_last_active_ms) = now;
          id(meta_popup_label) = "TARGET";
          id(meta_popup_until_ms) = now + ${meta_popup_ms};
          ESP_LOGI("meta", "cycle target (MA)");
      - homeassistant.service:
          service: script.ma_cycle_target
      - delay: 200ms
      - lambda: |-
          if (id(ma_active_friendly).has_state() && !id(ma_active_friendly).state.empty()) {
            id(meta_popup_label) = id(ma_active_friendly).state;
          }

  - id: arylic_set_volume
    mode: restart
    parameters:
      target: int
    then:
      - lambda: |-
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          int clamped = target;
          if (clamped < 0) clamped = 0;
          if (clamped > max_vol) clamped = max_vol;
          const uint32_t now = millis();
          std::string target_entity = id(np_active_target_entity);
          if (target_entity.empty() && id(ma_active_target).has_state() && !id(ma_active_target).state.empty()) {
            target_entity = id(ma_active_target).state.c_str();
          }
          if (clamped >= 5 && id(arylic_mute_state) && (now - id(ma_unmute_last_ms) > 1000)) {
            id(arylic_mute_state) = false;
            id(ma_unmute_last_ms) = now;
            if (!target_entity.empty()) {
              id(ma_unmute_entity) = target_entity;
              id(ma_unmute_pending) = true;
            }
          }
          const char *host = "${arylic_tcp_host}";
          uint16_t port = (uint16_t) ${arylic_tcp_port};
          if (!target_entity.empty()) {
            if (target_entity == std::string("${np_lr_target_entity}") ||
                target_entity == std::string("${ha_audio_player_3}") ||
                target_entity == std::string("${ha_audio_player_4}")) {
              host = "${arylic_lr_tcp_host}";
              port = (uint16_t) ${arylic_lr_tcp_port};
            }
          } else if (id(arylic_lr_playing_state)) {
            host = "${arylic_lr_tcp_host}";
            port = (uint16_t) ${arylic_lr_tcp_port};
          }
          const bool tcp_ok = esphome::arylic_tcp::send_volume(host, port, clamped);
          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "VOL send failed host=%s target=%d entity=%s", host, clamped, target_entity.c_str());
          }
          float ha_vol = (float) clamped / 100.0f;
          if (ha_vol < 0.0f) ha_vol = 0.0f;
          if (ha_vol > 1.0f) ha_vol = 1.0f;
          id(ma_vol_target) = clamped;
          id(ma_vol_target_f) = ha_vol;
          id(ma_vol_last_send_ms) = now;
          id(arylic_last_vol_sent_ms) = now;
          id(arylic_volume_cached) = clamped;
          id(ma_vol_pending) = true;

