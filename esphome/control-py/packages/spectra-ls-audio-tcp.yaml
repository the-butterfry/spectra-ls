              std::string target = id(ma_active_target).state.c_str();
              std::string t_low = target;
              for (auto &c : t_low) c = (char) ::tolower(c);
              if (!target.empty() && t_low != "unknown" && t_low != "unavailable" && t_low != "none") {
                target_ok = true;
              }
            }
            if (locked) {
              ESP_LOGW("ma", "control_hosts invalid (locked; keep last '%s')", id(arylic_control_hosts).c_str());
              return;
            }
            if (target_ok) {
              ESP_LOGW("ma", "control_hosts invalid (active target; keep last '%s')", id(arylic_control_hosts).c_str());
              return;
            }
            if (pending || recently_valid) {
              ESP_LOGW("ma", "control_hosts invalid (keep last '%s')", id(arylic_control_hosts).c_str());
              return;
            }
            id(arylic_control_hosts).clear();
            id(arylic_control_host).clear();
            ESP_LOGW("ma", "control_hosts cleared (invalid update '%s')", hosts.c_str());
            return;
          }
          id(arylic_control_hosts) = hosts;
          id(arylic_control_host) = hosts;
          id(arylic_control_hosts_last_valid_ms) = now;
          id(control_target_pending_until_ms) = 0;
          if (id(control_target_prompt_active) && !id(control_target_prompt_manual)) {
            const bool ambiguous = id(ma_control_ambiguous).has_state() && id(ma_control_ambiguous).state;
            if (!ambiguous) {
              id(control_target_prompt_active) = false;
              id(control_target_prompt_commit) = false;
              id(control_target_prompt_entity) = "";
              id(control_target_popup_active) = false;
              id(meta_popup_label) = "";
              id(meta_popup_until_ms) = 0;
