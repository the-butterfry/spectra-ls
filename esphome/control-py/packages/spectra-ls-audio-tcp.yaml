            const uint32_t hold_ms = 10000;
            const bool pending = id(control_target_pending_until_ms) > now;
            const bool recently_valid = id(arylic_control_hosts_last_valid_ms) > 0 && (now - id(arylic_control_hosts_last_valid_ms)) < hold_ms;
            const bool locked = id(control_target_prompt_blocked);
            bool target_ok = false;
