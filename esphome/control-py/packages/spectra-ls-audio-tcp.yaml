binary_sensor:
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 22
    name: "RP Volume Enc Press"
    id: rp_volume_enc_press
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Volume Enc Press");
      - script.execute: arylic_toggle_mute
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 32
    name: "RP Play Pause"
    id: rp_play_pause
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Play Pause");
      - script.execute: note_user_input
      - script.execute: focus_audio
      - script.execute: arylic_play_pause
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 33
    name: "RP Next"
    id: rp_next
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Next");
      - script.execute: note_user_input
      - script.execute: focus_audio
      - script.execute: arylic_next
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 34
    name: "RP Prev"
    id: rp_prev
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Prev");
      - script.execute: note_user_input
      - script.execute: focus_audio
      - script.execute: arylic_prev
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 35
    name: "RP Source Toggle"
    id: rp_source_toggle
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Source Toggle");
      - script.execute: note_user_input
      - script.execute: focus_audio
      - homeassistant.service:
          service: script.ma_cycle_target
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: ${meta_select_button_id}
    name: "RP Meta Select"
    id: rp_meta_select
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Meta Select");
      - script.execute: note_user_input
      - script.execute: focus_audio
      - script.execute: meta_override_cycle

  # Arylic state (kept with audio controls)
  - platform: template
    name: "Arylic Mute"
    id: arylic_mute
    internal: true
    lambda: |-
      return id(arylic_mute_state);
  - platform: template
    name: "Arylic Playing"
    id: arylic_playing
    internal: true
    lambda: |-
      return id(arylic_playing_state);
  - platform: homeassistant
    id: ma_control_ambiguous
    entity_id: binary_sensor.ma_control_ambiguous
    internal: true
    on_state:
      - lambda: |-
          const uint32_t now = millis();
          if (x) {
            id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
          }
          id(control_target_prompt_grace_until_ms) = now + ${control_target_prompt_grace_ms};
  - platform: template
    name: "HA AirPlay Active"
    id: ha_airplay_active
    internal: true
    lambda: |-
      std::string src;
      std::string app;
      if (id(ha_audio_source).has_state()) src = id(ha_audio_source).state.c_str();
      if (id(ha_audio_app).has_state()) app = id(ha_audio_app).state.c_str();
      if (src.empty() && app.empty()) return false;
      auto lower = [](std::string s) {
        for (auto &c : s) c = (char) ::tolower(c);
        return s;
      };
      src = lower(src);
      app = lower(app);
      const bool airplay = (src.find("airplay") != std::string::npos) || (app.find("airplay") != std::string::npos);
      return airplay;

sensor:
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: encoder
    sensor_id: 3
    name: "RP Volume Enc Delta"
    id: rp_volume_enc_delta
    internal: true
    accuracy_decimals: 0
    on_value:
      - script.execute:
          id: arylic_volume_delta
          delta: !lambda 'return (int) x;'
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 102
    name: "RP Volume Pot Raw"
    id: rp_volume_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:

      - lambda: |-
          id(adc_raw_2) = (int) x;
      - if:
          condition:
            lambda: |-
              return !id(calibration_active);
          then:
            - lambda: |-
                static uint32_t last_log = 0;

                static uint32_t last_send_log = 0;
                float pct = (float) x;
                if (pct > 100.0f) {

                  pct = (pct / 65535.0f) * 100.0f;
                }
                if (pct < 0.0f) pct = 0.0f;
                if (pct > 100.0f) pct = 100.0f;
                int max_vol = (int) ${audio_max_volume_pct};
                if (max_vol <= 0 || max_vol > 100) max_vol = 100;
                int target = (int) (pct * (float) max_vol / 100.0f + 0.5f);
                if (target < 0) target = 0;
                if (target > max_vol) target = max_vol;
                const uint32_t now = millis();
                id(np_disp_vol) = target;
                id(np_disp_vol_from_pot) = true;
                id(pot_volume_pct_cached) = (int) (pct + 0.5f);
                id(pot_volume_pct_last_ms) = now;
                const uint32_t idle_ms = now - id(last_input_ms);
                const uint32_t blank_ms = id(menu_active) ? (uint32_t) ${menu_blank_idle_ms} : (uint32_t) ${screensaver_idle_ms};
                bool screen_awake = (blank_ms == 0) || (idle_ms < blank_ms);
                const bool audio_wake_active = id(audio_wake_until_ms) > 0 && now < id(audio_wake_until_ms);
                if (audio_wake_active) screen_awake = true;
                auto state_is_playing = [](const std::string &s) {
                  std::string low = s;
                  for (auto &c : low) c = (char) ::tolower(c);
                  return low == "playing";
                };
                bool playing = id(arylic_playing).has_state() && id(arylic_playing).state;
                if (!playing && id(ha_audio_state).has_state() && state_is_playing(id(ha_audio_state).state.c_str())) {
                  playing = true;
                }
                if (playing) screen_awake = true;
                if (screen_awake) {
                  id(last_input_ms) = now;
                }
                if (now - last_log > 500) {
                  ESP_LOGI("input", "Volume pot raw=%d target=%d screen_awake=%d", (int) x, target, screen_awake ? 1 : 0);
                  last_log = now;
                }
                const uint32_t min_interval = (uint32_t) ${volume_pot_send_interval_ms};
                const uint32_t settle_ms = (uint32_t) ${volume_pot_settle_ms};
                const int jump_steps = (int) ${volume_pot_jump_steps};
                if (target != id(arylic_volume_cached) && screen_awake) {
                  id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
                }
                id(pot_volume_target) = target;
                id(pot_volume_last_ms) = now;
                if (target == id(arylic_last_vol_sent_target) && !id(pot_volume_deferred)) {
                  return;
                }
                const uint32_t next_interval_ms = id(arylic_last_vol_sent_ms) + min_interval;
                const uint32_t settle_ready_ms = id(pot_volume_last_ms) + settle_ms;
                const bool jump = (abs(target - id(arylic_last_vol_sent_target)) >= jump_steps);
                if (!jump && (now < next_interval_ms || now < settle_ready_ms)) {
                  if (now - last_send_log > 500) {
                    ESP_LOGI("input", "Pot defer arylic VOL target=%d last_sent=%u now=%u", target,
                             (unsigned) id(arylic_last_vol_sent_ms), (unsigned) now);
                    last_send_log = now;
                  }
                  id(arylic_volume_cached) = target;
                  id(pot_volume_deferred) = true;
                  id(pot_volume_deferred_until_ms) = (next_interval_ms > settle_ready_ms)
                                                    ? next_interval_ms
                                                    : settle_ready_ms;
                  return;
                }
                if (now < next_interval_ms) {
                  if (now - last_send_log > 500) {
                    ESP_LOGI("input", "Pot defer arylic VOL target=%d last_sent=%u now=%u", target,
                             (unsigned) id(arylic_last_vol_sent_ms), (unsigned) now);
                    last_send_log = now;
                  }
                  id(arylic_volume_cached) = target;
                  id(pot_volume_deferred) = true;
                  id(pot_volume_deferred_until_ms) = next_interval_ms;
                  return;
                }
                if (now - last_send_log > 500) {
                  ESP_LOGI("input", "Pot send arylic VOL target=%d last_sent=%u now=%u", target,
                           (unsigned) id(arylic_last_vol_sent_ms), (unsigned) now);
                  last_send_log = now;
                }
                const bool needs_prompt = id(control_target_needs_prompt);
                auto pick_hosts = [&]() -> std::string {
                  if (!id(arylic_control_hosts).empty()) return id(arylic_control_hosts);
                  if (!id(arylic_control_host).empty()) return id(arylic_control_host);
                  return std::string();
                };
                auto log_block = [&](const char *reason) {
                  static uint32_t last_log_ms = 0;
                  if (now - last_log_ms < 1000) return;
                  last_log_ms = now;
                  const bool ambiguous = id(ma_control_ambiguous).has_state() && id(ma_control_ambiguous).state;
                  ESP_LOGW("audio_gate", "pot blocked (%s) needs_prompt=%d hosts='%s' host='%s' amb=%d",
                           reason,
                           needs_prompt ? 1 : 0,
                           id(arylic_control_hosts).c_str(),
                           id(arylic_control_host).c_str(),
                           ambiguous ? 1 : 0);
                };
                if (needs_prompt) {
                  id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
                  log_block("prompt");
                  return;
                }
                const std::string hosts = pick_hosts();
                if (hosts.empty()) {
                  id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
                  log_block("no_hosts");
                  return;
                }
                const bool tcp_ok = esphome::arylic_tcp::send_volume_multi(hosts, (uint16_t) id(arylic_control_port), target);
                if (!tcp_ok && now - last_send_log > 500) {
                  ESP_LOGW("arylic_tcp", "VOL send failed target=%d", target);
                }
                id(arylic_last_vol_sent_ms) = now;
                id(arylic_last_vol_sent_target) = target;
                id(arylic_volume_cached) = target;
                id(pot_volume_deferred) = false;
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 104
    name: "RP EQ Bass Pot Raw"
    id: rp_eq_bass_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          id(adc_raw_0) = (int) x;
      - lambda: |-
          float pct = (float) x;
          if (pct > 100.0f) pct = (pct / 65535.0f) * 100.0f;
          if (pct < 0.0f) pct = 0.0f;
          if (pct > 100.0f) pct = 100.0f;
          const int eq_min = (int) ${eq_min};
          const int eq_max = (int) ${eq_max};
          const int span = eq_max - eq_min;
          const float target_f = (float) eq_min + (pct / 100.0f) * (float) span;
          int target = (int) ((target_f >= 0.0f) ? (target_f + 0.5f) : (target_f - 0.5f));
          if (target < eq_min) target = eq_min;
          if (target > eq_max) target = eq_max;
          const int last_target = id(arylic_eq_low_cached);
          if (target == last_target) return;
          id(note_user_input).execute();
          id(focus_audio).execute();
          const int delta = abs(target - last_target);
          const uint32_t now = millis();
          const uint32_t min_interval = (uint32_t) ${eq_pot_send_interval_ms};
          const uint32_t settle_ms = (uint32_t) ${eq_pot_settle_ms};
          const int jump_steps = (int) ${eq_pot_jump_steps};
          const uint32_t next_interval_ms = id(arylic_eq_low_last_sent_ms) + min_interval;
          id(arylic_eq_low_cached) = target;
          id(eq_low_target) = target;
          id(eq_low_last_change_ms) = now;
          const uint32_t settle_ready_ms = id(eq_low_last_change_ms) + settle_ms;
          const bool jump = (delta >= jump_steps);
          if (!jump && (now < next_interval_ms || now < settle_ready_ms)) {
            id(arylic_eq_low_deferred) = true;
            id(arylic_eq_low_deferred_until_ms) = (next_interval_ms > settle_ready_ms)
                                                  ? next_interval_ms
                                                  : settle_ready_ms;
            return;
          }
          if (now < next_interval_ms) {
            id(arylic_eq_low_deferred) = true;
            id(arylic_eq_low_deferred_until_ms) = next_interval_ms;
            return;
          }
          id(arylic_eq_low_last_sent_ms) = now;
          id(arylic_eq_low_deferred) = false;
          id(arylic_set_bass).execute(target);
