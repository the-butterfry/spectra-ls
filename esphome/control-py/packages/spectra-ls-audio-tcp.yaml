    internal: true
    on_value:
      - lambda: |-
          static std::string last;
          const std::string cur = x.c_str();
          if (cur == last) return;
          last = cur;
          const uint32_t now = millis();
          id(control_target_prompt_grace_until_ms) = now + ${control_target_prompt_grace_ms};
          if (cur == "unavailable" || cur == "unknown" || cur.empty()) {
            ESP_LOGW("ha_state", "ha_audio_state='%s'", cur.c_str());
          } else {
            ESP_LOGI("ha_state", "ha_audio_state='%s'", cur.c_str());
