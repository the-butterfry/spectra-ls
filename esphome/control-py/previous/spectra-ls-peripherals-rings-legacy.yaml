            }
          } else {
            if (has_meta2) meta_idx = 2;
            else if (has_meta3) meta_idx = 3;
            else if (has_meta4) meta_idx = 4;
            else if (has_meta5) meta_idx = 5;
            else if (has_meta6) meta_idx = 6;
            else if (slot1_active && (!app1.empty() || !source1.empty())) meta_idx = 1;
            else if (slot2_active && (!app2.empty() || !source2.empty())) meta_idx = 2;
            else if (slot3_active && (!app3.empty() || !source3.empty())) meta_idx = 3;
            else if (slot4_active && (!app4.empty() || !source4.empty())) meta_idx = 4;
            else if (slot5_active && (!app5.empty() || !source5.empty())) meta_idx = 5;
            else if (slot6_active && (!app6.empty() || !source6.empty())) meta_idx = 6;
          }
        }

        auto pick_text = [&](int idx, const std::string &v0, const std::string &v1, const std::string &v2,
                             const std::string &v3, const std::string &v4, const std::string &v5,
                             const std::string &v6) -> std::string {
          if (idx == 0) return v0;
          if (idx == 2) return v2;
          if (idx == 3) return v3;
          if (idx == 4) return v4;
          if (idx == 5) return v5;
          if (idx == 6) return v6;
          return v1;
        };

        const std::string app0 = ary_source;
        std::string title = pick_text(meta_idx, ary_title, title1, title2, title3, title4, title5, title6);
        std::string artist = pick_text(meta_idx, ary_artist, artist1, artist2, artist3, artist4, artist5, artist6);
        std::string album = pick_text(meta_idx, ary_album, album1, album2, album3, album4, album5, album6);
        std::string app_label = pick_text(meta_idx, app0, app1, app2, app3, app4, app5, app6);
        std::string source_raw = pick_text(meta_idx, ary_source, source1, source2, source3, source4, source5, source6);
        std::string source_label = source_raw.empty() ? src : source_raw;

        if (!any_active) {
          title.clear();
          artist.clear();
          album.clear();
        }

        if (title.empty()) {
          std::string source_hint = source_raw.empty() ? source_label : source_raw;
          if (!source_hint.empty()) {
            std::string low = source_hint;
            for (auto &c : low) c = (char) ::tolower(c);
            if (low.find("airplay") != std::string::npos) {
              title = "TV";
            }
          }
        }

        const bool has_app = !app_label.empty();
        if (source_label.empty() && has_app) {
          source_label = app_label;
        }
        if (!source_label.empty() && !has_app) {
          std::string low = source_label;
          for (auto &c : low) c = (char) ::tolower(c);
          if (low.find("airplay") != std::string::npos) source_label = "AIR";
          else if (low.find("bluetooth") != std::string::npos || low == "bt") source_label = "BT";
          else if (low.find("network") != std::string::npos || low.find("net") != std::string::npos) source_label = "NET";
        }
        if (source_label.empty()) source_label = "SRC";
        std::string source_pill = source_label;
        if (source_pill.size() > 6) source_pill = source_pill.substr(0, 6);
        std::string src_display = src;
        if (src_display.empty()) src_display = source_label;

        std::string log_title = sanitize_ascii(title);
        std::string log_artist = sanitize_ascii(artist);
        std::string log_album = sanitize_ascii(album);
        std::string log_source = sanitize_ascii(source_label);
        static int last_meta_idx = -2;
        static std::string last_meta_title;
        static std::string last_meta_artist;
        static std::string last_meta_album;
        static std::string last_meta_source;
        static uint32_t last_meta_log_ms = 0;
        if (meta_idx != last_meta_idx || log_title != last_meta_title || log_artist != last_meta_artist ||
            log_album != last_meta_album || log_source != last_meta_source) {
          if (now - last_meta_log_ms > 1000) {
            last_meta_idx = meta_idx;
            last_meta_title = log_title;
            last_meta_artist = log_artist;
            last_meta_album = log_album;
            last_meta_source = log_source;
            last_meta_log_ms = now;
            const char *pick = (meta_idx == 0) ? "arylic" : (meta_idx == 2) ? "ha2" : (meta_idx == 3) ? "ha3" :
                               (meta_idx == 4) ? "ha4" : (meta_idx == 5) ? "ha5" : (meta_idx == 6) ? "ha6" : "ha1";
            ESP_LOGI("meta",
                     "pick=%s forced=%d slots[ary=%d s1=%d s2=%d s3=%d s4=%d s5=%d s6=%d] t='%s' ar='%s' al='%s' src='%s'",
                     pick,
                     forced_meta ? 1 : 0,
                     arylic_allowed ? 1 : 0,
                     slot1_active ? 1 : 0,
                     slot2_active ? 1 : 0,
                     slot3_active ? 1 : 0,
                     slot4_active ? 1 : 0,
                     slot5_active ? 1 : 0,
                     slot6_active ? 1 : 0,
                     log_title.c_str(),
                     log_artist.c_str(),
                     log_album.c_str(),
                     log_source.c_str());
          }
        }
        if (source_label.empty()) source_label = "SRC";
        if (title.empty()) title = any_active ? "Now Playing" : "Idle";
        if (src_display.empty()) src_display = source_label;

        auto update_cached = [&](std::string &raw_store, std::string &cache_store, const std::string &incoming, bool upper) {
          if (raw_store == incoming) return false;
          raw_store = incoming;
          std::string sanitized = sanitize_ascii(incoming);
          if (upper) sanitized = to_upper_ascii(sanitized);
          cache_store = sanitized;
          return true;
        };
        bool cache_changed = false;
        cache_changed |= update_cached(id(np_raw_title), id(np_title_cached), title, false);
        cache_changed |= update_cached(id(np_raw_artist), id(np_artist_cached), artist, true);
        cache_changed |= update_cached(id(np_raw_album), id(np_album_cached), album, true);
        cache_changed |= update_cached(id(np_raw_source_label), id(np_source_label_cached), source_label, false);
        cache_changed |= update_cached(id(np_raw_source_pill), id(np_source_pill_cached), source_pill, false);
        cache_changed |= update_cached(id(np_raw_src_display), id(np_src_display_cached), src_display, false);
        if (cache_changed) {
          id(np_cache_version) += 1;
        }

        const std::string &title_cached = id(np_title_cached);
        const std::string &artist_cached = id(np_artist_cached);
        const std::string &album_cached = id(np_album_cached);

        const int title_h = ${now_playing_font_size};
        const int mid_h = ${now_playing_mid_font_size};
        const int sub_h = ${now_playing_small_font_size};
        const int title_y = 0;
        const int album_y = title_h + 9;
        const int artist_y = album_y + mid_h + 8;
        const int vol_bar_w = 4;
        const int vol_bar_x = w - vol_bar_w - 2;
        const int text_area_x = 0;
        const int text_area_w = vol_bar_x - text_area_x;
        const int vol_mask_x = text_area_x + text_area_w;
        const int title_band_h = title_h + 7;
        const int title_gap = ${scroll_gap_px} + 40;
        const int album_gap = ${scroll_gap_px} + 16;
        const int title_pad = 2;
        const int title_width = w - (title_pad * 2);

        const int title_text_w = (int) title_cached.size() * 8;
        const bool title_scrolls = title_text_w > title_width;
        const bool album_has = !album_cached.empty();
        const int album_width = text_area_w;
        const int album_text_w = (int) album_cached.size() * 8;
        const bool album_scrolls = album_has && album_text_w > album_width;

        const bool artist_has = !artist_cached.empty();
        const int char_w = 7;
        const int pad = 2;
        const int left_extra = 4;
        const int right_extra = 4;
        const int tip_w = 7;
        const int base_text_w = artist_has ? (int) artist_cached.size() * char_w : 0;
        const int text_w = base_text_w + left_extra + right_extra;
        const int rect_w = text_w + (pad * 2) + 6;
        const int total_w = rect_w + (tip_w * 2);
        const bool artist_scrolls = artist_has && total_w > text_area_w;

        const bool any_scroll = title_scrolls || album_scrolls || artist_scrolls;

        const int bar_h = 4;
        const int bar_y = h - bar_h;
        int max_vol = (int) ${audio_max_volume_pct};
        if (max_vol <= 0 || max_vol > 100) max_vol = 100;
        if (vol > max_vol) vol = max_vol;
        const int vol_bar_h = 26;
        int vol_bar_y = bar_y - vol_bar_h - 1;
        const int min_vol_bar_y = title_band_h + 2;
        if (vol_bar_y < min_vol_bar_y) vol_bar_y = min_vol_bar_y;
        const int inner_h = vol_bar_h - 2;
        int vol_fill = (int) ((vol / (float) max_vol) * inner_h + 0.5f);
        if (vol_fill < 0) vol_fill = 0;
        if (vol_fill > inner_h) vol_fill = inner_h;

        float duration = 0.0f;
        float pos = 0.0f;
        uint32_t pos_ms = 0;
        if (meta_idx == 0) {
          duration = ary_duration;
          pos = ary_pos;
          pos_ms = ary_pos_ms;
        } else if (meta_idx == 1) {
          duration = duration1;
          pos = pos1;
          pos_ms = pos1_ms;
        } else if (meta_idx == 2) {
          duration = duration2;
          pos = pos2;
          pos_ms = pos2_ms;
        } else if (meta_idx == 3) {
          duration = duration3;
          pos = pos3;
          pos_ms = pos3_ms;
        } else if (meta_idx == 4) {
          duration = duration4;
          pos = pos4;
          pos_ms = pos4_ms;
        } else if (meta_idx == 5) {
          duration = duration5;
          pos = pos5;
          pos_ms = pos5_ms;
        } else {
          duration = duration6;
          pos = pos6;
          pos_ms = pos6_ms;
        }
        int progress_filled = -1;
        const int bar_w = w - 4;
        const int bar_x = 2;
        if (duration > 0.5f && pos_ms > 0) {
          if (pos < 0.0f) pos = 0.0f;
          if (pos > duration) pos = duration;
          progress_filled = (int) ((pos / duration) * bar_w + 0.5f);
        }

        const bool screensaver_active_now = id(screensaver_active);
        const uint32_t cache_version = id(np_cache_version);
        const bool cache_changed_since_draw = cache_version != id(np_last_cache_version);
        const bool needs_redraw = cache_changed_since_draw || any_scroll ||
                                  vol_fill != id(np_last_vol_fill) ||
                                  progress_filled != id(np_last_progress_fill) ||
                                  playing != id(np_last_playing_drawn) ||
                screensaver_active_now != id(np_last_screensaver_drawn);
        if (!needs_redraw) return;

        it.fill(COLOR_OFF);
        it.filled_rectangle(0, title_y, w, title_band_h, COLOR_ON);
        if (!title_scrolls) {
          it.printf(w / 2, title_y, id(font_now), COLOR_OFF, TextAlign::TOP_CENTER, "%s", title_cached.c_str());
        } else {
          draw_scrolling_text(title_pad, title_y, title_width, title_cached, id(font_now), now, ${scroll_speed_ms}, 8, title_gap, COLOR_OFF, title_scroll_offset, title_scroll_last_ms);
        }
        if (album_has) {
          if (!album_scrolls) {
            it.printf(text_area_x + (album_width / 2), album_y, id(font_mid), COLOR_ON, TextAlign::TOP_CENTER, "%s", album_cached.c_str());
          } else {
            draw_scrolling_text(text_area_x, album_y, album_width, album_cached, id(font_mid), now, ${scroll_speed_ms}, 8, album_gap, COLOR_ON, album_scroll_offset, album_scroll_last_ms);
          }
        }
        if (artist_has) {
          const int box_h = sub_h + 8;
          const int box_y = artist_y + 1;
          const int text_y = artist_y + 2;
          if (!artist_scrolls) {
            artist_scroll_offset = 0;
            artist_scroll_last_ms = now;
            int box_x = text_area_x + (text_area_w - total_w) / 2;
            if (box_x < text_area_x) box_x = text_area_x;
            const int rect_x = box_x + tip_w;
            const int left_tip_x = rect_x - tip_w;
            const int right_base_x = rect_x + rect_w - 1;
            const int right_tip_x = right_base_x + tip_w;
            const int mid_y = box_y + (box_h / 2);
            const int bottom_y = box_y + box_h - 1;
            it.filled_triangle(rect_x, box_y, rect_x, bottom_y, left_tip_x, mid_y, COLOR_ON);
            it.filled_triangle(right_base_x, box_y, right_base_x, bottom_y, right_tip_x, mid_y, COLOR_ON);
            it.filled_rectangle(left_tip_x, mid_y, 1, 1, COLOR_OFF);
            it.filled_rectangle(right_tip_x, mid_y, 1, 1, COLOR_OFF);
            it.filled_rectangle(rect_x, box_y, rect_w, box_h, COLOR_ON);
            it.printf(rect_x + pad + left_extra, text_y, id(font_small), COLOR_OFF, "%s", artist_cached.c_str());
          } else {
            const int cycle = total_w + ${scroll_gap_px};
            int offset = 0;
            if (cycle > 0) {
              if (artist_scroll_offset >= cycle || artist_scroll_offset < 0) {
                artist_scroll_offset = artist_scroll_offset % cycle;
              }
              if (${scroll_speed_ms} > 0) {
                if (artist_scroll_last_ms == 0) artist_scroll_last_ms = now;
                const uint32_t elapsed = now - artist_scroll_last_ms;
                if (elapsed >= (uint32_t) ${scroll_speed_ms}) {
                  uint32_t steps = elapsed / (uint32_t) ${scroll_speed_ms};
                  if (steps > 1) steps = 1;
                  artist_scroll_offset = (artist_scroll_offset + (int) steps) % cycle;
                  artist_scroll_last_ms += steps * (uint32_t) ${scroll_speed_ms};
                }
                offset = artist_scroll_offset;
              }
            }
            const int left_edge1 = text_area_x - offset;
            const int left_edge2 = left_edge1 + cycle;
            const int rect_x1 = left_edge1 + tip_w;
            const int rect_x2 = left_edge2 + tip_w;
            const int mid_y = box_y + (box_h / 2);
            const int bottom_y = box_y + box_h - 1;
            it.filled_rectangle(rect_x1, box_y, rect_w, box_h, COLOR_ON);
            it.filled_rectangle(rect_x2, box_y, rect_w, box_h, COLOR_ON);
            it.filled_triangle(rect_x1, box_y, rect_x1, bottom_y, rect_x1 - tip_w, mid_y, COLOR_ON);
            it.filled_triangle(rect_x1 + rect_w - 1, box_y, rect_x1 + rect_w - 1, bottom_y, rect_x1 + rect_w - 1 + tip_w, mid_y, COLOR_ON);
            it.filled_triangle(rect_x2, box_y, rect_x2, bottom_y, rect_x2 - tip_w, mid_y, COLOR_ON);
            it.filled_triangle(rect_x2 + rect_w - 1, box_y, rect_x2 + rect_w - 1, bottom_y, rect_x2 + rect_w - 1 + tip_w, mid_y, COLOR_ON);
            it.filled_rectangle(rect_x1 - tip_w, mid_y, 1, 1, COLOR_OFF);
            it.filled_rectangle(rect_x1 + rect_w - 1 + tip_w, mid_y, 1, 1, COLOR_OFF);
            it.filled_rectangle(rect_x2 - tip_w, mid_y, 1, 1, COLOR_OFF);
            it.filled_rectangle(rect_x2 + rect_w - 1 + tip_w, mid_y, 1, 1, COLOR_OFF);
            it.printf(rect_x1 + pad + left_extra, text_y, id(font_small), COLOR_OFF, "%s", artist_cached.c_str());
            it.printf(rect_x2 + pad + left_extra, text_y, id(font_small), COLOR_OFF, "%s", artist_cached.c_str());
          }
          it.filled_rectangle(vol_mask_x, box_y, w - vol_mask_x, box_h, COLOR_OFF);
        }
        it.rectangle(vol_bar_x, vol_bar_y, vol_bar_w, vol_bar_h, COLOR_ON);
        if (vol_fill > 0) {
          const int fill_y = vol_bar_y + 1 + (inner_h - vol_fill);
          it.filled_rectangle(vol_bar_x + 1, fill_y, vol_bar_w - 2, vol_fill, COLOR_ON);
        }
        if (progress_filled >= 0) {
          it.rectangle(bar_x, bar_y, bar_w, bar_h, COLOR_ON);
          it.filled_rectangle(bar_x, bar_y, progress_filled, bar_h, COLOR_ON);
        }
        id(np_last_cache_version) = cache_version;
        id(np_last_vol_fill) = vol_fill;
        id(np_last_progress_fill) = progress_filled;
        id(np_last_playing_drawn) = playing;
        id(np_last_screensaver_drawn) = screensaver_active_now;
      };

      enum DisplayState {
        STATE_MENU = 0,
        STATE_NOW_PLAYING = 1,
        STATE_EQ = 2,
        STATE_LIGHTING = 3,
        STATE_SCREENSAVER = 4,
        STATE_BLANK = 5
      };

      const bool menu_active_now = id(menu_active);
      const uint32_t eq_overlay_ms = (uint32_t) ${eq_overlay_ms};
      const bool eq_recent_screen = eq_overlay_ms > 0 && (
        (id(eq_low_last_change_ms) > 0 && (now - id(eq_low_last_change_ms)) < eq_overlay_ms) ||
        (id(eq_mid_last_change_ms) > 0 && (now - id(eq_mid_last_change_ms)) < eq_overlay_ms) ||
        (id(eq_high_last_change_ms) > 0 && (now - id(eq_high_last_change_ms)) < eq_overlay_ms)
      );
      const bool now_playing_active = (id(screen_mode) == 1) && (playing || audio_wake_active);
      const bool lighting_active = (id(screen_mode) == 0) &&
                                   (now < id(brightness_active_until_ms) || now < id(audio_ring_active_until_ms));

      int display_state = STATE_BLANK;
      if (menu_active_now) display_state = STATE_MENU;
      else if (eq_recent_screen) display_state = STATE_EQ;
      else if (now_playing_active) display_state = STATE_NOW_PLAYING;
      else if (lighting_active) display_state = STATE_LIGHTING;
      else if (idle_ms > ${screensaver_idle_ms}) display_state = STATE_SCREENSAVER;

      id(screensaver_active) = (display_state == STATE_SCREENSAVER);

      if (display_state == STATE_BLANK || display_state == STATE_SCREENSAVER) {
        it.fill(COLOR_OFF);
        return;
      }
      if (display_state == STATE_EQ) {
        render_eq_screen();
        return;
      }
      if (display_state == STATE_NOW_PLAYING) {
        render_now_playing();
        return;
      }

      const int menu_h = ${menu_line_height};
      const int line2 = menu_h;
      const int line3 = menu_h * 2;
      const int line4 = menu_h * 3;

      if (display_state == STATE_MENU) {
        it.fill(COLOR_OFF);
        const char *menu_main[] = {"Lighting", "Audio"};
        const char *menu_lighting_rooms[] = {"${room_label_living}", "${room_label_dining}", "${room_label_kitchen}", "${room_label_bedroom}", "Back"};
        const char *menu_targets_living[] = {"All", "${target_label_star}", "${target_label_tube}", "${target_label_reading}", "Back"};
        const char *menu_targets_dining[] = {"All", "${target_label_chandelier}", "Back"};
        const char *menu_targets_kitchen[] = {"All", "${target_label_polaroid_clock}", "Back"};
        const char *menu_targets_bedroom[] = {"All", "${target_label_reading}", "Back"};
        const char *menu_adjust[] = {"Toggles", "Hue", "Saturation", "Back"};
        const char **items = menu_main;
        int count = 2;
        if (id(menu_level) == 5) { items = menu_lighting_rooms; count = 5; }
        else if (id(menu_level) == 6) {
          int room = id(menu_light_room);
          if (room < 0 || room > 3) room = 0;
          if (room == 0) { items = menu_targets_living; count = 5; }
          else if (room == 1) { items = menu_targets_dining; count = 3; }
          else if (room == 2) { items = menu_targets_kitchen; count = 3; }
          else { items = menu_targets_bedroom; count = 3; }
        }
        else if (id(menu_level) == 7) {
          const int count_adjust = 4;
          int idx_adjust = id(menu_index);
          if (idx_adjust < 0 || idx_adjust >= count_adjust) idx_adjust = 0;
          const int room = id(selected_room);
          const int target = id(selected_target);
          std::string target_label;
          if (target == 0) {
            if (room == 0) target_label = "${room_label_living}";
            else if (room == 1) target_label = "${room_label_dining}";
            else if (room == 2) target_label = "${room_label_kitchen}";
            else target_label = "${room_label_bedroom}";
          } else if (room == 0) {
            if (target == 1) target_label = "${target_label_star}";
            else if (target == 2) target_label = "${target_label_tube}";
            else if (target == 3) target_label = "${target_label_reading}";
          } else if (room == 1) {
            if (target == 1) target_label = "${target_label_chandelier}";
          } else if (room == 2) {
            if (target == 1) target_label = "${target_label_polaroid_clock}";
          } else if (room == 3) {
            if (target == 1) target_label = "${target_label_reading}";
          }
          if (target_label.empty()) target_label = "Light";
          std::string hue_label = "Hue ";
          hue_label += target_label;
          std::string sat_label = "Sat ";
          sat_label += target_label;
          const int list_h = ${menu_line_height_list};
          const int list_pad = ${menu_list_top_pad};
          const int highlight_extra = 3;
          const int list_step = list_h + highlight_extra;
          int max_visible = (h - list_pad - (list_h + highlight_extra)) / list_step + 1;
          if (max_visible < 1) max_visible = 1;
          int start = 0;
          if (count_adjust > max_visible) {
            if (idx_adjust >= start + max_visible) start = idx_adjust - max_visible + 1;
            if (idx_adjust < start) start = idx_adjust;
            if (start > (count_adjust - max_visible)) start = count_adjust - max_visible;
            if (start < 0) start = 0;
          }
          int row = 0;
          for (int i = start; i < count_adjust && row < max_visible; i++, row++) {
            const int y = list_pad + (row * list_step);
            const char *label = (i == 0) ? "Toggles" : (i == 1) ? hue_label.c_str() :
                                (i == 2) ? sat_label.c_str() : "Back";
            if (i == idx_adjust) {
              it.filled_rectangle(0, y, w, list_h + highlight_extra, COLOR_ON);
              it.printf(w / 2, y + 1, id(font_menu), COLOR_OFF, TextAlign::TOP_CENTER, "%s", label);
            } else {
              it.printf(w / 2, y + 1, id(font_menu), COLOR_ON, TextAlign::TOP_CENTER, "%s", label);
            }
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          return;
        }
        else if (id(menu_level) == 8) {
          const int room = id(selected_room);
          const int target = id(selected_target);
          const int count_toggle = (target == 0) ? 2 : 3;
          int idx_toggle = id(menu_index);
          if (idx_toggle < 0 || idx_toggle >= count_toggle) idx_toggle = 0;
          std::string room_label = (room == 0) ? "${room_label_living}" :
                                    (room == 1) ? "${room_label_dining}" :
                                    (room == 2) ? "${room_label_kitchen}" :
                                    "${room_label_bedroom}";
          std::string target_label;
          if (target == 0) {
            target_label = room_label;
          } else if (room == 0) {
            if (target == 1) target_label = "${target_label_star}";
            else if (target == 2) target_label = "${target_label_tube}";
            else if (target == 3) target_label = "${target_label_reading}";
          } else if (room == 1) {
            if (target == 1) target_label = "${target_label_chandelier}";
          } else if (room == 2) {
            if (target == 1) target_label = "${target_label_polaroid_clock}";
          } else if (room == 3) {
            if (target == 1) target_label = "${target_label_reading}";
          }
          if (target_label.empty()) target_label = "Light";

          bool room_has = false;
          bool room_on = false;
          if (room == 0 && id(living_room_group_on).has_state()) { room_has = true; room_on = id(living_room_group_on).state; }
          else if (room == 1 && id(dining_room_group_on).has_state()) { room_has = true; room_on = id(dining_room_group_on).state; }
          else if (room == 2 && id(kitchen_room_group_on).has_state()) { room_has = true; room_on = id(kitchen_room_group_on).state; }
          else if (room == 3 && id(bedroom_room_group_on).has_state()) { room_has = true; room_on = id(bedroom_room_group_on).state; }

          bool target_has = false;
          bool target_on = false;
          if (target == 0) {
            target_has = room_has;
            target_on = room_on;
          } else if (room == 0) {
            if (target == 1 && id(living_light_1_on).has_state()) { target_has = true; target_on = id(living_light_1_on).state; }
            else if (target == 2 && id(living_light_2_on).has_state()) { target_has = true; target_on = id(living_light_2_on).state; }
            else if (target == 3 && id(living_light_3_on).has_state()) { target_has = true; target_on = id(living_light_3_on).state; }
          } else if (room == 1) {
            if (target == 1 && id(dining_light_1_on).has_state()) { target_has = true; target_on = id(dining_light_1_on).state; }
          } else if (room == 2) {
            if (target == 1 && id(kitchen_light_1_on).has_state()) { target_has = true; target_on = id(kitchen_light_1_on).state; }
          } else if (room == 3) {
            if (target == 1 && id(bedroom_light_1_on).has_state()) { target_has = true; target_on = id(bedroom_light_1_on).state; }
          }

          std::string toggle_room = room_has ? (room_on ? "Off " : "On ") : "Toggle ";
          toggle_room += room_label;
          std::string toggle_target = target_has ? (target_on ? "Off " : "On ") : "Toggle ";
          toggle_target += target_label;
          const int list_h = ${menu_line_height_list};
          const int list_pad = ${menu_list_top_pad};
          const int highlight_extra = 3;
          const int list_step = list_h + highlight_extra;
          int max_visible = (h - list_pad - (list_h + highlight_extra)) / list_step + 1;
          if (max_visible < 1) max_visible = 1;
          int start = 0;
          if (count_toggle > max_visible) {
            if (idx_toggle >= start + max_visible) start = idx_toggle - max_visible + 1;
            if (idx_toggle < start) start = idx_toggle;
            if (start > (count_toggle - max_visible)) start = count_toggle - max_visible;
            if (start < 0) start = 0;
          }
          int row = 0;
          for (int i = start; i < count_toggle && row < max_visible; i++, row++) {
            const int y = list_pad + (row * list_step);
            const char *label = (i == 0) ? toggle_room.c_str() : (i == 1 && target != 0) ? toggle_target.c_str() : "Back";
            if (i == idx_toggle) {
              it.filled_rectangle(0, y, w, list_h + highlight_extra, COLOR_ON);
              it.printf(w / 2, y + 1, id(font_menu), COLOR_OFF, TextAlign::TOP_CENTER, "%s", label);
            } else {
              it.printf(w / 2, y + 1, id(font_menu), COLOR_ON, TextAlign::TOP_CENTER, "%s", label);
            }
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          return;
        }
        int idx = id(menu_index);
        if (idx < 0 || idx >= count) idx = 0;
        if (id(menu_level) == 1) {
          const int columns = 2;
          const int margin = ${menu_tile_margin};
          const int gap = ${menu_tile_gap};
          const int border = ${menu_tile_border};
          const int border_sel = ${menu_tile_border_selected};
          const int rows = (count + columns - 1) / columns;
          int tile_w = (w - (margin * 2) - gap) / columns;
          int tile_h = (h - (margin * 2) - (gap * (rows - 1))) / rows;
          if (tile_w < 8) tile_w = 8;
          if (tile_h < 8) tile_h = 8;

          auto draw_border = [&](int x, int y, int tw, int th, int thickness) {
            for (int t = 0; t < thickness; t++) {
              const int bw = tw - (t * 2);
              const int bh = th - (t * 2);
              if (bw <= 0 || bh <= 0) break;
              it.rectangle(x + t, y + t, bw, bh, COLOR_ON);
            }
          };

          const char *icon_light = "\uF02A";
          const char *icon_play_pause = "\uF137";
          const char *icon_settings = "\uE8B8";

          for (int i = 0; i < count; i++) {
            int row = i / columns;
            int col = i % columns;
            int tiles_in_row = columns;
            if ((count % columns) == 1 && row == (rows - 1)) {
              tiles_in_row = 1;
              col = 0;
            }
            const int row_w = (tile_w * tiles_in_row) + (gap * (tiles_in_row - 1));
            const int start_x = (w - row_w) / 2;
            const int x = start_x + (col * (tile_w + gap));
            const int y = margin + (row * (tile_h + gap));
            draw_border(x, y, tile_w, tile_h, (i == idx) ? border_sel : border);
            const int cx = x + (tile_w / 2);
            const int cy = y + (tile_h / 2);
            const bool is_play = i == 1;
            const char *icon = (i == 0) ? icon_light : is_play ? icon_play_pause : icon_settings;
            it.printf(cx, cy, is_play ? id(font_tile_icon_play) : id(font_tile_icon), COLOR_ON, TextAlign::CENTER, "%s", icon);
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          return;
        }
        const int list_h = ${menu_line_height_list};
        const int list_pad = ${menu_list_top_pad};
        const int highlight_extra = 3;
        const int list_step = list_h + highlight_extra;
        int max_visible = (h - list_pad - (list_h + highlight_extra)) / list_step + 1;
        if (max_visible < 1) max_visible = 1;
        int start = 0;
        if (count > max_visible) {
          if (idx >= start + max_visible) start = idx - max_visible + 1;
          if (idx < start) start = idx;
          if (start > (count - max_visible)) start = count - max_visible;
          if (start < 0) start = 0;
        }
        int row = 0;
        for (int i = start; i < count && row < max_visible; i++, row++) {
          const int y = list_pad + (row * list_step);
          if (i == idx) {
            it.filled_rectangle(0, y, w, list_h + highlight_extra, COLOR_ON);
            it.printf(w / 2, y + 1, id(font_menu), COLOR_OFF, TextAlign::TOP_CENTER, "%s", items[i]);
          } else {
            it.printf(w / 2, y + 1, id(font_menu), COLOR_ON, TextAlign::TOP_CENTER, "%s", items[i]);
          }
        }
        if (${menu_debug}) {
          it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
        }
        return;
      }

      if (display_state == STATE_LIGHTING) {
        it.fill(COLOR_OFF);
        const int room = id(selected_room);
        const int target = id(selected_target);
        const char *room_label = (room == 0) ? "${room_label_living}" :
                                 (room == 1) ? "${room_label_dining}" :
                                 (room == 2) ? "${room_label_kitchen}" :
                                 "${room_label_bedroom}";
        const char *target_label = room_label;
        if (target != 0) {
          if (room == 0) {
            if (target == 1) target_label = "${target_label_star}";
            else if (target == 2) target_label = "${target_label_tube}";
            else if (target == 3) target_label = "${target_label_reading}";
          } else if (room == 1) {
            if (target == 1) target_label = "${target_label_chandelier}";
          } else if (room == 2) {
            if (target == 1) target_label = "${target_label_polaroid_clock}";
          } else if (room == 3) {
            if (target == 1) target_label = "${target_label_reading}";
          }
        }
        const int adjust_mode = id(lighting_adjust_mode);
        const char *mode_label = (adjust_mode == 3) ? "Brightness" : (id(lighting_mode_hue) ? "Hue" : "Saturation");
        it.printf(w / 2, 0, id(font_menu), TextAlign::TOP_CENTER, "%s", target_label);
        it.printf(w / 2, line2, id(font_menu), TextAlign::TOP_CENTER, "%s", mode_label);

        if (now < id(brightness_active_until_ms)) {
          const float pct = id(lighting_brightness);
          const int bar_w = w - 4;
          const int bar_h = 8;
          const int filled = (int) ((pct / 100.0f) * bar_w);
          it.rectangle(2, line3, bar_w, bar_h, COLOR_ON);
          it.filled_rectangle(2, line3, filled, bar_h, COLOR_ON);
          it.printf(0, line4, id(font_menu), "Bri: %d%%", (int) pct);
        }
        if (now < id(audio_ring_active_until_ms)) {
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          int vol_clamped = vol;
          if (vol_clamped > max_vol) vol_clamped = max_vol;
          const int meter_w = 5;
          const int meter_h = 22;
          const int meter_x = w - meter_w - 1;
          const int meter_y = h - meter_h - 1;
          const int inner_h = meter_h - 2;
          int fill = (int) ((vol_clamped / (float) max_vol) * inner_h + 0.5f);
          if (fill < 0) fill = 0;
          if (fill > inner_h) fill = inner_h;
          it.rectangle(meter_x, meter_y, meter_w, meter_h, COLOR_ON);
          if (fill > 0) {
            const int fill_y = meter_y + 1 + (inner_h - fill);
            it.filled_rectangle(meter_x + 1, fill_y, meter_w - 2, fill, COLOR_ON);
          }
        }
        if (${menu_debug}) {
          it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
        }
        return;
      }

      if (display_state == STATE_NOW_PLAYING) {
        render_now_playing();
        return;
      }

      it.fill(COLOR_OFF);
      it.printf(0, 0, id(font_menu), "${friendly_name}");
      it.printf(0, line2, id(font_menu), "Src: %s", src.c_str());
      it.printf(0, line3, id(font_menu), "%s", playing ? "Playing" : "Idle");
      if (${menu_debug}) {
        it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
      }
