      auto render_eq_screen = [&]() {
        const int eq_low = id(eq_low_target);
        const int eq_mid = id(eq_mid_target);
        const int eq_high = id(eq_high_target);
        const int eq_min = (int) ${eq_min};
        const int eq_max = (int) ${eq_max};
        int max_abs = eq_max;
        if (max_abs < 0) max_abs = -max_abs;
        int min_abs = eq_min;
        if (min_abs < 0) min_abs = -min_abs;
        if (min_abs > max_abs) max_abs = min_abs;
        if (max_abs <= 0) max_abs = 1;

        it.fill(COLOR_OFF);

        const int bar_top = 2;
        const int label_y = h - 8;
        int bar_bottom = label_y - 2;
        if (bar_bottom <= bar_top + 6) bar_bottom = h - 12;
        if (bar_bottom <= bar_top + 6) bar_bottom = h - 1;
        const int bar_h = bar_bottom - bar_top;
        if (bar_h <= 0) return;

        int margin = 8;
        const int gap = 6;
        int bar_w = (w - (margin * 2) - (gap * 2)) / 3;
        if (bar_w < 6) {
          bar_w = 6;
          margin = (w - (bar_w * 3) - (gap * 2)) / 2;
          if (margin < 2) margin = 2;
        }
        const int x0 = margin;
        const int x1 = x0 + bar_w + gap;
        const int x2 = x1 + bar_w + gap;
        const int mid_y = bar_top + (bar_h / 2);
        const int half_h = bar_h / 2;

        auto draw_band = [&](int x, int value, const char *label) {
          it.rectangle(x, bar_top, bar_w, bar_h, COLOR_ON);
          it.filled_rectangle(x, mid_y, bar_w, 1, COLOR_ON);
          int val = value;
          if (val > max_abs) val = max_abs;
          if (val < -max_abs) val = -max_abs;
          float pct = (max_abs > 0) ? (val / (float) max_abs) : 0.0f;
          int fill = (int) (fabsf(pct) * half_h + 0.5f);
          if (fill > 0) {
            if (pct >= 0.0f) {
              it.filled_rectangle(x + 1, mid_y - fill, bar_w - 2, fill, COLOR_ON);
            } else {
              it.filled_rectangle(x + 1, mid_y + 1, bar_w - 2, fill, COLOR_ON);
            }
          }
          it.printf(x + (bar_w / 2), label_y, id(font_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", label);
        };

        draw_band(x0, eq_low, "L");
        draw_band(x1, eq_mid, "M");
        draw_band(x2, eq_high, "H");
      };

