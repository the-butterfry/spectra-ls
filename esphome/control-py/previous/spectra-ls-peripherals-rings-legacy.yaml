# Description: Spectra LS archived OLED + LED rings peripherals package for Control Board v2.
# Version: 2026.04.16.1
# Last updated: 2026-04-16
# Update version/date whenever you change this file.
substitutions:
  # Defaults (override in main config as needed)
  boot_fade_ms: "2000"
  menu_line_height: "10"
  menu_line_height_list: "12"
  menu_list_top_pad: "1"
  menu_blank_idle_ms: "10000"
  menu_home_idle_ms: "30000"
  audio_empty_duration_ms: "5000"
  menu_debug: "false"
  menu_debug_label: "MENU"
  now_playing_mid_font_size: "9"
  menu_tile_margin: "4"
  menu_tile_gap: "4"
  menu_tile_border: "1"
  menu_tile_border_selected: "2"
  menu_tile_icon_pad: "4"
  menu_tile_icon_font_size: "18"
  menu_tile_icon_play_font_size: "26"
  menu_tile_icon_stroke: "2"
  meta_pos_stall_ms: "15000"
  meta_stale_ms: "45000"
  meta_end_tolerance_s: "2"
  meta_playing_grace_ms: "8000"
  eq_overlay_ms: "5000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    then:
      - light.turn_on:
          id: audio_ring
          effect: audio_ring_fx
      - light.turn_on:
          id: hue_ring
          effect: hue_ring_fx

i2c:
  sda: ${oled_sda_pin}
  scl: ${oled_scl_pin}
  frequency: 800kHz
  scan: true

font:
  - file: "${ui_font_file}"
    id: font_mid
    size: ${now_playing_mid_font_size}
  - file: "/config/esphome/control-py/mdi.ttf"
    id: font_tile_icon
    size: ${menu_tile_icon_font_size}
    glyphs:
      - "\uF02A"
      - "\uF137"
      - "\uE8B8"
  - file: "/config/esphome/control-py/mdi.ttf"
    id: font_tile_icon_play
    size: ${menu_tile_icon_play_font_size}
    glyphs:
      - "\uF137"

light:
  - platform: esp32_rmt_led_strip
    id: hue_ring
    name: "Hue Ring"
    internal: true
    rmt_channel: 0
    pin: ${hue_ring_pin}
    num_leds: ${hue_ring_led_count}
    rgb_order: GRB
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - addressable_lambda:
          name: hue_ring_fx
          update_interval: 50ms
          lambda: |-
            const int n = it.size();
            if (n <= 0) return;
            const uint32_t now = millis();
            const bool active = now < id(hue_ring_active_until_ms);
            float brightness = active ? ${hue_ring_active_brightness} : ${hue_ring_idle_brightness};
            if (${hue_ring_sleep_ms} > 0 && now > (id(hue_ring_active_until_ms) + ${hue_ring_sleep_ms})) {
              brightness = 0.0f;
            }
            float boot_factor = 1.0f;
            if (id(boot_fade_start_ms) > 0 && ${boot_fade_ms} > 0) {
              const uint32_t elapsed = (now >= id(boot_fade_start_ms)) ? (now - id(boot_fade_start_ms)) : 0;
              if (elapsed < (uint32_t) ${boot_fade_ms}) {
                boot_factor = (float) elapsed / (float) ${boot_fade_ms};
              }
            }
            brightness *= boot_factor;

            float hue = id(lighting_hue);
            float sat = id(lighting_sat) / 100.0f;
            if (sat < 0.0f) sat = 0.0f;
            if (sat > 1.0f) sat = 1.0f;
            const bool hue_mode = id(lighting_mode_hue);

            auto hsv_to_rgb = [](float h, float s, float v, uint8_t &r, uint8_t &g, uint8_t &b) {
              if (h < 0.0f) h += 360.0f;
              if (h >= 360.0f) h = fmodf(h, 360.0f);
              const float c = v * s;
              const float x = c * (1.0f - fabsf(fmodf(h / 60.0f, 2.0f) - 1.0f));
              const float m = v - c;
              float r1 = 0.0f, g1 = 0.0f, b1 = 0.0f;
              if (h < 60.0f) { r1 = c; g1 = x; b1 = 0.0f; }
              else if (h < 120.0f) { r1 = x; g1 = c; b1 = 0.0f; }
              else if (h < 180.0f) { r1 = 0.0f; g1 = c; b1 = x; }
              else if (h < 240.0f) { r1 = 0.0f; g1 = x; b1 = c; }
              else if (h < 300.0f) { r1 = x; g1 = 0.0f; b1 = c; }
              else { r1 = c; g1 = 0.0f; b1 = x; }
              r = (uint8_t) ((r1 + m) * 255.0f);
              g = (uint8_t) ((g1 + m) * 255.0f);
              b = (uint8_t) ((b1 + m) * 255.0f);
            };

            if (hue_mode) {
              const float step = 360.0f / (float) n;
              for (int i = 0; i < n; i++) {
                const float h = hue + (step * i);
                uint8_t r = 0, g = 0, b = 0;
                hsv_to_rgb(h, 1.0f, brightness, r, g, b);
                it[i] = Color(r, g, b);
              }
            } else {
              uint8_t r = 0, g = 0, b = 0;
              hsv_to_rgb(hue, sat, brightness, r, g, b);
              for (int i = 0; i < n; i++) {
                it[i] = Color(r, g, b);
              }
            }

  - platform: esp32_rmt_led_strip
    id: audio_ring
    name: "Audio Ring"
    internal: true
    rmt_channel: 1
    pin: ${audio_ring_pin}
    num_leds: ${audio_ring_led_count}
    rgb_order: GRB
    chipset: WS2812
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - addressable_lambda:
          name: audio_ring_fx
          update_interval: 50ms
          lambda: |-
            const int n = it.size();
            if (n <= 0) return;
            const uint32_t now = millis();
            const bool active = now < id(audio_ring_active_until_ms);
            float brightness = active ? ${audio_ring_active_brightness} : ${audio_ring_idle_brightness};
            if (${audio_ring_sleep_ms} > 0 && now > (id(audio_ring_active_until_ms) + ${audio_ring_sleep_ms})) {
              brightness = 0.0f;
            }
            float boot_factor = 1.0f;
            if (id(boot_fade_start_ms) > 0 && ${boot_fade_ms} > 0) {
              const uint32_t elapsed = (now >= id(boot_fade_start_ms)) ? (now - id(boot_fade_start_ms)) : 0;
              if (elapsed < (uint32_t) ${boot_fade_ms}) {
                boot_factor = (float) elapsed / (float) ${boot_fade_ms};
              }
            }
            brightness *= boot_factor;

            float volume = -1.0f;
            if (id(arylic_volume).has_state()) {
              volume = id(arylic_volume).state;
            }
            if (volume < 0.0f) {
              volume = (float) id(arylic_volume_cached);
            }
            if (volume < 0.0f) volume = 0.0f;
            int max_vol = (int) ${audio_max_volume_pct};
            if (max_vol <= 0 || max_vol > 100) max_vol = 100;
            if (volume > (float) max_vol) volume = (float) max_vol;

            const float denom = (max_vol > 0) ? (float) max_vol : 100.0f;
            const int lit = (int) ((volume / denom) * n + 0.5f);
            const uint8_t r = (uint8_t) (255.0f * brightness);
            const uint8_t g = r;
            const uint8_t b = r;
            for (int i = 0; i < n; i++) {
              if (i < lit) {
                it[i] = Color(r, g, b);
              } else {
                it[i] = Color(0, 0, 0);
              }
            }

display:
  - platform: ssd1306_i2c
    id: oled_display
    model: ${oled_model}
    address: ${oled_address}
    rotation: 0
    update_interval: ${scroll_speed_ms}ms
    lambda: |-
      const int w = it.get_width();
      const int h = it.get_height();
      const uint32_t now = millis();
      static int title_scroll_offset = 0;
      static uint32_t title_scroll_last_ms = 0;
      static int album_scroll_offset = 0;
      static uint32_t album_scroll_last_ms = 0;
      static int artist_scroll_offset = 0;
      static uint32_t artist_scroll_last_ms = 0;
      auto sanitize_ascii = [](const std::string &input) {
        std::string out;
        out.reserve(input.size());
        for (uint8_t ch : input) {
          if (ch >= 32 && ch < 127) {
            out.push_back((char) ch);
          } else if (ch == '\t' || ch == '\n' || ch == '\r') {
            out.push_back(' ');
          }
        }
        return out;
      };
      auto to_upper_ascii = [](const std::string &input) {
        std::string out;
        out.reserve(input.size());
        for (char ch : input) {
          if (ch >= 'a' && ch <= 'z') out.push_back((char) (ch - 32));
          else out.push_back(ch);
        }
        return out;
      };
      auto to_lower_ascii = [](const std::string &input) {
        std::string out;
        out.reserve(input.size());
        for (char ch : input) {
          if (ch >= 'A' && ch <= 'Z') out.push_back((char) (ch - 'A' + 'a'));
          else out.push_back(ch);
        }
        return out;
      };
      if (id(splash_until_ms) == 0) {
        id(splash_until_ms) = now + ${splash_duration_ms};
      }
      if (now < id(splash_until_ms)) {
        it.fill(COLOR_ON);
        const int title_h = ${splash_title_font_size};
        const int subtitle_h = ${splash_subtitle_font_size};
        const int symbol_h = ${splash_symbol_font_size};
        const int gap = 6;
        const int title_line_h = (title_h > symbol_h) ? title_h : symbol_h;
        const int subtitle_line_h = (subtitle_h > symbol_h) ? subtitle_h : symbol_h;
        int subtitle_y = h - subtitle_line_h - 2 + ${splash_subtitle_offset_px};
        if (subtitle_y < 0) subtitle_y = 0;
        int title_y = (h - title_line_h) / 2 - 2;
        if (title_y < 0) title_y = 0;
        const int symbol_gap = ${splash_symbol_gap_px};
        const int symbol_half_w = symbol_h / 3;
        const int center_x = w / 2;
        const int title_center_x = center_x + ${splash_title_offset_px};
        const int title_text_y = title_y + (title_line_h - title_h) / 2;
        const int subtitle_text_y = subtitle_y + (subtitle_line_h - subtitle_h) / 2;
        const int title_symbol_y = title_y + (title_line_h - symbol_h) / 2;
        const int subtitle_symbol_y = subtitle_y + (subtitle_line_h - symbol_h) / 2;
        const std::string splash_title_left = sanitize_ascii("${splash_title_left}");
        const std::string splash_title_right = sanitize_ascii("${splash_title_right}");
        const std::string splash_subtitle_left = sanitize_ascii("${splash_subtitle_left}");
        const std::string splash_subtitle_right = sanitize_ascii("${splash_subtitle_right}");

        const int title_left_x = title_center_x - symbol_gap - symbol_half_w;
        const int title_right_x = title_center_x + symbol_gap + symbol_half_w;
        it.printf(title_left_x, title_text_y, id(font_splash_title), COLOR_OFF, TextAlign::TOP_RIGHT, "%s", splash_title_left.c_str());
        it.printf(title_right_x, title_text_y, id(font_splash_title), COLOR_OFF, TextAlign::TOP_LEFT, "%s", splash_title_right.c_str());
        it.printf(title_center_x, title_symbol_y, id(font_splash_symbol), COLOR_OFF, TextAlign::TOP_CENTER, "\\");

        const int subtitle_left_x = center_x - symbol_gap - symbol_half_w;
        const int subtitle_right_x = center_x + symbol_gap + symbol_half_w;
        it.printf(subtitle_left_x, subtitle_text_y, id(font_splash_subtitle), COLOR_OFF, TextAlign::TOP_RIGHT, "%s", splash_subtitle_left.c_str());
        it.printf(subtitle_right_x, subtitle_text_y, id(font_splash_subtitle), COLOR_OFF, TextAlign::TOP_LEFT, "%s", splash_subtitle_right.c_str());
        it.printf(center_x, subtitle_symbol_y, id(font_splash_symbol), COLOR_OFF, TextAlign::TOP_CENTER, "\\");
        return;
      }
      auto state_is_playing = [](const std::string &s) {
        std::string low = s;
        for (auto &c : low) c = (char) ::tolower(c);
        return low == "playing";
      };
      bool playing = false;
      if (id(ha_audio_state).has_state() && state_is_playing(id(ha_audio_state).state.c_str())) {
        playing = true;
      }
      if (!playing && id(ha_audio2_state).has_state() && state_is_playing(id(ha_audio2_state).state.c_str())) {
        playing = true;
      }
      if (!playing && id(ha_audio3_state).has_state() && state_is_playing(id(ha_audio3_state).state.c_str())) {
        playing = true;
      }
      if (!playing && id(ha_audio4_state).has_state() && state_is_playing(id(ha_audio4_state).state.c_str())) {
        playing = true;
      }
      if (!playing && id(ha_audio5_state).has_state() && state_is_playing(id(ha_audio5_state).state.c_str())) {
        playing = true;
      }
      if (!playing && id(ha_audio6_state).has_state() && state_is_playing(id(ha_audio6_state).state.c_str())) {
        playing = true;
      }
      if (!playing && id(arylic_playing).has_state() && id(arylic_playing).state) {
        playing = true;
      }
      if (!playing && id(arylic_playing_state)) {
        playing = true;
      }
      if (!playing && id(arylic_lr_playing_state)) {
        playing = true;
      }
      std::string ary_src;
      if (id(arylic_source).has_state() && !id(arylic_source).state.empty()) {
        ary_src = id(arylic_source).state.c_str();
      }
      if (ary_src.empty() && !id(arylic_source_state).empty()) {
        ary_src = id(arylic_source_state);
      }
      const std::string ary_src_low = to_lower_ascii(ary_src);
      const bool arylic_source_active = !ary_src.empty() && ary_src_low != "idle";
      const uint32_t meta_stale_ms = (uint32_t) ${meta_stale_ms};
      const uint32_t meta_grace_ms = (uint32_t) ${meta_playing_grace_ms};
      auto meta_recent = [&](uint32_t last_ms) {
        return last_ms > 0 && (now - last_ms) < meta_grace_ms;
      };
      const bool arylic_recent = id(arylic_last_meta_ms) > 0 && (now - id(arylic_last_meta_ms)) < meta_stale_ms;
      if (!playing && (arylic_source_active || arylic_recent)) {
        playing = true;
      }
      if (!playing) {
        if (meta_recent(id(arylic_last_meta_ms)) ||
            meta_recent(id(arylic_lr_last_meta_ms)) ||
            meta_recent(id(ha_audio1_last_meta_ms)) ||
            meta_recent(id(ha_audio2_last_meta_ms)) ||
            meta_recent(id(ha_audio3_last_meta_ms)) ||
            meta_recent(id(ha_audio4_last_meta_ms)) ||
            meta_recent(id(ha_audio5_last_meta_ms)) ||
            meta_recent(id(ha_audio6_last_meta_ms))) {
          playing = true;
        }
      }
      if (playing != id(last_playing_state)) {
        id(last_playing_state) = playing;
      }
      id(playing_effective) = playing;
      std::string src = ary_src;
      if (src.empty() && !id(arylic_lr_source_state).empty()) {
        src = id(arylic_lr_source_state);
      }
      if (src.empty() && id(ha_audio_app).has_state() && !id(ha_audio_app).state.empty()) {
        src = id(ha_audio_app).state.c_str();
      }
      if (src.empty() && id(ha_audio_source).has_state() && !id(ha_audio_source).state.empty()) {
        src = id(ha_audio_source).state.c_str();
      }
      if (src.empty() && id(ha_audio2_app).has_state() && !id(ha_audio2_app).state.empty()) {
        src = id(ha_audio2_app).state.c_str();
      }
      if (src.empty() && id(ha_audio2_source).has_state() && !id(ha_audio2_source).state.empty()) {
        src = id(ha_audio2_source).state.c_str();
      }
      if (src.empty() && id(ha_audio3_app).has_state() && !id(ha_audio3_app).state.empty()) {
        src = id(ha_audio3_app).state.c_str();
      }
      if (src.empty() && id(ha_audio3_input).has_state() && !id(ha_audio3_input).state.empty()) {
        src = id(ha_audio3_input).state.c_str();
      }
      if (src.empty() && id(ha_audio3_source).has_state()) {
        src = id(ha_audio3_source).state.c_str();
      }
      if (src.empty() && id(ha_audio4_app).has_state() && !id(ha_audio4_app).state.empty()) {
        src = id(ha_audio4_app).state.c_str();
      }
      if (src.empty() && id(ha_audio4_input).has_state() && !id(ha_audio4_input).state.empty()) {
        src = id(ha_audio4_input).state.c_str();
      }
      if (src.empty() && id(ha_audio4_source).has_state()) {
        src = id(ha_audio4_source).state.c_str();
      }
      if (src.empty() && id(ha_audio5_app).has_state() && !id(ha_audio5_app).state.empty()) {
        src = id(ha_audio5_app).state.c_str();
      }
      if (src.empty() && id(ha_audio5_source).has_state()) {
        src = id(ha_audio5_source).state.c_str();
      }
      if (src.empty() && id(ha_audio6_app).has_state() && !id(ha_audio6_app).state.empty()) {
        src = id(ha_audio6_app).state.c_str();
      }
      if (src.empty() && id(ha_audio6_source).has_state()) {
        src = id(ha_audio6_source).state.c_str();
      }
      int vol_live = id(arylic_volume_cached);
      bool vol_from_pot_live = false;
      if (id(pot_volume_pct_last_ms) > 0 && id(pot_volume_pct_cached) >= 0) {
        const uint32_t since_pot_ms = now - id(pot_volume_pct_last_ms);
        if (id(audio_ring_active_until_ms) > now || since_pot_ms < (uint32_t) (${ring_active_window_ms} * 2)) {
          vol_live = id(pot_volume_pct_cached);
          vol_from_pot_live = true;
        }
      }
      if (vol_live < 0 && id(arylic_volume).has_state()) {
        vol_live = (int) id(arylic_volume).state;
      }
      if (vol_live < 0) {
        float ha_vol = -1.0f;
        if (id(ha_audio_volume).has_state()) {
          ha_vol = id(ha_audio_volume).state * 100.0f;
        } else if (id(ha_audio2_volume).has_state()) {
          ha_vol = id(ha_audio2_volume).state * 100.0f;
        } else if (id(ha_audio3_volume).has_state()) {
          ha_vol = id(ha_audio3_volume).state * 100.0f;
        } else if (id(ha_audio4_volume).has_state()) {
          ha_vol = id(ha_audio4_volume).state * 100.0f;
        } else if (id(ha_audio5_volume).has_state()) {
          ha_vol = id(ha_audio5_volume).state * 100.0f;
        } else if (id(ha_audio6_volume).has_state()) {
          ha_vol = id(ha_audio6_volume).state * 100.0f;
        }
        if (ha_vol >= 0.0f) {
          vol_live = (int) (ha_vol + 0.5f);
        }
      }
      if (vol_live < 0) vol_live = 0;
      int vol = vol_live;
      bool vol_from_pot = vol_from_pot_live;
      const uint32_t idle_ms = now - id(last_input_ms);
      const bool audio_wake_active = id(audio_wake_until_ms) > 0 && now < id(audio_wake_until_ms);

      if (id(last_screen_mode) < 0) {
        id(last_screen_mode) = id(screen_mode);
      } else if (id(last_screen_mode) != id(screen_mode)) {
        id(audio_empty_active) = false;
        id(last_screen_mode) = id(screen_mode);
      }

      if (id(audio_empty_active)) {
        id(audio_empty_active) = false;
      }

      // Menu idle/blanking is handled by UI-owned interval logic.

      if (now < id(meta_popup_until_ms)) {
        std::string label = id(meta_popup_label);
        if (label.empty() && id(meta_override_state).has_state()) {
          label = id(meta_override_state).state.c_str();
        }
        if (label.empty()) label = "META";
        it.fill(COLOR_OFF);
        const int line_h = ${menu_line_height_list};
        const int block_h = line_h * 2;
        int block_y = (h - block_h) / 2;
        if (block_y < 0) block_y = 0;
        const int header_y = block_y;
        const int label_y = block_y + line_h;
        it.printf(w / 2, header_y, id(font_menu), COLOR_ON, TextAlign::TOP_CENTER, "META");
        it.printf(w / 2, label_y, id(font_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", label.c_str());
        return;
      }

      if (now < id(source_popup_until_ms)) {
        auto label_from_src = [](const std::string &code) {
          if (code == "NET") return std::string("Wi-Fi");
          if (code == "BT") return std::string("Bluetooth");
          if (code == "LINE-IN") return std::string("Analog Input");
          if (code == "OPT") return std::string("Optical");
          if (code == "COAX") return std::string("Coaxial");
          return code.empty() ? std::string("SRC") : code;
        };
        std::string label = id(source_popup_label);
        if (label.empty() && id(arylic_source).has_state()) {
          label = label_from_src(id(arylic_source).state.c_str());
        }
        if (label.empty()) label = "SRC";
        it.fill(COLOR_OFF);
        const int line_h = ${menu_line_height_list};
        const int block_h = line_h * 2;
        int block_y = (h - block_h) / 2;
        if (block_y < 0) block_y = 0;
        const int header_y = block_y;
        const int label_y = block_y + line_h;
        it.printf(w / 2, header_y, id(font_menu), COLOR_ON, TextAlign::TOP_CENTER, "INPUT");
        it.printf(w / 2, label_y, id(font_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", label.c_str());
        return;
      }

      // Display state machine handles blanking/saver decisions.

      auto draw_scrolling_text = [&](int x, int y, int width, const std::string &text, esphome::font::Font *font, uint32_t now_ms,
                                     uint32_t speed_ms, int char_w, int gap, Color color, int &offset_state, uint32_t &last_ms) {
        if (text.empty()) return;
        const int text_w = (int) text.size() * char_w;
        if (text_w <= width) {
          offset_state = 0;
          last_ms = now_ms;
          it.printf(x, y, font, color, "%s", text.c_str());
          return;
        }
        const int cycle = text_w + gap;
        if (cycle <= 0) return;
        if (offset_state >= cycle || offset_state < 0) offset_state = offset_state % cycle;
        if (speed_ms > 0) {
          if (last_ms == 0) last_ms = now_ms;
          const uint32_t elapsed = now_ms - last_ms;
          if (elapsed >= speed_ms) {
            uint32_t steps = elapsed / speed_ms;
            if (steps > 1) steps = 1;
            offset_state = (offset_state + (int) steps) % cycle;
            last_ms += steps * speed_ms;
          }
        }
        const int offset = (speed_ms > 0) ? offset_state : 0;
