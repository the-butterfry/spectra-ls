    attribute: names
    internal: true
  - platform: homeassistant
    id: ma_control_hosts
    entity_id: sensor.ma_control_hosts
    internal: true
    on_value:
      - lambda: |-
          const uint32_t now = millis();
          static uint32_t last_invalid_log_ms = 0;
          auto should_log_invalid = [&]() -> bool {
            if (now - last_invalid_log_ms < 5000) return false;
            last_invalid_log_ms = now;
            return true;
          };
          std::string hosts = x.c_str();
          std::string low = hosts;
          for (auto &c : low) c = (char) ::tolower(c);
          if (hosts.empty() || low == "unknown" || low == "unavailable" || low == "none") {
            const bool pending_refresh = id(control_target_pending_until_ms) > now;
            const bool has_recent_valid = id(arylic_control_hosts_last_valid_ms) > 0 &&
                                          (now - id(arylic_control_hosts_last_valid_ms)) < 10000;
            const bool has_cached = !id(arylic_control_hosts).empty();
            if (has_cached && (pending_refresh || has_recent_valid)) {
              if (should_log_invalid()) {
                ESP_LOGW("ma", "control_hosts invalid update '%s' while refreshing; keeping cached '%s'", hosts.c_str(), id(arylic_control_hosts).c_str());
              }
              return;
            }
            id(arylic_control_hosts).clear();
            id(arylic_control_host).clear();
            id(control_target_pending_until_ms) = 0;
            if (should_log_invalid()) {
              ESP_LOGW("ma", "control_hosts cleared fail-closed (invalid update '%s')", hosts.c_str());
            }
            return;
          }
          if (hosts != id(arylic_control_hosts)) {
            ESP_LOGI("ma", "control_hosts refreshed old='%s' new='%s'", id(arylic_control_hosts).c_str(), hosts.c_str());
          }
          id(arylic_control_hosts) = hosts;
          id(arylic_control_host) = hosts;
          id(arylic_control_hosts_last_valid_ms) = now;
          id(control_target_pending_until_ms) = 0;
          ESP_LOGI("ma", "control_hosts=%s", hosts.c_str());
