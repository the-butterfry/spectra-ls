            const bool has_recent_valid = id(arylic_control_hosts_last_valid_ms) > 0 &&
                                          (now - id(arylic_control_hosts_last_valid_ms)) < 10000;
            const bool has_cached = !id(arylic_control_hosts).empty() || !id(arylic_control_host).empty();
            if (has_cached && (pending_refresh || has_recent_valid)) {
              if (should_log_invalid()) {
                ESP_LOGW("ma", "control_host invalid update '%s' while refreshing; keeping cached hosts='%s' host='%s'",
                         host.c_str(), id(arylic_control_hosts).c_str(), id(arylic_control_host).c_str());
              }
              return;
            }
            id(arylic_control_hosts).clear();
            id(arylic_control_host).clear();
            id(control_target_pending_until_ms) = 0;
            if (should_log_invalid()) {
              ESP_LOGW("ma", "control_host cleared fail-closed (invalid update '%s')", host.c_str());
            }
            return;
          }
          if (host != id(arylic_control_host)) {
            ESP_LOGI("ma", "control_host refreshed old='%s' new='%s'", id(arylic_control_host).c_str(), host.c_str());
          }
          id(arylic_control_host) = host;
          if (id(arylic_control_hosts).empty()) {
            id(arylic_control_hosts) = host;
          }
          id(arylic_control_hosts_last_valid_ms) = now;
          id(control_target_pending_until_ms) = 0;
          ESP_LOGI("ma", "control_host=%s", host.c_str());
  - platform: homeassistant
