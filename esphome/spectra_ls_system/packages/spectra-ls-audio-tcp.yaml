select:
  - platform: template
    name: "Arylic Source"
    id: arylic_source_select
    internal: true
    options:
      - "WiFi"
      - "Bluetooth"
      - "Line In 1"
      - "Line In 2"
      # Add more inputs later if you wire them (e.g., USB, USB DAC, Optical, Coax, I2S, HDMI)
    update_interval: 1s
    lambda: |-
      if (!id(arylic_source).has_state()) return std::string("WiFi");
      std::string src = id(arylic_source).state.c_str();
      if (src == "NET") return std::string("WiFi");
      if (src == "BT") return std::string("Bluetooth");
      if (src == "LINE-IN") return std::string("Line In 1");
      if (src == "LINE-IN2") return std::string("Line In 2");
      return std::string("WiFi");
    set_action:
      - lambda: |-
          std::string target;
          if (x == "WiFi") target = "NET";
          else if (x == "Bluetooth") target = "BT";
          else if (x == "Line In 1") target = "LINE-IN";
          else if (x == "Line In 2") target = "LINE-IN2";
          if (!target.empty()) {
            const bool tcp_ok = esphome::arylic_tcp::send_source_multi(id(arylic_control_hosts), (uint16_t) id(arylic_control_port), target);
            if (!tcp_ok) {
              ESP_LOGW("arylic_tcp", "SRC send failed target=%s", target.c_str());
            }
            id(arylic_source_state) = target;
          }
      - script.execute: arylic_request_status

text_sensor:
  - platform: template
    name: "Arylic Source"
    id: arylic_source
    internal: true
    update_interval: 1s
    lambda: |-
      return id(arylic_source_state);
  - platform: template
    name: "Arylic Title"
    id: arylic_title
    internal: true
    update_interval: 1s
    lambda: |-
      return id(arylic_title_state);
  - platform: template
    name: "Arylic Artist"
    id: arylic_artist
    internal: true
    update_interval: 1s
    lambda: |-
      return id(arylic_artist_state);
  - platform: template
    name: "Arylic Album"
    id: arylic_album
    internal: true
    update_interval: 1s
    lambda: |-
      return id(arylic_album_state);
  - platform: template
    name: "Meta Override"
    id: meta_override_state
    internal: true
    update_interval: 500ms
    lambda: |-
      const int idx = id(meta_override_idx);
      if (idx < 0) return std::string("${meta_source_label_auto}");
      if (idx == 0) return std::string("${meta_source_label_arylic}");
      if (idx == 1) return std::string("${meta_source_label_1}");
      if (idx == 2) return std::string("${meta_source_label_2}");
      if (idx == 3) return std::string("${meta_source_label_3}");
      if (idx == 4) return std::string("${meta_source_label_4}");
      if (idx == 5) return std::string("${meta_source_label_5}");
      if (idx == 6) return std::string("${meta_source_label_6}");
      return std::string("${meta_source_label_auto}");
  - platform: homeassistant
    id: ha_now_playing_entity
    entity_id: sensor.now_playing_entity
    internal: true
  - platform: homeassistant
    id: ma_active_target
    entity_id: input_select.ma_active_target
    internal: true
    on_value:
      - lambda: |-
          static std::string last_target;
          const uint32_t now = millis();
          std::string target = x.c_str();
          if (target != last_target) {
            ESP_LOGI("ma", "active_target changed; refreshing host cache old='%s' new='%s'", last_target.c_str(), target.c_str());
            id(arylic_control_hosts).clear();
            id(arylic_control_host).clear();
            id(control_target_pending_until_ms) = now + 6000;
            last_target = target;
          } else {
            id(control_target_pending_until_ms) = now + 4000;
          }
          std::string value = target;
          if (value.empty()) value = "-";
          ESP_LOGI("ma", "active_target=%s", value.c_str());
          // Control host/port resolved by HA (sensor.ma_control_hosts / sensor.ma_control_port).
      - if:
          condition:
            lambda: |-
              // Reconnect race guard: HA may reboot while ESP uptime remains high.
              // Only force-update ma_control_* after API reconnect grace has elapsed
              // and required template-backed feeds are initialized.
              const uint32_t now = millis();
              const bool reconnect_grace_active = id(control_target_ha_reconnect_guard_until_ms) > now;
              const bool targets_ready = id(ha_control_target_labels).has_state() &&
                                         id(ha_control_target_entities).has_state();
              const bool hosts_ready = id(ma_control_hosts).has_state() && id(ma_control_host).has_state();
              if (reconnect_grace_active) return false;
              if (!targets_ready || !hosts_ready) return false;
              return true;
          then:
            - homeassistant.service:
                service: homeassistant.update_entity
                data:
                  entity_id: sensor.ma_control_targets
            - homeassistant.service:
                service: homeassistant.update_entity
                data:
                  entity_id: sensor.ma_control_hosts
            - homeassistant.service:
                service: homeassistant.update_entity
                data:
                  entity_id: sensor.ma_control_host
          else:
            - lambda: |-
                const uint32_t now = millis();
                const bool reconnect_grace_active = id(control_target_ha_reconnect_guard_until_ms) > now;
                const bool targets_ready = id(ha_control_target_labels).has_state() &&
                                           id(ha_control_target_entities).has_state();
                const bool hosts_ready = id(ma_control_hosts).has_state() && id(ma_control_host).has_state();
                ESP_LOGW("ma",
                         "reconnect guard: skip ma_control_* forced update (grace=%d targets_ready=%d hosts_ready=%d uptime=%u)",
                         reconnect_grace_active ? 1 : 0,
                         targets_ready ? 1 : 0,
                         hosts_ready ? 1 : 0,
                         (unsigned) now);
  - platform: homeassistant
    id: ma_active_friendly
    entity_id: sensor.ma_active_friendly
    internal: true
    on_value:
      - lambda: |-
          std::string value = x.c_str();
          if (value.empty()) value = "-";
          ESP_LOGI("ma", "active_friendly=%s", value.c_str());
  - platform: homeassistant
    id: ha_control_target_labels
    entity_id: sensor.ma_control_targets
    attribute: labels
    internal: true
  - platform: homeassistant
    id: ha_control_target_entities
    entity_id: sensor.ma_control_targets
    attribute: entities
    internal: true
  - platform: homeassistant
    id: ha_meta_candidates_entities
    entity_id: ${ha_ma_meta_candidates}
    attribute: entities
    internal: true
  - platform: homeassistant
    id: ha_meta_candidates_names
