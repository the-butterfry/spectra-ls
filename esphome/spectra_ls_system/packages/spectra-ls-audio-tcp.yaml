    id: arylic_mid
    internal: true
    accuracy_decimals: 0
    lambda: |-
      return (float) id(arylic_mid_cached);
  - platform: template
    name: "Arylic Position"
    id: arylic_meta_position
    internal: true
    unit_of_measurement: "s"
    accuracy_decimals: 0
    lambda: |-
      return (float) id(arylic_meta_position_state);
  - platform: template
    name: "Arylic Duration"
    id: arylic_meta_duration
    internal: true
    unit_of_measurement: "s"
    accuracy_decimals: 0
    lambda: |-
      return (float) id(arylic_meta_duration_state);
  - platform: homeassistant
    id: ma_control_port
    entity_id: sensor.ma_control_port
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          int port = (int) x;
          if (port <= 0 || port > 65534) port = (int) ${arylic_tcp_port};
          id(arylic_control_port) = port;
          ESP_LOGI("ma", "control_port=%d", port);
number:
  - platform: template
    name: "EQ Low"
    id: eq_low_set
    internal: false
    unit_of_measurement: "dB"
    min_value: ${eq_min}
    max_value: ${eq_max}
    step: 1
    update_interval: 300s
    lambda: |-
      return (float) id(arylic_eq_low_cached);
    set_action:
      - lambda: |-
          id(arylic_set_bass).execute((int) x);
  - platform: template
    name: "EQ Mid"
    id: eq_mid_set
    internal: false
    unit_of_measurement: "dB"
    min_value: ${eq_min}
    max_value: ${eq_max}
    step: 1
    update_interval: 300s
    lambda: |-
      return (float) id(arylic_eq_mid_cached);
    set_action:
      - lambda: |-
          id(arylic_set_mid).execute((int) x);
  - platform: template
    name: "EQ High"
    id: eq_high_set
    internal: false
    unit_of_measurement: "dB"
    min_value: ${eq_min}
    max_value: ${eq_max}
    step: 1
    update_interval: 300s
    lambda: |-
      return (float) id(arylic_eq_high_cached);
    set_action:
      - lambda: |-
          id(arylic_set_treble).execute((int) x);
  - platform: template
    name: "Arylic Volume Set"
    id: arylic_volume_set
    internal: false
    unit_of_measurement: "%"
    min_value: ${audio_ui_min}
    max_value: ${audio_ui_max}
    step: 1
    update_interval: 300s
    lambda: |-
      int actual = id(arylic_volume).has_state() ? (int) id(arylic_volume).state : (int) id(arylic_volume_cached);
      if (actual < 0) actual = 0;
      int max_vol = (int) ${audio_max_volume_pct};
      if (max_vol <= 0 || max_vol > 100) max_vol = 100;
      if (actual > max_vol) actual = max_vol;
      const int ui_min = ${audio_ui_min};
      const int ui_max = ${audio_ui_max};
      const int ui_span = ui_max - ui_min;
      if (ui_span <= 0 || max_vol <= 0) return (float) ui_min;
      const float ratio = (float) actual / (float) max_vol;
      int ui = ui_min + (int) (ratio * (float) ui_span + 0.5f);
      if (ui < ui_min) ui = ui_min;
      if (ui > ui_max) ui = ui_max;
      return (float) ui;
    set_action:
      - lambda: |-
          int ui = (int) x;
          const int ui_min = ${audio_ui_min};
          const int ui_max = ${audio_ui_max};
          if (ui < ui_min) ui = ui_min;
          if (ui > ui_max) ui = ui_max;
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          const int ui_span = ui_max - ui_min;
          float ratio = (ui_span > 0) ? ((float) (ui - ui_min) / (float) ui_span) : 0.0f;
          int target = (int) (ratio * (float) max_vol + 0.5f);
          if (target < 0) target = 0;
          if (target > max_vol) target = max_vol;
          const uint32_t now = millis();
          const bool needs_prompt = false;
          bool playing = id(arylic_playing).has_state() && id(arylic_playing).state;
          if (!playing && id(ha_audio_state).has_state()) {
            std::string s = id(ha_audio_state).state.c_str();
            for (auto &c : s) c = (char) ::tolower(c);
            if (s == "playing") playing = true;
          }
          if (id(arylic_control_hosts).empty()) {
            id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
            return;
          }
          id(arylic_volume_cached) = target;
          id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
          if (!id(arylic_control_hosts).empty()) {
            const bool tcp_ok = esphome::arylic_tcp::send_volume_multi(id(arylic_control_hosts), (uint16_t) id(arylic_control_port), target);
            if (!tcp_ok) {
              ESP_LOGW("arylic_tcp", "VOL send failed target=%d", target);
            }
          }
          id(arylic_last_vol_sent_ms) = now;

