  # Arylic state (kept with audio controls)
  - platform: template
    name: "Arylic Mute"
    id: arylic_mute
    internal: true
    lambda: |-
      return id(arylic_mute_state);
  - platform: template
    name: "Arylic Playing"
    id: arylic_playing
    internal: true
    lambda: |-
      return id(arylic_playing_state);
  - platform: homeassistant
    id: ma_control_ambiguous
    entity_id: binary_sensor.ma_control_ambiguous
    internal: true
    on_state:
      - lambda: |-
          const uint32_t now = millis();
          if (x) {
            id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
          }
  - platform: template
    name: "HA AirPlay Active"
    id: ha_airplay_active
    internal: true
    lambda: |-
      std::string src;
      std::string app;
      if (id(ha_audio_source).has_state()) src = id(ha_audio_source).state.c_str();
      if (id(ha_audio_app).has_state()) app = id(ha_audio_app).state.c_str();
      if (src.empty() && app.empty()) return false;
      auto lower = [](std::string s) {
        for (auto &c : s) c = (char) ::tolower(c);
        return s;
      };
      src = lower(src);
      app = lower(app);
      const bool airplay = (src.find("airplay") != std::string::npos) || (app.find("airplay") != std::string::npos);
      return airplay;

sensor:
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: encoder
    sensor_id: 3
    name: "RP Volume Enc Delta"
    id: rp_volume_enc_delta
    internal: true
    accuracy_decimals: 0
    on_value:
      - script.execute:
          id: arylic_volume_delta
          delta: !lambda 'return (int) x;'
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 102
    name: "RP Volume Pot Raw"
    id: rp_volume_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:

      - lambda: |-
          id(adc_raw_2) = (int) x;
      - if:
          condition:
            lambda: |-
              return !id(calibration_active);
          then:
            - lambda: |-
                static uint32_t last_log = 0;
                float pct = (float) x;
                if (pct > 100.0f) {
                  pct = (pct / 65535.0f) * 100.0f;
                }
                if (pct < 0.0f) pct = 0.0f;
                if (pct > 100.0f) pct = 100.0f;

                int max_vol = (int) ${audio_max_volume_pct};
                if (max_vol <= 0 || max_vol > 100) max_vol = 100;
                int target = (int) (pct * (float) max_vol / 100.0f + 0.5f);
                if (target < 0) target = 0;
                if (target > max_vol) target = max_vol;

                const uint32_t now = millis();
                const bool pot_changed = (target != id(pot_volume_target));
                id(np_disp_vol) = target;
                id(np_disp_vol_from_pot) = true;
                id(pot_volume_pct_cached) = (int) (pct + 0.5f);
                id(pot_volume_pct_last_ms) = now;

                const uint32_t idle_ms = now - id(last_input_ms);
                const uint32_t blank_ms = id(menu_active) ? (uint32_t) ${menu_blank_idle_ms} : (uint32_t) ${screensaver_idle_ms};
                bool screen_awake = (blank_ms == 0) || (idle_ms < blank_ms);
                if (id(audio_wake_until_ms) > 0 && now < id(audio_wake_until_ms)) {
                  screen_awake = true;
                }
                bool playing = id(arylic_playing).has_state() && id(arylic_playing).state;
                if (!playing && id(ha_audio_state).has_state()) {
                  std::string s = id(ha_audio_state).state.c_str();
                  for (auto &c : s) c = (char) ::tolower(c);
                  if (s == "playing") playing = true;
                }
                if (playing) screen_awake = true;
                if (screen_awake && pot_changed) {
                  id(last_input_ms) = now;
                }
                if (now - last_log > (uint32_t) ${input_raw_log_interval_ms}) {
                  ESP_LOGI("input", "Volume pot raw=%d target=%d screen_awake=%d", (int) x, target, screen_awake ? 1 : 0);
                  last_log = now;
                }

                id(arylic_pot_apply_target).execute(3, target);
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 104
    name: "RP EQ Bass Pot Raw"
    id: rp_eq_bass_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          id(adc_raw_0) = (int) x;
      - if:
          condition:
            lambda: |-
              return !id(calibration_active);
          then:
            - lambda: |-
                float pct = (float) x;
                if (pct > 100.0f) pct = (pct / 65535.0f) * 100.0f;
                if (pct < 0.0f) pct = 0.0f;
                if (pct > 100.0f) pct = 100.0f;
                const int eq_min = (int) ${eq_min};
                const int eq_max = (int) ${eq_max};
                const int span = eq_max - eq_min;
                const float target_f = (float) eq_min + (pct / 100.0f) * (float) span;
                int target = (int) ((target_f >= 0.0f) ? (target_f + 0.5f) : (target_f - 0.5f));
                id(arylic_pot_apply_target).execute(0, target);
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 105
    name: "RP EQ Mid Pot Raw"
    id: rp_eq_mid_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          id(adc_raw_4) = (int) x;
      - if:
          condition:
            lambda: |-
              return !id(calibration_active);
          then:
            - lambda: |-
                float pct = (float) x;
                if (pct > 100.0f) pct = (pct / 65535.0f) * 100.0f;
                if (pct < 0.0f) pct = 0.0f;
                if (pct > 100.0f) pct = 100.0f;
                const int eq_min = (int) ${eq_min};
                const int eq_max = (int) ${eq_max};
                const int span = eq_max - eq_min;
                const float target_f = (float) eq_min + (pct / 100.0f) * (float) span;
                int target = (int) ((target_f >= 0.0f) ? (target_f + 0.5f) : (target_f - 0.5f));
                id(arylic_pot_apply_target).execute(1, target);
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 106
    name: "RP EQ Treble Pot Raw"
    id: rp_eq_treble_pot_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          id(adc_raw_3) = (int) x;
      - if:
          condition:
            lambda: |-
              return !id(calibration_active);
          then:
            - lambda: |-
                float pct = (float) x;
                if (pct > 100.0f) pct = (pct / 65535.0f) * 100.0f;
                if (pct < 0.0f) pct = 0.0f;
                if (pct > 100.0f) pct = 100.0f;
                const int eq_min = (int) ${eq_min};
                const int eq_max = (int) ${eq_max};
                const int span = eq_max - eq_min;
                const float target_f = (float) eq_min + (pct / 100.0f) * (float) span;
                int target = (int) ((target_f >= 0.0f) ? (target_f + 0.5f) : (target_f - 0.5f));
                id(arylic_pot_apply_target).execute(2, target);
  - platform: template
    name: "Arylic Volume"
    id: arylic_volume
    internal: true
    accuracy_decimals: 0
    lambda: |-
      int vol = id(arylic_volume_cached);
      if (vol < 0) vol = 0;
      return (float) vol;
  - platform: template
    name: "Arylic Bass"
    id: arylic_bass
    internal: true
    accuracy_decimals: 0
    lambda: |-
      return (float) id(arylic_bass_cached);
  - platform: template
