interval:
  - interval: ${audio_control_loop_interval_ms}ms
    then:
      - lambda: |-
          id(control_target_needs_prompt) = false;
          id(control_target_prompt_blocked) = false;
          id(control_target_prompt_active) = false;
          id(control_target_prompt_manual) = false;
          id(control_target_prompt_commit) = false;
          id(control_target_prompt_entity) = "";
          id(control_target_popup_active) = false;
      - lambda: |-
          if (!id(pot_volume_deferred)) return;
          const uint32_t now = millis();
          if (now < id(pot_volume_deferred_until_ms)) return;
          const int target = id(pot_volume_target);
          if (target < 0) {
            id(pot_volume_deferred) = false;
            return;
          }
          ESP_LOGI("input", "Pot deferred send arylic VOL target=%d last_sent=%u now=%u", target,
                   (unsigned) id(arylic_last_vol_sent_ms), (unsigned) now);
          id(arylic_set_volume).execute(target);
          id(arylic_last_vol_sent_ms) = now;
          id(arylic_last_vol_sent_target) = target;
          id(arylic_volume_cached) = target;
          id(pot_volume_deferred) = false;
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              if (!id(arylic_eq_low_deferred)) return false;
              if (now < id(arylic_eq_low_deferred_until_ms)) return false;
              id(arylic_eq_low_last_sent_ms) = now;
              id(arylic_eq_low_deferred) = false;
              return true;
          then:
            - lambda: |-
                id(arylic_set_bass).execute(id(arylic_eq_low_cached));
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              if (!id(arylic_eq_mid_deferred)) return false;
              if (now < id(arylic_eq_mid_deferred_until_ms)) return false;
              id(arylic_eq_mid_last_sent_ms) = now;
              id(arylic_eq_mid_deferred) = false;
              return true;
          then:
            - lambda: |-
                id(arylic_set_mid).execute(id(arylic_eq_mid_cached));
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              if (!id(arylic_eq_high_deferred)) return false;
              if (now < id(arylic_eq_high_deferred_until_ms)) return false;
              id(arylic_eq_high_last_sent_ms) = now;
              id(arylic_eq_high_deferred) = false;
              return true;
          then:
            - lambda: |-
                id(arylic_set_treble).execute(id(arylic_eq_high_cached));
  - interval: ${audio_poll_interval_ms}ms
    then:
      - lambda: |-
          return;
  - interval: ${ma_target_refresh_interval_ms}ms
    then:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: input_select.ma_active_target
  - interval: ${ha_audio_refresh_ms}ms
    then:
      - if:
          condition:
            lambda: |-
              if (!id(ma_active_target).has_state()) return false;
              const std::string target = id(ma_active_target).state;
              if (target.empty()) return false;
              std::string low = target;
              for (auto &c : low) c = (char) ::tolower(c);
              if (low == "none" || low == "unknown" || low == "unavailable") return false;
              return true;
          then:
            - homeassistant.service:
                service: homeassistant.update_entity
                data:
                  entity_id: !lambda 'return id(ma_active_target).state;'

script:
  - id: focus_audio
    mode: restart
    then:
      - lambda: |-
          id(screen_mode) = 1;
          id(lighting_adjust_mode) = 0;
      - script.execute: compute_display_state

  - id: arylic_pot_apply_target
    mode: restart
    parameters:
      channel: int
      target: int
    then:
      - lambda: |-
          // UNIVERSAL POT APPLY PIPELINE
          // channel 0=bass, 1=mid, 2=treble, 3=volume
          // Cleanup note: volume's previous bespoke on_value send path is detached;
          // remove residual volume dead-end tuning branches after verification soak.
          const int eq_min = (int) ${eq_min};
          const int eq_max = (int) ${eq_max};
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          int clamped = target;
          if (channel == 3) {
            if (clamped < 0) clamped = 0;
            if (clamped > max_vol) clamped = max_vol;
          } else {
            if (clamped < eq_min) clamped = eq_min;
            if (clamped > eq_max) clamped = eq_max;
          }

          int current = 0;
          switch (channel) {
            case 0:
              current = id(arylic_eq_low_cached);
              break;
            case 1:
              current = id(arylic_eq_mid_cached);
              break;
            case 2:
              current = id(arylic_eq_high_cached);
              break;
            case 3:
              current = id(arylic_volume_cached);
              if (current < 0 && id(arylic_volume).has_state()) {
                current = (int) id(arylic_volume).state;
              }
              if (current < 0) current = 0;
              break;
            default:
              return;
          }
          if (clamped == current) return;

          id(note_user_input).execute();
          id(focus_audio).execute();

          const int delta = abs(clamped - current);
          const uint32_t now = millis();
          const uint32_t min_interval = (channel == 3)
                                          ? (uint32_t) ${volume_pot_send_interval_ms}
                                          : (uint32_t) ${eq_pot_send_interval_ms};
          const uint32_t settle_ms = (channel == 3)
                                       ? (uint32_t) ${volume_pot_settle_ms}
                                       : (uint32_t) ${eq_pot_settle_ms};
          const int jump_steps = (channel == 3)
                                   ? (int) ${volume_pot_jump_steps}
                                   : (int) ${eq_pot_jump_steps};

          uint32_t next_interval_ms = 0;
          uint32_t settle_ready_ms = 0;

          switch (channel) {
            case 0:
              id(arylic_eq_low_cached) = clamped;
              id(eq_low_target) = clamped;
              id(eq_low_last_change_ms) = now;
              next_interval_ms = id(arylic_eq_low_last_sent_ms) + min_interval;
              settle_ready_ms = id(eq_low_last_change_ms) + settle_ms;
              break;
            case 1:
              id(arylic_eq_mid_cached) = clamped;
              id(eq_mid_target) = clamped;
              id(eq_mid_last_change_ms) = now;
              next_interval_ms = id(arylic_eq_mid_last_sent_ms) + min_interval;
              settle_ready_ms = id(eq_mid_last_change_ms) + settle_ms;
              break;
            case 2:
              id(arylic_eq_high_cached) = clamped;
              id(eq_high_target) = clamped;
              id(eq_high_last_change_ms) = now;
              next_interval_ms = id(arylic_eq_high_last_sent_ms) + min_interval;
              settle_ready_ms = id(eq_high_last_change_ms) + settle_ms;
              break;
            case 3:
              id(arylic_volume_cached) = clamped;
              id(pot_volume_target) = clamped;
              id(pot_volume_last_ms) = now;
              next_interval_ms = id(arylic_last_vol_sent_ms) + min_interval;
              settle_ready_ms = id(pot_volume_last_ms) + settle_ms;
              break;
          }

          const bool jump = (delta >= jump_steps);
          if (!jump && (now < next_interval_ms || now < settle_ready_ms)) {
            const uint32_t defer_until = (next_interval_ms > settle_ready_ms) ? next_interval_ms : settle_ready_ms;
            switch (channel) {
              case 0:
                id(arylic_eq_low_deferred) = true;
                id(arylic_eq_low_deferred_until_ms) = defer_until;
                break;
              case 1:
                id(arylic_eq_mid_deferred) = true;
                id(arylic_eq_mid_deferred_until_ms) = defer_until;
                break;
              case 2:
                id(arylic_eq_high_deferred) = true;
                id(arylic_eq_high_deferred_until_ms) = defer_until;
                break;
              case 3:
                id(pot_volume_deferred) = true;
                id(pot_volume_deferred_until_ms) = defer_until;
                break;
            }
            return;
          }

          if (now < next_interval_ms) {
            switch (channel) {
              case 0:
                id(arylic_eq_low_deferred) = true;
                id(arylic_eq_low_deferred_until_ms) = next_interval_ms;
                break;
              case 1:
                id(arylic_eq_mid_deferred) = true;
                id(arylic_eq_mid_deferred_until_ms) = next_interval_ms;
                break;
              case 2:
                id(arylic_eq_high_deferred) = true;
                id(arylic_eq_high_deferred_until_ms) = next_interval_ms;
                break;
              case 3:
                id(pot_volume_deferred) = true;
                id(pot_volume_deferred_until_ms) = next_interval_ms;
                break;
            }
            return;
          }

          switch (channel) {
            case 0:
              id(arylic_eq_low_last_sent_ms) = now;
              id(arylic_eq_low_deferred) = false;
              id(arylic_set_bass).execute(clamped);
              break;
            case 1:
              id(arylic_eq_mid_last_sent_ms) = now;
              id(arylic_eq_mid_deferred) = false;
              id(arylic_set_mid).execute(clamped);
              break;
            case 2:
              id(arylic_eq_high_last_sent_ms) = now;
              id(arylic_eq_high_deferred) = false;
              id(arylic_set_treble).execute(clamped);
              break;
            case 3:
              id(arylic_last_vol_sent_ms) = now;
              id(pot_volume_deferred) = false;
              id(arylic_set_volume).execute(clamped);
              break;
          }

  - id: arylic_eq_reset_flat
    mode: restart
    then:
      - script.execute: note_user_input
      - script.execute: focus_audio
      - lambda: |-
          id(arylic_eq_low_cached) = 0;
          id(arylic_eq_mid_cached) = 0;
          id(arylic_eq_high_cached) = 0;
      - script.execute:
          id: arylic_set_bass
          target: 0
      - script.execute:
          id: arylic_set_mid
          target: 0
      - script.execute:
          id: arylic_set_treble
          target: 0

  - id: meta_override_cycle
    mode: restart
    then:
      - lambda: |-
          id(meta_refresh_force) = true;
          const uint32_t now = millis();
          id(meta_override_idx) = -1;
          id(meta_override_last_change_ms) = now;
          id(meta_override_last_active_ms) = now;
          id(meta_popup_label) = "TARGET";
          id(meta_popup_until_ms) = now + ${meta_popup_ms};
          id(control_target_popup_active) = false;
          ESP_LOGI("meta", "cycle target (MA)");
      - homeassistant.service:
          service: script.ma_cycle_target
      - delay: ${meta_override_settle_ms}ms
      - lambda: |-
          if (id(ma_active_friendly).has_state() && !id(ma_active_friendly).state.empty()) {
            id(meta_popup_label) = id(ma_active_friendly).state;
          }

  - id: arylic_set_volume
    mode: restart
    parameters:
      target: int
    then:
      - lambda: |-
          const uint32_t now = millis();
          const bool needs_prompt = false;
          auto pick_hosts = [&]() -> std::string {
            if (!id(arylic_control_hosts).empty()) return id(arylic_control_hosts);
            if (!id(arylic_control_host).empty()) return id(arylic_control_host);
            return std::string();
          };
          auto log_block = [&](const char *reason) {
            static uint32_t last_log_ms = 0;
            if (now - last_log_ms < (uint32_t) ${audio_gate_log_interval_ms}) return;
            last_log_ms = now;
            const bool ambiguous = id(ma_control_ambiguous).has_state() && id(ma_control_ambiguous).state;
            ESP_LOGW("audio_gate", "set_volume blocked (%s) needs_prompt=%d hosts='%s' host='%s' amb=%d",
                     reason,
                     needs_prompt ? 1 : 0,
                     id(arylic_control_hosts).c_str(),
                     id(arylic_control_host).c_str(),
                     ambiguous ? 1 : 0);
          };
          const std::string hosts = pick_hosts();
          bool playing = id(arylic_playing).has_state() && id(arylic_playing).state;
          if (!playing && id(ha_audio_state).has_state()) {
            std::string s = id(ha_audio_state).state.c_str();
            for (auto &c : s) c = (char) ::tolower(c);
            if (s == "playing") playing = true;
          }
          if (hosts.empty()) {
            id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
            log_block("no_hosts");
            return;
          }
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          int clamped = target;
          if (clamped < 0) clamped = 0;
          if (clamped > max_vol) clamped = max_vol;
          const bool tcp_ok = esphome::arylic_tcp::send_volume_multi(hosts, (uint16_t) id(arylic_control_port), clamped);
          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "VOL send failed target=%d", clamped);
          }
          id(arylic_last_vol_sent_ms) = now;
          id(arylic_last_vol_sent_target) = clamped;

  - id: arylic_set_eq_channel
    mode: restart
    parameters:
      channel: int
      target: int
    then:
      - lambda: |-
          const uint32_t now = millis();
          const bool needs_prompt = false;
          auto pick_hosts = [&]() -> std::string {
            if (!id(arylic_control_hosts).empty()) return id(arylic_control_hosts);
            if (!id(arylic_control_host).empty()) return id(arylic_control_host);
            return std::string();
          };
          const char *channel_name = "eq";
          const char *send_tag = "EQ";
          switch (channel) {
            case 0:
              channel_name = "bass";
              send_tag = "BAS";
              break;
            case 1:
              channel_name = "mid";
              send_tag = "MID";
              break;
            case 2:
              channel_name = "treble";
              send_tag = "TRE";
              break;
            default:
              return;
          }
          auto log_block = [&](const char *reason) {
            static uint32_t last_log_ms = 0;
            if (now - last_log_ms < (uint32_t) ${audio_gate_log_interval_ms}) return;
            last_log_ms = now;
            const bool ambiguous = id(ma_control_ambiguous).has_state() && id(ma_control_ambiguous).state;
            ESP_LOGW("audio_gate", "%s blocked (%s) needs_prompt=%d hosts='%s' host='%s' amb=%d",
                     channel_name,
                     reason,
                     needs_prompt ? 1 : 0,
                     id(arylic_control_hosts).c_str(),
                     id(arylic_control_host).c_str(),
                     ambiguous ? 1 : 0);
          };
          const std::string hosts = pick_hosts();
          bool playing = id(arylic_playing).has_state() && id(arylic_playing).state;
          if (!playing && id(ha_audio_state).has_state()) {
            std::string s = id(ha_audio_state).state.c_str();
            for (auto &c : s) c = (char) ::tolower(c);
            if (s == "playing") playing = true;
          }
          if (hosts.empty()) {
            id(audio_wake_until_ms) = now + ${audio_wake_hold_ms};
            log_block("no_hosts");
            return;
          }

          int clamped = target;
          const int eq_min = (int) ${eq_min};
          const int eq_max = (int) ${eq_max};
          if (clamped < eq_min) clamped = eq_min;
          if (clamped > eq_max) clamped = eq_max;

          bool tcp_ok = false;
          switch (channel) {
            case 0:
              tcp_ok = esphome::arylic_tcp::send_bass_multi(hosts, (uint16_t) id(arylic_control_port), clamped);
              id(arylic_last_bass_sent_ms) = now;
              id(arylic_bass_cached) = clamped;
              break;
            case 1:
              tcp_ok = esphome::arylic_tcp::send_mid_multi(hosts, (uint16_t) id(arylic_control_port), clamped);
              id(arylic_last_mid_sent_ms) = now;
              id(arylic_mid_cached) = clamped;
              break;
            case 2:
              tcp_ok = esphome::arylic_tcp::send_treble_multi(hosts, (uint16_t) id(arylic_control_port), clamped);
              id(arylic_last_treble_sent_ms) = now;
              id(arylic_treble_cached) = clamped;
              break;
          }

          if (!tcp_ok) {
            ESP_LOGW("arylic_tcp", "%s send failed target=%d", send_tag, clamped);
          }

