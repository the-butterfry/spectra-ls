          const uint32_t now = millis();
          static uint32_t last_invalid_log_ms = 0;
          std::string raw = x.c_str();
          std::string low = raw;
          for (auto &c : low) c = (char) ::tolower(c);
          if (raw.empty() || low == "unknown" || low == "unavailable" || low == "none" || low == "null") {
            if (now - last_invalid_log_ms > 15000) {
              last_invalid_log_ms = now;
              ESP_LOGW("ha_state", "ha_audio_position ignored non-numeric '%s'", raw.c_str());
            }
            return;
          }
          char *end = nullptr;
          float parsed = ::strtof(raw.c_str(), &end);
          if (end == raw.c_str()) {
            if (now - last_invalid_log_ms > 15000) {
              last_invalid_log_ms = now;
              ESP_LOGW("ha_state", "ha_audio_position parse failed '%s'", raw.c_str());
            }
            return;
          }
          while (*end == ' ' || *end == '\t' || *end == '\n' || *end == '\r') end++;
          if (*end != '\0') {
            if (now - last_invalid_log_ms > 15000) {
              last_invalid_log_ms = now;
              ESP_LOGW("ha_state", "ha_audio_position parse trailing '%s'", raw.c_str());
            }
            return;
          }
          if (parsed < 0.0f) parsed = 0.0f;
          const float prev = id(ha_audio_pos_last_value);
          id(ha_audio_pos_last_value) = parsed;
          const float delta = parsed - prev;
          const float abs_delta = delta < 0.0f ? -delta : delta;
          const bool first_sample = (id(ha_audio_pos_last_ms) == 0);
          if (first_sample || abs_delta >= 0.05f) {
            id(ha_audio_pos_last_ms) = now;
          }
