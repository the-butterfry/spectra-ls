          std::string src = id(arylic_source).has_state() ? id(arylic_source).state.c_str() : "";
          std::string next = (src == "BT") ? "NET" : "BT";
          const bool tcp_ok = esphome::arylic_tcp::send_source_multi(id(arylic_control_hosts), (uint16_t) id(arylic_control_port), next);
          if (!tcp_ok) {
