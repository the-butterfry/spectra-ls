# Description: Spectra LS diagnostics, OLED contrast controls, and test helpers.
# Version: 2026.04.17.4
# Last updated: 2026-04-17
# Update version/date whenever you change this file.
#
# Sections:
#  - OLED contrast control + diagnostics
#  - Virtual input test harness
#  - Test buttons

# === OLED contrast diagnostics ===
sensor:
  - platform: template
    name: "OLED Contrast Applied"
    id: oled_contrast_applied_state
    internal: true
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      float v = id(oled_contrast_last_applied);
      if (v < 0.0f) v = 0.0f;
      if (v > 1.0f) v = 1.0f;
      return v * 100.0f;

  - platform: template
    name: "OLED Contrast Raw"
    id: oled_contrast_raw_state
    internal: true
    accuracy_decimals: 0
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      int v = id(oled_contrast_last_applied_raw);
      if (v < 0) v = 0;
      if (v > 255) v = 255;
      return (float) v;

  - platform: cpu_usage
    name: "CPU Usage"
    id: cpu_usage_main
    update_interval: 30s
    unit_of_measurement: "%"
    accuracy_decimals: 1
    entity_category: diagnostic
    logging_enabled: true
    log_interval: 30s
    log_tasks_enabled: false
    log_tasks_top: 6
    log_tasks_interval: 30s
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("cpu_usage", "sensor update: CPU=%.1f%%", x);

  - platform: template
    name: "Heap Free"
    id: heap_free_kb
    unit_of_measurement: "KB"
    accuracy_decimals: 0
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;

  - platform: template
    name: "Heap Min Free"
    id: heap_min_free_kb
    unit_of_measurement: "KB"
    accuracy_decimals: 0
    update_interval: 60s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_minimum_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;

  - platform: template
    name: "PSRAM Total"
    id: psram_total_mb
    unit_of_measurement: "MB"
    accuracy_decimals: 2
    update_interval: 60s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_total_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);

  - platform: template
    name: "PSRAM Free"
    id: psram_free_mb
    unit_of_measurement: "MB"
    accuracy_decimals: 2
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      return heap_caps_get_free_size(MALLOC_CAP_SPIRAM) / (1024.0f * 1024.0f);

number:
  - platform: template
    name: "OLED Contrast"
    id: oled_contrast_set
    internal: false
    unit_of_measurement: "%"
    min_value: 0.0
    max_value: 1.0
    step: 0.05
    mode: slider
    update_interval: 30s
    lambda: |-
      float v = id(oled_contrast);
      if (v < 0.0f) v = 0.0f;
      if (v > 1.0f) v = 1.0f;
      return v;
    set_action:
      - lambda: |-
          float v = x;
          if (v < 0.0f) v = 0.0f;
          if (v > 1.0f) v = 1.0f;
          id(oled_contrast) = v;
      - lambda: |-
          float v = id(oled_contrast);
          if (v < 0.0f) v = 0.0f;
          if (v > 1.0f) v = 1.0f;
          const uint8_t contrast = (uint8_t) (v * 255.0f);
          id(oled_display).set_contrast(contrast);
          id(oled_contrast_last_applied) = v;
          id(oled_contrast_last_applied_raw) = contrast;
          id(oled_contrast_apply_count)++;
          id(oled_contrast_last_apply_ms) = millis();

  - platform: template
    name: "Virtual Mode Selector Index"
    id: virtual_mode_selector_index
    internal: false
    entity_category: diagnostic
    min_value: 0
    max_value: 4
    step: 1
    mode: box
    update_interval: 15s
    lambda: |-
      return (float) id(hardware_mode);
    set_action:
      - script.execute:
          id: sls_apply_mode_selector_index
          next_mode: !lambda |-
            return (int) x;

  - platform: template
    name: "Virtual Control Class Index"
    id: virtual_control_class_index
    internal: false
    entity_category: diagnostic
    min_value: 0
    max_value: 2
    step: 1
    mode: box
    update_interval: 15s
    lambda: |-
      return (float) id(control_class);
    set_action:
      - script.execute:
          id: sls_apply_control_class_index
          next_class: !lambda |-
            return (int) x;

text_sensor:
  - platform: template
    name: "OLED Contrast Debug"
    id: oled_contrast_debug
    internal: true
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      return str_sprintf("v=%.2f raw=%d count=%u ms=%u",
                         id(oled_contrast_last_applied),
                         id(oled_contrast_last_applied_raw),
                         (unsigned) id(oled_contrast_apply_count),
                         (unsigned) id(oled_contrast_last_apply_ms));

  - platform: template
    name: "Virtual Input Battery Status"
    id: virtual_input_battery_status
    internal: false
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      return str_sprintf("pass=%d fail=%d", id(virtual_input_test_pass_count), id(virtual_input_test_fail_count));

switch:
  - platform: template
    name: "CPU Usage Debug Logging"
    id: cpu_usage_debug_logging
    internal: false
    entity_category: diagnostic
    optimistic: true
    on_turn_on:
      - lambda: |-
          ESP_LOGI("cpu_usage", "CPU debug logging enabled (switch)");
          id(cpu_usage_main).set_logging_enabled(true);
    on_turn_off:
      - lambda: |-
          ESP_LOGI("cpu_usage", "CPU debug logging disabled (switch)");
          id(cpu_usage_main).set_logging_enabled(false);

# === Virtual input test harness ===
globals:
  - id: virtual_input_test_pass_count
    type: int
    restore_value: no
    initial_value: "0"
  - id: virtual_input_test_fail_count
    type: int
    restore_value: no
    initial_value: "0"

script:
  - id: run_virtual_input_battery
    mode: restart
    then:
      - lambda: |-
          id(virtual_input_test_pass_count) = 0;
          id(virtual_input_test_fail_count) = 0;
          ESP_LOGI("virt_test", "Battery start");

      - script.execute:
          id: sls_apply_mode_selector_index
          next_mode: ${hardware_mode_system_meta}
      - delay: 120ms
      - lambda: |-
          const bool ok = (id(hardware_mode) == ${hardware_mode_system_meta}) &&
                  id(menu_active) &&
                  (id(menu_level) == ${menu_level_gear});
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS mode=4 enters system/meta menu");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL mode=4 expected menu_active=1 menu_level=4");
          }

      - script.execute: sls_mode_nav_next_item
      - delay: 120ms
      - lambda: |-
          const bool ok = (id(menu_index) == 1);
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS next item increments index");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL next item expected menu_index=1 got=%d", id(menu_index));
          }

      - script.execute: sls_mode_nav_prev_item
      - delay: 120ms
      - lambda: |-
          const bool ok = (id(menu_index) == 0);
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS prev item decrements index");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL prev item expected menu_index=0 got=%d", id(menu_index));
          }

      - script.execute: sls_mode_nav_confirm
      - delay: 120ms
      - lambda: |-
          const bool ok = id(menu_active);
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS confirm processed without collapsing menu state");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL confirm expected menu_active=1");
          }

      - script.execute:
          id: sls_apply_control_class_index
          next_class: 2
      - delay: 100ms
      - lambda: |-
          const bool ok = (id(control_class) == 2);
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS control class index set to 2");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL control class expected 2 got=%d", id(control_class));
          }

      - script.execute:
          id: sls_apply_mode_selector_index
          next_mode: ${hardware_mode_lighting_rooms}
      - delay: 120ms
      - lambda: |-
          const bool ok = (id(hardware_mode) == ${hardware_mode_lighting_rooms}) &&
                  id(menu_active) &&
                  (id(menu_level) == ${menu_level_lighting_rooms});
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS mode=0 routes to room selection");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL mode=0 expected menu_level=5");
          }

      - script.execute:
          id: sls_apply_mode_selector_index
          next_mode: ${hardware_mode_lighting_targets}
      - delay: 120ms
      - lambda: |-
          const bool ok = (id(hardware_mode) == ${hardware_mode_lighting_targets}) &&
                  id(menu_active) &&
                  (id(menu_level) == ${menu_level_lighting_targets});
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS mode=1 routes to target selection");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL mode=1 expected menu_level=6");
          }

      - script.execute:
          id: sls_apply_mode_selector_index
          next_mode: ${hardware_mode_audio_targets}
      - delay: 120ms
      - lambda: |-
          const bool ok = (id(hardware_mode) == ${hardware_mode_audio_targets}) &&
                  !id(menu_active) &&
                  (id(menu_level) == ${menu_level_none}) &&
                  (id(screen_mode) == ${screen_mode_audio});
          if (ok) {
            id(virtual_input_test_pass_count)++;
            ESP_LOGI("virt_test", "PASS mode=2 routes to audio view");
          } else {
            id(virtual_input_test_fail_count)++;
            ESP_LOGE("virt_test", "FAIL mode=2 expected menu off + audio screen");
          }

      - lambda: |-
          ESP_LOGI("virt_test", "Battery complete pass=%d fail=%d",
                   id(virtual_input_test_pass_count),
                   id(virtual_input_test_fail_count));

# === Test helpers ===
button:
  - platform: template
    name: "Virtual Mode Next Item"
    id: virtual_mode_next_item
    internal: false
    entity_category: diagnostic
    on_press:
      - script.execute: sls_mode_nav_next_item

  - platform: template
    name: "Virtual Mode Prev Item"
    id: virtual_mode_prev_item
    internal: false
    entity_category: diagnostic
    on_press:
      - script.execute: sls_mode_nav_prev_item

  - platform: template
    name: "Virtual Mode Confirm"
    id: virtual_mode_confirm
    internal: false
    entity_category: diagnostic
    on_press:
      - script.execute: sls_mode_nav_confirm

  - platform: template
    name: "Run Virtual Input Battery"
    id: run_virtual_input_battery_button
    internal: false
    entity_category: diagnostic
    on_press:
      - script.execute: run_virtual_input_battery

  - platform: template
    name: "Arylic Test Volume 20"
    id: arylic_test_volume_20
    internal: true
    entity_category: diagnostic
    on_press:
      - script.execute:
          id: arylic_set_volume
          target: 20