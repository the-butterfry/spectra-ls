# Description: Lighting controls package for Spectra LS System.
# Version: 2026.04.21.5
# Last updated: 2026-04-21
# Update version/date whenever you change this file.

binary_sensor:
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 20
    name: "RP Lighting Enc Press"
    id: rp_lighting_enc_press
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Lighting Enc Press");
      - script.execute: note_user_input
      - script.execute: focus_lighting
      - lambda: |-
          if (id(lighting_adjust_mode) == 3) {
            id(lighting_adjust_mode) = 0;
            return;
          }
          id(lighting_mode_hue) = !id(lighting_mode_hue);
          id(hue_ring_active_until_ms) = millis() + ${ring_active_window_ms};
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 30
    name: "RP Lighting Preset"
    id: rp_lighting_preset
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Lighting Preset");
      - script.execute: note_user_input
      - script.execute: focus_lighting
      - script.execute: cycle_lighting_target
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    button_id: 31
    name: "RP Room Select"
    id: rp_room_select
    internal: true
    on_press:
      - lambda: |-
          ESP_LOGI("input", "Button RP Room Select");
      - script.execute: note_user_input
      - script.execute: focus_lighting
      - script.execute: cycle_room
  - platform: homeassistant
    id: ha_room_on
    name: "Room On (Dynamic)"
    entity_id: binary_sensor.control_board_room_on
    internal: true
  - platform: homeassistant
    id: ha_target_on
    name: "Target On (Dynamic)"
    entity_id: binary_sensor.control_board_target_on
    internal: true

sensor:
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: encoder
    sensor_id: 1
    name: "RP Lighting Enc Delta"
    id: rp_lighting_enc_delta
    internal: true
    accuracy_decimals: 0
    on_value:
      - script.execute: note_user_input
      - script.execute: focus_lighting
      - lambda: |-
          const int delta = (int) x;
          if (delta == 0) return;
          ESP_LOGI("input", "Encoder Lighting delta=%d", delta);
          if (id(lighting_adjust_mode) == 3) {
            float b = id(lighting_brightness) + (delta * 2.0f);
            if (b < 0.0f) b = 0.0f;
            if (b > 100.0f) b = 100.0f;
            id(lighting_brightness) = b;
            id(brightness_active_until_ms) = millis() + ${ring_active_window_ms};
            id(brightness_slider_only_until_ms) = millis() + ${ring_active_window_ms};
          } else if (id(lighting_mode_hue)) {
            float h = id(lighting_hue) + (delta * ${lighting_hue_step_deg});
            while (h < 0.0f) h += 360.0f;
            while (h >= 360.0f) h -= 360.0f;
            id(lighting_hue) = h;
            id(hue_ring_active_until_ms) = millis() + ${ring_active_window_ms};
          } else {
            float s = id(lighting_sat) + (delta * ${lighting_sat_step});
            if (s < 0.0f) s = 0.0f;
            if (s > 100.0f) s = 100.0f;
            id(lighting_sat) = s;
            id(hue_ring_active_until_ms) = millis() + ${ring_active_window_ms};
          }
      - if:
          condition:
            lambda: |-
              return id(lighting_adjust_mode) == 3;
          then:
            - script.execute: apply_lighting_brightness
          else:
            - script.execute: apply_lighting_color
  - platform: rp2040_uart
    rp2040_uart_id: rp2040_uart_hub
    type: analog
    sensor_id: 101
    name: "RP Lighting Slider Raw"
    id: rp_lighting_slider_raw
    internal: true
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          const bool room_target_menu_active = id(menu_active) &&
                                               (id(menu_level) == ${menu_level_lighting_rooms} || id(menu_level) == ${menu_level_lighting_targets});
          const bool lighting_menu_active = id(menu_active) &&
                                            (id(menu_level) == ${menu_level_lighting_rooms} ||
                                             id(menu_level) == ${menu_level_lighting_targets} ||
                                             id(menu_level) == ${menu_level_lighting_adjust} ||
                                             id(menu_level) == ${menu_level_lighting_toggle});
          if (room_target_menu_active) {
            id(note_menu_input).execute();
          } else {
            id(note_user_input).execute();
          }
          id(focus_lighting).execute();
      - script.execute: refresh_menu_counts
      - lambda: |-
          static float last_sent_pct = -1000.0f;
          const uint32_t now = millis();
          const bool lighting_menu_active = id(menu_active) &&
                          (id(menu_level) == ${menu_level_lighting_rooms} ||
                           id(menu_level) == ${menu_level_lighting_targets} ||
                           id(menu_level) == ${menu_level_lighting_adjust} ||
                           id(menu_level) == ${menu_level_lighting_toggle});
          float clamped = (float) x;
          if (clamped < 0.0f) clamped = 0.0f;
          if (clamped > 100.0f) clamped = 100.0f;
          if (last_sent_pct > -900.0f && fabsf(clamped - last_sent_pct) < 0.01f) return;
          last_sent_pct = clamped;
          int room_count = id(menu_room_count);
          if (room_count <= 0) room_count = 4;
          int target_count = id(menu_target_count);
          if (target_count <= 0) {
            const int room = id(menu_light_room);
            target_count = (room == 0) ? 4 : 2;
          }
          bool selection_changed = false;
          const int prev_room = id(selected_room);
          const int prev_target = id(selected_target);
          int next_room = prev_room;
          int next_target = prev_target;
          if (id(menu_active)) {
            if (id(menu_level) == ${menu_level_lighting_rooms}) {
              const int idx = id(menu_index);
              if (idx >= 0 && idx < room_count) {
                next_room = idx;
                next_target = 0;
              }
            } else if (id(menu_level) == ${menu_level_lighting_targets}) {
              const int room = id(menu_light_room);
              const int count = target_count + 1;
              const int back_idx = count - 1;
              const int idx = id(menu_index);
              if (idx >= 0 && idx < back_idx) {
                int target = idx;
                next_room = room;
                next_target = target;
              }
            }
          }
          if (next_room != prev_room) {
            id(selected_room) = next_room;
            selection_changed = true;
          }
          if (next_target != prev_target) {
            id(selected_target) = next_target;
            selection_changed = true;
          }
          if (selection_changed) {
            id(push_room_select_to_ha).execute();
            id(push_target_select_to_ha).execute();
          }
          id(lighting_brightness) = clamped;
          id(brightness_active_until_ms) = now + ${ring_active_window_ms};
          id(brightness_slider_only_until_ms) = now + ${ring_active_window_ms};
          if (${lighting_slider_force_brightness_mode}) {
            id(lighting_adjust_mode) = 3;
          }
          if (lighting_menu_active) {
            id(lighting_brightness_pending) = false;
            id(apply_lighting_brightness).execute();
          } else {
            id(lighting_return_to_audio_ms) = now + ${lighting_hold_ms};
            id(lighting_brightness_pending) = true;
            id(lighting_brightness_pending_until_ms) = now + ${brightness_send_interval_ms};
          }

interval:
  - interval: 250ms
    then:
      - lambda: |-
          const uint32_t now = millis();
          const bool lighting_activity_active = (now < id(brightness_active_until_ms)) ||
                                                (now < id(hue_ring_active_until_ms)) ||
                                                (now < id(brightness_slider_only_until_ms));

          if (id(lighting_resume_menu_pending) && !id(menu_active) && !lighting_activity_active) {
            id(menu_active) = true;
            int lvl = id(lighting_resume_menu_level);
            if (lvl < 1) lvl = ${menu_level_lighting_adjust};
            int idx = id(lighting_resume_menu_index);
            if (idx < 0) idx = 0;
            id(menu_level) = lvl;
            id(menu_index) = idx;
            id(screen_mode) = 0;
            id(lighting_menu_hold_until_ms) = now + ${lighting_menu_return_hold_ms};
            id(lighting_resume_menu_pending) = false;
            id(lighting_adjust_mode) = 0;
            id(lighting_return_to_audio_ms) = 0;
            id(compute_display_state).execute();
            return;
          }

          if (id(menu_active) && id(lighting_menu_hold_until_ms) > 0 && now >= id(lighting_menu_hold_until_ms)) {
            id(menu_active) = false;
            id(menu_level) = 0;
            id(menu_index) = 0;
            id(lighting_menu_hold_until_ms) = 0;
            if (id(playing_effective)) {
              id(screen_mode) = 1;
            } else {
              id(screen_mode) = 0;
            }
            id(compute_display_state).execute();
            return;
          }

          if (id(lighting_adjust_mode) != 3) return;
          if (id(menu_active)) {
            id(lighting_adjust_mode) = 0;
            return;
          }
          if (id(brightness_slider_only_until_ms) > 0 && now > id(brightness_slider_only_until_ms)) {
            id(lighting_adjust_mode) = 0;
          }
          if (id(lighting_brightness_pending)) {
            if (id(menu_active)) {
              id(lighting_brightness_pending) = false;
              return;
            }
            if (now >= id(lighting_brightness_pending_until_ms)) {
              const uint32_t min_interval = (uint32_t) ${brightness_send_interval_ms};
              if (now - id(last_brightness_sent_ms) >= min_interval) {
                id(lighting_brightness_pending) = false;
                id(apply_lighting_brightness).execute();
              } else {
                id(lighting_brightness_pending_until_ms) = id(last_brightness_sent_ms) + min_interval;
              }
            }
          }

number:
  - platform: template
    name: "Lighting Brightness Set"
    id: lighting_brightness_set
    internal: true
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    update_interval: 500ms
    lambda: |-
      return id(lighting_brightness);
    set_action:
      - lambda: |-
          float clamped = x;
          if (clamped < 0.0f) clamped = 0.0f;
          if (clamped > 100.0f) clamped = 100.0f;
          id(lighting_brightness) = clamped;
          id(brightness_active_until_ms) = millis() + ${ring_active_window_ms};
      - script.execute: apply_lighting_brightness

text_sensor:
  - platform: homeassistant
    id: ha_room_options
    entity_id: ${input_select_room}
    attribute: options
    internal: true

  - platform: homeassistant
    id: ha_room_options_catalog
    entity_id: sensor.control_board_room_options
    internal: true

  - platform: homeassistant
    id: ha_target_options
    entity_id: ${input_select_target}
    attribute: options
    internal: true

  - platform: homeassistant
    id: ha_target_options_catalog
    entity_id: sensor.control_board_target_options
    internal: true

  - platform: homeassistant
    id: ha_room_area_id
    entity_id: sensor.control_board_room_area_id
    internal: true

  - platform: homeassistant
    id: ha_target_entity_id
    entity_id: sensor.control_board_target_entity_id
    internal: true


  - platform: homeassistant
    id: ha_room_select
    entity_id: ${input_select_room}
    internal: true
    on_value:
      - lambda: |-
          std::string value = x.c_str();
          auto parse_options = [](const std::string &raw) {
            std::vector<std::string> out;
            std::string token;
            bool in_quote = false;
            char quote_char = 0;
            auto trim = [](std::string &v) {
              size_t start = v.find_first_not_of(" \t\n\r");
              size_t end = v.find_last_not_of(" \t\n\r");
              if (start == std::string::npos || end == std::string::npos) {
                v.clear();
                return;
              }
              v = v.substr(start, end - start + 1);
            };
            auto is_placeholder = [](const std::string &v) {
              if (v.empty()) return true;
              std::string low = v;
              for (auto &c : low) c = (char) ::tolower(c);
              return low == "unknown" || low == "unavailable" || low == "none" || low == "null" || low == "idle";
            };
            for (char ch : raw) {
              if ((ch == '\'' || ch == '"')) {
                if (!in_quote) { in_quote = true; quote_char = ch; continue; }
                if (quote_char == ch) { in_quote = false; continue; }
              }
              if (!in_quote && (ch == '[' || ch == ']')) continue;
              if (!in_quote && ch == ',') {
                trim(token);
                if (!token.empty() && !is_placeholder(token)) out.push_back(token);
                token.clear();
                continue;
              }
              token.push_back(ch);
            }
            trim(token);
            if (!token.empty() && !is_placeholder(token)) out.push_back(token);
            return out;
          };

          std::vector<std::string> rooms;
          if (id(ha_room_options).has_state()) {
            rooms = parse_options(id(ha_room_options).state.c_str());
          }
          int idx = -1;
          for (size_t i = 0; i < rooms.size(); i++) {
            if (rooms[i] == value) { idx = (int) i; break; }
          }
          if (idx >= 0) {
            id(selected_room) = idx;
          } else {
            if (value == "${room_label_living}") id(selected_room) = 0;
            else if (value == "${room_label_dining}") id(selected_room) = 1;
            else if (value == "${room_label_kitchen}") id(selected_room) = 2;
            else if (value == "${room_label_bedroom}") id(selected_room) = 3;
          }
      - script.execute: sync_lighting_from_ha
  - platform: homeassistant
    id: ha_target_select
    entity_id: ${input_select_target}
    internal: true
    on_value:
      - lambda: |-
          std::string value = x.c_str();
          auto parse_options = [](const std::string &raw) {
            std::vector<std::string> out;
            std::string token;
            bool in_quote = false;
            char quote_char = 0;
            auto trim = [](std::string &v) {
              size_t start = v.find_first_not_of(" \t\n\r");
              size_t end = v.find_last_not_of(" \t\n\r");
              if (start == std::string::npos || end == std::string::npos) {
                v.clear();
                return;
              }
              v = v.substr(start, end - start + 1);
            };
            auto is_placeholder = [](const std::string &v) {
              if (v.empty()) return true;
              std::string low = v;
              for (auto &c : low) c = (char) ::tolower(c);
              return low == "unknown" || low == "unavailable" || low == "none" || low == "null" || low == "idle";
            };
            for (char ch : raw) {
              if ((ch == '\'' || ch == '"')) {
                if (!in_quote) { in_quote = true; quote_char = ch; continue; }
                if (quote_char == ch) { in_quote = false; continue; }
              }
              if (!in_quote && (ch == '[' || ch == ']')) continue;
              if (!in_quote && ch == ',') {
                trim(token);
                if (!token.empty() && !is_placeholder(token)) out.push_back(token);
                token.clear();
                continue;
              }
              token.push_back(ch);
            }
            trim(token);
            if (!token.empty() && !is_placeholder(token)) out.push_back(token);
            return out;
          };

          std::vector<std::string> targets;
          if (id(ha_target_options).has_state()) {
            targets = parse_options(id(ha_target_options).state.c_str());
          }
          int idx = -1;
          for (size_t i = 0; i < targets.size(); i++) {
            if (targets[i] == value) { idx = (int) i; break; }
          }
          if (idx >= 0) {
            id(selected_target) = idx;
          } else {
            const int room = id(selected_room);
            int target = id(selected_target);
            if (value == "${target_label_all}") {
              target = 0;
            } else if (room == 0) {
              if (value == "${target_label_star}") target = 1;
              else if (value == "${target_label_tube}") target = 2;
              else if (value == "${target_label_reading}") target = 3;
            } else if (room == 1) {
              if (value == "${target_label_chandelier}") target = 1;
            } else if (room == 2) {
              if (value == "${target_label_polaroid_clock}") target = 1;
            } else if (room == 3) {
              if (value == "${target_label_reading}") target = 1;
            }
            id(selected_target) = target;
          }
      - script.execute: sync_lighting_from_ha

  - platform: homeassistant
    id: ha_room_hs
    entity_id: sensor.control_board_room_hs
    internal: true
    on_value:
      - script.execute: sync_lighting_from_ha
  - platform: homeassistant
    id: ha_target_hs
    entity_id: sensor.control_board_target_hs
    internal: true
    on_value:
      - script.execute: sync_lighting_from_ha
  - platform: template
    name: "Selected Room"
    id: selected_room_label
    internal: true
    update_interval: 500ms
    lambda: |-
      if (id(ha_room_select).has_state()) {
        return std::string(id(ha_room_select).state.c_str());
      }
      const int room = id(selected_room);
      if (room == 0) return std::string("${room_label_living}");
      if (room == 1) return std::string("${room_label_dining}");
      if (room == 2) return std::string("${room_label_kitchen}");
      return std::string("${room_label_bedroom}");
  - platform: template
    name: "Selected Target"
    id: selected_target_label
    internal: true
    update_interval: 500ms
    lambda: |-
      if (id(ha_target_select).has_state()) {
        return std::string(id(ha_target_select).state.c_str());
      }
      const int room = id(selected_room);
      const int target = id(selected_target);
      if (target == 0) return std::string("${target_label_all}");
      if (room == 0) {
        if (target == 1) return std::string("${target_label_star}");
        if (target == 2) return std::string("${target_label_tube}");
        return std::string("${target_label_reading}");
      }
      if (room == 1) return std::string("${target_label_chandelier}");
      if (room == 2) return std::string("${target_label_polaroid_clock}");
      return std::string("${target_label_reading}");

script:
  - id: start_lighting_value_adjust
    mode: restart
    parameters:
      return_menu_level: int
      return_menu_index: int
      hue_mode: int
    then:
      - lambda: |-
          id(lighting_resume_menu_pending) = true;
          id(lighting_resume_menu_level) = return_menu_level;
          id(lighting_resume_menu_index) = return_menu_index;
          id(lighting_menu_hold_until_ms) = 0;
          id(lighting_adjust_mode) = 0;
          id(lighting_mode_hue) = (hue_mode != 0);
          id(lighting_return_to_audio_ms) = millis() + ${lighting_hold_ms};
          id(screen_mode) = 0;
          id(menu_active) = false;
          id(menu_level) = 0;
          id(menu_index) = 0;
      - script.execute: compute_display_state

  - id: focus_lighting
    mode: restart
    then:
      - lambda: |-
          id(lighting_return_to_audio_ms) = millis() + ${lighting_hold_ms};
          id(screen_mode) = 0;
      - script.execute: compute_display_state

  - id: sync_lighting_from_ha
    mode: restart
    then:
      - lambda: |-
          const int target = id(selected_target);
          std::string hs;
          if (target == 0) {
            if (id(ha_room_hs).has_state()) {
              hs = id(ha_room_hs).state.c_str();
            }
          } else {
            if (id(ha_target_hs).has_state()) {
              hs = id(ha_target_hs).state.c_str();
            }
          }

          if (hs.empty()) return;

          for (char &c : hs) {
            if (c == '[' || c == ']' || c == '(' || c == ')') c = ' ';
          }
          float h = 0.0f;
          float s = 0.0f;
          if (sscanf(hs.c_str(), "%f , %f", &h, &s) == 2 || sscanf(hs.c_str(), "%f %f", &h, &s) == 2) {
            if (h < 0.0f) h = 0.0f;
            if (h >= 360.0f) h = fmodf(h, 360.0f);
            if (s < 0.0f) s = 0.0f;
            if (s > 100.0f) s = 100.0f;
            id(lighting_hue) = h;
            id(lighting_sat) = s;
          }

  - id: cycle_room
    mode: restart
    then:
      - script.execute: refresh_menu_counts
      - lambda: |-
          int room_count = id(menu_room_count);
          if (room_count <= 0) room_count = 4;
          int room = id(selected_room) + 1;
          if (room >= room_count) room = 0;
          id(selected_room) = room;
          id(selected_target) = 0;
      - script.execute: push_room_select_to_ha
      - script.execute: push_target_select_to_ha
      - script.execute: focus_lighting
      - script.execute: sync_lighting_from_ha

  - id: cycle_lighting_target
    mode: restart
    then:
      - script.execute: refresh_menu_counts
      - lambda: |-
          int target_count = id(menu_target_count);
          if (target_count <= 0) {
            const int room = id(selected_room);
            target_count = (room == 0) ? 4 : 2;
          }
          int max_target = target_count - 1;
          if (max_target < 0) max_target = 0;
          int target = id(selected_target) + 1;
          if (target > max_target) target = 0;
          id(selected_target) = target;
      - script.execute: push_target_select_to_ha
      - script.execute: focus_lighting
      - script.execute: sync_lighting_from_ha

  - id: push_room_select_to_ha
    mode: restart
    then:
      - homeassistant.service:
          service: input_select.select_option
          data:
            entity_id: ${input_select_room}
            option: !lambda |-
              auto parse_options = [](const std::string &raw) {
                std::vector<std::string> out;
                std::string token;
                bool in_quote = false;
                char quote_char = 0;
                auto trim = [](std::string &v) {
                  size_t start = v.find_first_not_of(" \t\n\r");
                  size_t end = v.find_last_not_of(" \t\n\r");
                  if (start == std::string::npos || end == std::string::npos) {
                    v.clear();
                    return;
                  }
                  v = v.substr(start, end - start + 1);
                };
                for (char ch : raw) {
                  if ((ch == '\'' || ch == '"')) {
                    if (!in_quote) { in_quote = true; quote_char = ch; continue; }
                    if (quote_char == ch) { in_quote = false; continue; }
                  }
                  if (!in_quote && (ch == '[' || ch == ']')) continue;
                  if (!in_quote && ch == ',') {
                    trim(token);
                    if (!token.empty()) out.push_back(token);
                    token.clear();
                    continue;
                  }
                  token.push_back(ch);
                }
                trim(token);
                if (!token.empty()) out.push_back(token);
                return out;
              };

              if (id(ha_room_options).has_state()) {
                auto rooms = parse_options(id(ha_room_options).state.c_str());
                int idx = id(selected_room);
                if (idx < 0) idx = 0;
                if (idx >= (int) rooms.size()) idx = (int) rooms.size() - 1;
                if (!rooms.empty() && idx >= 0) return rooms[idx];
              }

              const int room = id(selected_room);
              if (room == 0) return std::string("${room_label_living}");
              if (room == 1) return std::string("${room_label_dining}");
              if (room == 2) return std::string("${room_label_kitchen}");
              return std::string("${room_label_bedroom}");

  - id: push_target_select_to_ha
    mode: restart
    then:
      - homeassistant.service:
          service: input_select.select_option
          data:
            entity_id: ${input_select_target}
            option: !lambda |-
              auto parse_options = [](const std::string &raw) {
                std::vector<std::string> out;
                std::string token;
                bool in_quote = false;
                char quote_char = 0;
                auto trim = [](std::string &v) {
                  size_t start = v.find_first_not_of(" \t\n\r");
                  size_t end = v.find_last_not_of(" \t\n\r");
                  if (start == std::string::npos || end == std::string::npos) {
                    v.clear();
                    return;
                  }
                  v = v.substr(start, end - start + 1);
                };
                for (char ch : raw) {
                  if ((ch == '\'' || ch == '"')) {
                    if (!in_quote) { in_quote = true; quote_char = ch; continue; }
                    if (quote_char == ch) { in_quote = false; continue; }
                  }
                  if (!in_quote && (ch == '[' || ch == ']')) continue;
                  if (!in_quote && ch == ',') {
                    trim(token);
                    if (!token.empty()) out.push_back(token);
                    token.clear();
                    continue;
                  }
                  token.push_back(ch);
                }
                trim(token);
                if (!token.empty()) out.push_back(token);
                return out;
              };

              if (id(ha_target_options).has_state()) {
                auto targets = parse_options(id(ha_target_options).state.c_str());
                int idx = id(selected_target);
                if (idx < 0) idx = 0;
                if (idx >= (int) targets.size()) idx = (int) targets.size() - 1;
                if (!targets.empty() && idx >= 0) return targets[idx];
              }

              const int room = id(selected_room);
              const int target = id(selected_target);
              if (target == 0) return std::string("${target_label_all}");
              if (room == 0) {
                if (target == 1) return std::string("${target_label_star}");
                if (target == 2) return std::string("${target_label_tube}");
                return std::string("${target_label_reading}");
              }
              if (room == 1) return std::string("${target_label_chandelier}");
              if (room == 2) return std::string("${target_label_polaroid_clock}");
              return std::string("${target_label_reading}");

  - id: apply_lighting_common
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          if (now - id(last_lighting_sent_ms) < ${lighting_send_interval_ms}) return;
          const bool has_target = id(ha_target_entity_id).has_state() && !id(ha_target_entity_id).state.empty();
          const bool has_area = id(ha_room_area_id).has_state() && !id(ha_room_area_id).state.empty();
          if (!has_target && !has_area) {
            ESP_LOGW("lighting", "skip apply_lighting_common: no target entity or area route");
            return;
          }
          id(last_lighting_sent_ms) = now;
          id(hue_ring_active_until_ms) = now + ${ring_active_window_ms};
      - homeassistant.service:
          service: ${ha_light_script}
          data:
            target_entity: !lambda |-
              if (id(ha_target_entity_id).has_state()) {
                return std::string(id(ha_target_entity_id).state.c_str());
              }
              return std::string("");
            area_id: !lambda |-
              if (id(ha_target_entity_id).has_state() && !id(ha_target_entity_id).state.empty()) return std::string("");
              if (id(ha_room_area_id).has_state()) return std::string(id(ha_room_area_id).state.c_str());
              return std::string("");
            hs: !lambda |-
              return str_sprintf("[%.1f, %.1f]", id(lighting_hue), id(lighting_sat));
            brightness: !lambda |-
              float b = id(lighting_brightness);
              if (b < 0.0f) b = 0.0f;
              if (b > 100.0f) b = 100.0f;
              return str_sprintf("%.1f", b);

