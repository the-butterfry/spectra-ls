                ESP_LOGW("lighting", "skip toggle_room_lights: missing room area id");

  - id: toggle_selected_light
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              const bool has_target = id(ha_target_entity_id).has_state() && !id(ha_target_entity_id).state.empty();
              const bool has_area = id(ha_room_area_id).has_state() && !id(ha_room_area_id).state.empty();
