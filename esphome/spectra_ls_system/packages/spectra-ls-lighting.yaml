  - id: toggle_room_lights
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(ha_room_area_id).has_state() && !id(ha_room_area_id).state.empty();
          then:
            - homeassistant.service:
                service: light.toggle
                data:
                  area_id: !lambda |-
