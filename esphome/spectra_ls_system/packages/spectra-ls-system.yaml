# === HTTP request (Arylic TCP status) ===
http_request:
  id: arylic_http
  useragent: esphome/${device_name}
  timeout: 1s
  verify_ssl: false

text_sensor:
  - platform: template
    name: "Arylic HTTP Transport"
    id: arylic_http_transport
    internal: false
    update_interval: 10s
    lambda: |-
      std::string scheme = id(arylic_http_scheme_active);
      std::string host = id(arylic_http_host_active);
      int port = id(arylic_http_port_active);
      auto clean = [](std::string value) {
        for (auto &c : value) c = (char) ::tolower(c);
        return value;
      };
      std::string low_scheme = clean(scheme);
      std::string low_host = clean(host);
      if (scheme.empty() || host.empty()) return std::string("unknown");
      if (low_scheme == "unknown" || low_scheme == "unavailable" || low_scheme == "none") return std::string("unknown");
      if (low_host == "unknown" || low_host == "unavailable" || low_host == "none") return std::string("unknown");
      if (port <= 0 || port > 65534) return std::string("unknown");
      return scheme + "://" + host + ":" + std::to_string(port);
  - platform: template
    name: "Arylic HTTP Scheme"
    id: arylic_http_scheme
    internal: false
    update_interval: 10s
    lambda: |-
      std::string scheme = id(arylic_http_scheme_active);
      std::string low = scheme;
      for (auto &c : low) c = (char) ::tolower(c);
      if (low == "http" || low == "https") return low;
      return std::string("unknown");

# === System intervals ===
interval:
  - interval: ${arylic_http_poll_ms}ms
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - if:
                condition:
                  lambda: |-
                    const uint32_t now = millis();
                    const bool http_enabled = ${arylic_http_enabled};
                    if (!http_enabled) return false;
                    if (id(arylic_http_inflight)) return false;
                    if (id(arylic_http_pause_until_ms) > now) return false;

                    auto clean = [](std::string value) -> std::string {
                      size_t start = value.find_first_not_of(" \t");
                      size_t end = value.find_last_not_of(" \t");
                      if (start == std::string::npos || end == std::string::npos) return std::string();
                      value = value.substr(start, end - start + 1);
                      std::string low = value;
                      for (auto &c : low) c = (char) ::tolower(c);
                      if (low.empty() || low == "unknown" || low == "unavailable" || low == "none" || low == "null") {
                        return std::string();
                      }
                      return value;
                    };

                    auto first_csv = [&](const std::string &csv) -> std::string {
                      if (csv.empty()) return std::string();
                      size_t comma = csv.find(',');
                      if (comma == std::string::npos) return clean(csv);
                      return clean(csv.substr(0, comma));
                    };

                    std::string probe_host = clean(id(arylic_control_host));
                    if (probe_host.empty()) {
                      probe_host = first_csv(id(arylic_control_hosts));
                    }
                    if (probe_host.empty()) {
                      probe_host = clean("${arylic_http_host}");
                    }
                    if (probe_host.empty()) {
                      return false;
                    }

                    if (probe_host != id(arylic_http_host_active)) {
                      id(arylic_http_host_active) = probe_host;
                      id(arylic_http_scheme_active) = "${arylic_http_scheme}";
                      id(arylic_http_port_active) = ${arylic_http_port};
                      id(arylic_http_fail_count) = 0;
                      id(arylic_http_pause_until_ms) = 0;
                      ESP_LOGI("arylic_http", "probe host switched -> %s (start %s:%d)",
                               id(arylic_http_host_active).c_str(),
                               id(arylic_http_scheme_active).c_str(),
                               id(arylic_http_port_active));
                    }

                    id(arylic_http_inflight) = true;
                    return true;
                then:
                  - http_request.get:
                      url: !lambda |-
                        if (id(arylic_http_host_active).empty()) id(arylic_http_host_active) = "${arylic_http_host}";
                        if (id(arylic_http_scheme_active).empty()) id(arylic_http_scheme_active) = "${arylic_http_scheme}";
                        if (id(arylic_http_port_active) <= 0) id(arylic_http_port_active) = ${arylic_http_port};
                        const std::string url = id(arylic_http_scheme_active) + "://" + id(arylic_http_host_active) + ":" +
                                                std::to_string(id(arylic_http_port_active)) +
                                                "/httpapi.asp?command=getPlayerStatus";
                        return url;
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              id(arylic_http_inflight) = false;
                              if (response->status_code < 200 || response->status_code >= 300) {
                                int fails = id(arylic_http_fail_count) + 1;
                                id(arylic_http_fail_count) = fails;
                                const uint32_t backoff_ms = (fails >= 6) ? 60000 : (fails >= 4) ? 30000 : (fails >= 2) ? 15000 : 5000;
                                id(arylic_http_pause_until_ms) = millis() + backoff_ms;
                                if (fails >= 2) {
                                  const bool use_https = id(arylic_http_scheme_active) == "https";
                                  id(arylic_http_scheme_active) = use_https ? "http" : "https";
                                  id(arylic_http_port_active) = use_https ? 80 : 443;
                                  id(arylic_http_fail_count) = 0;
                                  id(arylic_http_pause_until_ms) = millis() + 1000;
                                  ESP_LOGW("arylic_http", "probe fallback switch host=%s -> %s:%d",
                                           id(arylic_http_host_active).c_str(),
                                           id(arylic_http_scheme_active).c_str(),
                                           id(arylic_http_port_active));
                                  return;
                                }
                                ESP_LOGW("arylic_http", "getPlayerStatus http=%d host=%s scheme=%s port=%s (backoff %ums, fail=%d)",
                                         response->status_code,
                                         id(arylic_http_host_active).c_str(), id(arylic_http_scheme_active).c_str(), std::to_string(id(arylic_http_port_active)).c_str(),
                                         (unsigned) backoff_ms, fails);
                                return;
                              }
                              id(arylic_http_fail_count) = 0;
                              id(arylic_http_pause_until_ms) = 0;
                              const std::string &payload = body;
                              if (payload.empty()) return;
                              const uint32_t now_ms = millis();

                              auto extract_field = [&](const std::string &key) -> std::string {
                                const std::string needle = "\"" + key + "\":";
                                size_t pos = payload.find(needle);
                                if (pos == std::string::npos) return std::string();
                                pos += needle.size();
                                while (pos < payload.size() && payload[pos] == ' ') pos++;
                                bool quoted = (pos < payload.size() && payload[pos] == '"');
                                if (quoted) pos++;
                                size_t end = pos;
                                if (quoted) {
                                  end = payload.find('"', pos);
                                } else {
                                  while (end < payload.size() && payload[end] != ',' && payload[end] != '}' && payload[end] != ' ') end++;
                                }
                                if (end == std::string::npos || end < pos) return std::string();
                                return payload.substr(pos, end - pos);
                              };

                              auto to_int = [&](const std::string &s, int fallback) -> int {
                                if (s.empty()) return fallback;
                                char *end = nullptr;
                                long v = strtol(s.c_str(), &end, 10);
                                if (end == s.c_str()) return fallback;
                                return (int) v;
                              };

                              auto hex_val = [&](char c) -> int {
                                if (c >= '0' && c <= '9') return c - '0';
                                if (c >= 'a' && c <= 'f') return 10 + (c - 'a');
                                if (c >= 'A' && c <= 'F') return 10 + (c - 'A');
                                return -1;
                              };

                              auto looks_like_hex = [&](const std::string &hex) -> bool {
                                if (hex.empty() || (hex.size() % 2) != 0) return false;
                                for (char c : hex) {
                                  if (hex_val(c) < 0) return false;
                                }
                                return true;
                              };

                              auto hex_to_ascii = [&](const std::string &hex) -> std::string {
                                if (!looks_like_hex(hex)) return hex;
                                std::string out;
                                out.reserve(hex.size() / 2);
                                for (size_t i = 0; i + 1 < hex.size(); i += 2) {
                                  int hi = hex_val(hex[i]);
                                  int lo = hex_val(hex[i + 1]);
                                  if (hi < 0 || lo < 0) return hex;
                                  out.push_back((char) ((hi << 4) | lo));
                                }
                                return out;
                              };

                              const std::string status = extract_field("status");
                              const int vol = to_int(extract_field("vol"), -1);
                              const int mute = to_int(extract_field("mute"), -1);
                              const int mode = to_int(extract_field("mode"), -1);
                              const int curpos = to_int(extract_field("curpos"), -1);
                              const int totlen = to_int(extract_field("totlen"), -1);
                              const int plicurr = to_int(extract_field("plicurr"), -1);
                              const int plicount = to_int(extract_field("plicount"), -1);
                              std::string title_raw = extract_field("Title");
                              std::string artist_raw = extract_field("Artist");
                              std::string album_raw = extract_field("Album");
                              if (title_raw.empty()) title_raw = extract_field("title");
                              if (artist_raw.empty()) artist_raw = extract_field("artist");
                              if (album_raw.empty()) album_raw = extract_field("album");

                              if (!status.empty()) {
                                id(arylic_playing_state) = (status == "play");
                              }
                              if (mute >= 0) {
                                id(arylic_mute_state) = (mute != 0);
                              }
                              if (vol >= 0) {
                                if (vol != id(arylic_volume_cached)) {
                                  id(audio_ring_active_until_ms) = millis() + ${ring_active_window_ms};
                                }
                                id(arylic_volume_cached) = vol;
                              }
                              std::string src = id(arylic_source_state);
                              if (mode >= 0) {
                                src = "NET";
                                if (mode == 40) src = "LINE-IN";
                                else if (mode == 41) src = "BT";
                                else if (mode == 47) src = "LINE-IN2";
                                else if (mode == 43) src = "OPT";
                                else if (mode == 45) src = "COAX";
                                else if (mode == 49) src = "HDMI";
                                else if (mode == 51) src = "USBDAC";
                                else if (mode == 54) src = "PHONO";
                                else if (mode == 56) src = "OPT2";
                                else if (mode == 57) src = "COAX2";
                                else if (mode == 58) src = "ARC";
                                else if (mode == 0) src = "IDLE";
                                id(arylic_source_state) = src;
                              }

                              auto clean_meta = [&](const std::string &input) -> std::string {
                                if (input.empty()) return std::string();
                                std::string low;
                                low.reserve(input.size());
                                for (char ch : input) {
                                  if (ch >= 'A' && ch <= 'Z') low.push_back((char) (ch - 'A' + 'a'));
                                  else low.push_back(ch);
                                }
                                if (low == "unknown" || low == "unavailable" || low == "none" || low == "idle") {
                                  return std::string();
                                }
                                return input;
                              };

                              const std::string title = clean_meta(hex_to_ascii(title_raw));
                              const std::string artist = clean_meta(hex_to_ascii(artist_raw));
                              const std::string album = clean_meta(hex_to_ascii(album_raw));
                              const bool meta_changed = (title != id(arylic_title_state)) ||
                                                       (artist != id(arylic_artist_state)) ||
                                                       (album != id(arylic_album_state));
                              const uint32_t log_every_ms = 15000;
                              const bool should_log = meta_changed ||
                                                      (now_ms - id(arylic_http_last_log_ms) > log_every_ms);
                              if (should_log) {
                                id(arylic_http_last_log_ms) = now_ms;
                                ESP_LOGI("arylic_http",
                                         "status=%s src=%s vol=%d mute=%d pos=%d/%d transport=%s://%s:%d title='%s' artist='%s' album='%s'",
                                         status.empty() ? "" : status.c_str(),
                                         src.c_str(),
                                         vol,
                                         mute,
                                         curpos,
                                         totlen,
                                         id(arylic_http_scheme_active).c_str(),
                                         id(arylic_http_host_active).c_str(),
                                         id(arylic_http_port_active),
                                         title.c_str(),
                                         artist.c_str(),
                                         album.c_str());
                              }
                              const bool is_playing = (!status.empty() && status == "play");
                              if ((!title.empty() || !artist.empty() || !album.empty()) && is_playing) {
                                id(arylic_last_meta_ms) = now_ms;
                              }
                              id(arylic_title_state) = title;
                              id(arylic_artist_state) = artist;
                              id(arylic_album_state) = album;

                              if (curpos >= 0) id(arylic_meta_position_state) = curpos;
                              if (totlen >= 0) id(arylic_meta_duration_state) = totlen;
                              if (plicurr >= 0) id(arylic_meta_track_state) = plicurr;
                              if (plicount >= 0) id(arylic_meta_total_tracks_state) = plicount;
                              const bool has_time = (curpos > 0 || totlen > 0 || plicurr > 0 || plicount > 0);
                              if (has_time && is_playing) {
                                id(arylic_last_meta_ms) = now_ms;
                              }

                              id(arylic_meta_url_state) = "";
                              id(arylic_meta_cover_state) = "";
                              id(arylic_meta_codec_state) = "";
                              id(arylic_meta_format_state) = "";
                              id(arylic_meta_bitrate_state) = "";
                              id(arylic_meta_samplerate_state) = "";
                              id(arylic_meta_bitdepth_state) = "";
                              id(arylic_meta_channels_state) = "";
                      on_error:
                        then:
                          - lambda: |-
                              id(arylic_http_inflight) = false;
                              int fails = id(arylic_http_fail_count) + 1;
                              id(arylic_http_fail_count) = fails;
                              const uint32_t backoff_ms = (fails >= 6) ? 60000 : (fails >= 4) ? 30000 : (fails >= 2) ? 15000 : 5000;
                              id(arylic_http_pause_until_ms) = millis() + backoff_ms;
                              if (fails >= 2) {
                                const bool use_https = id(arylic_http_scheme_active) == "https";
                                id(arylic_http_scheme_active) = use_https ? "http" : "https";
                                id(arylic_http_port_active) = use_https ? 80 : 443;
                                id(arylic_http_fail_count) = 0;
                                id(arylic_http_pause_until_ms) = millis() + 1000;
                                ESP_LOGW("arylic_http", "probe fallback switch host=%s -> %s:%d",
                                         id(arylic_http_host_active).c_str(),
                                         id(arylic_http_scheme_active).c_str(),
                                         id(arylic_http_port_active));
                                return;
                              }
                              ESP_LOGW("arylic_http", "getPlayerStatus error host=%s scheme=%s port=%s (backoff %ums, fail=%d)",
                                       id(arylic_http_host_active).c_str(), id(arylic_http_scheme_active).c_str(), std::to_string(id(arylic_http_port_active)).c_str(),
                                       (unsigned) backoff_ms, fails);

  - interval: ${arylic_lr_http_poll_ms}ms
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - if:
                condition:
                  lambda: |-
                    const uint32_t now = millis();
                    const bool lr_http_enabled = ${arylic_lr_http_enabled};
                    if (!lr_http_enabled) return false;
                    if (id(arylic_http_inflight)) return false;
                    if (id(arylic_lr_http_inflight)) return false;
                    id(arylic_lr_http_inflight) = true;
                    return true;
                then:
                  - http_request.get:
                      url: !lambda |-
                        if (id(arylic_lr_http_scheme_active).empty()) id(arylic_lr_http_scheme_active) = "${arylic_lr_http_scheme}";
                        if (id(arylic_lr_http_port_active) <= 0) id(arylic_lr_http_port_active) = ${arylic_lr_http_port};
                        const std::string url = id(arylic_lr_http_scheme_active) + "://${arylic_lr_http_host}:" +
                                                std::to_string(id(arylic_lr_http_port_active)) +
                                                "/httpapi.asp?command=getPlayerStatus";
                        return url;
                      capture_response: true
                      on_response:
                        then:
                          - lambda: |-
                              id(arylic_lr_http_inflight) = false;
                              if (response->status_code < 200 || response->status_code >= 300) {
                                const bool use_https = id(arylic_lr_http_scheme_active) == "https";
                                id(arylic_lr_http_scheme_active) = use_https ? "http" : "https";
                                id(arylic_lr_http_port_active) = use_https ? 80 : 443;
                                ESP_LOGW("arylic_lr", "probe fallback switch host=%s -> %s:%d (http=%d)",
                                         "${arylic_lr_http_host}",
                                         id(arylic_lr_http_scheme_active).c_str(),
                                         id(arylic_lr_http_port_active),
                                         response->status_code);
                                ESP_LOGW("arylic_lr", "getPlayerStatus http=%d host=%s scheme=%s port=%s",
                                         response->status_code,
                                         "${arylic_lr_http_host}", id(arylic_lr_http_scheme_active).c_str(), std::to_string(id(arylic_lr_http_port_active)).c_str());
                                return;
                              }
                              const std::string &payload = body;
                              if (payload.empty()) return;

                              auto extract_field = [&](const std::string &key) -> std::string {
                                const std::string needle = "\"" + key + "\":";
                                size_t pos = payload.find(needle);
                                if (pos == std::string::npos) return std::string();
                                pos += needle.size();
                                while (pos < payload.size() && payload[pos] == ' ') pos++;
                                bool quoted = (pos < payload.size() && payload[pos] == '"');
                                if (quoted) pos++;
                                size_t end = pos;
                                if (quoted) {
                                  end = payload.find('"', pos);
                                } else {
                                  while (end < payload.size() && payload[end] != ',' && payload[end] != '}' && payload[end] != ' ') end++;
                                }
                                if (end == std::string::npos || end < pos) return std::string();
                                return payload.substr(pos, end - pos);
                              };

                              auto hex_val = [&](char c) -> int {
                                if (c >= '0' && c <= '9') return c - '0';
                                if (c >= 'a' && c <= 'f') return 10 + (c - 'a');
                                if (c >= 'A' && c <= 'F') return 10 + (c - 'A');
                                return -1;
                              };
                              auto looks_like_hex = [&](const std::string &hex) -> bool {
                                if (hex.empty() || (hex.size() % 2) != 0) return false;
                                for (char c : hex) {
                                  if (hex_val(c) < 0) return false;
                                }
                                return true;
                              };
                              auto hex_to_ascii = [&](const std::string &hex) -> std::string {
                                if (!looks_like_hex(hex)) return hex;
                                std::string out;
                                out.reserve(hex.size() / 2);
                                for (size_t i = 0; i + 1 < hex.size(); i += 2) {
                                  int hi = hex_val(hex[i]);
                                  int lo = hex_val(hex[i + 1]);
                                  if (hi < 0 || lo < 0) return hex;
                                  out.push_back((char) ((hi << 4) | lo));
                                }
                                return out;
                              };

                              auto to_int = [&](const std::string &s, int fallback) -> int {
                                if (s.empty()) return fallback;
                                char *end = nullptr;
                                long v = strtol(s.c_str(), &end, 10);
                                if (end == s.c_str()) return fallback;
                                return (int) v;
                              };

                              auto clean_meta = [&](const std::string &input) -> std::string {
                                if (input.empty()) return std::string();
                                std::string low;
                                low.reserve(input.size());
                                for (char ch : input) {
                                  if (ch >= 'A' && ch <= 'Z') low.push_back((char) (ch - 'A' + 'a'));
                                  else low.push_back(ch);
                                }
                                if (low == "unknown" || low == "unavailable" || low == "none" || low == "idle") {
                                  return std::string();
                                }
                                return input;
                              };

                              const std::string status = extract_field("status");
                              const int vol = to_int(extract_field("vol"), -1);
                              const int mute = to_int(extract_field("mute"), -1);
                              const int mode = to_int(extract_field("mode"), -1);
                              const int curpos = to_int(extract_field("curpos"), -1);
                              const int totlen = to_int(extract_field("totlen"), -1);
                              const uint32_t now_ms = millis();
                              std::string title_raw = extract_field("Title");
                              std::string artist_raw = extract_field("Artist");
                              std::string album_raw = extract_field("Album");
                              if (title_raw.empty()) title_raw = extract_field("title");
                              if (artist_raw.empty()) artist_raw = extract_field("artist");
                              if (album_raw.empty()) album_raw = extract_field("album");

                              const std::string title = clean_meta(hex_to_ascii(title_raw));
                              const std::string artist = clean_meta(hex_to_ascii(artist_raw));
                              const std::string album = clean_meta(hex_to_ascii(album_raw));

                              if (!status.empty()) {
                                id(arylic_lr_playing_state) = (status == "play");
                              }
                              std::string src = id(arylic_lr_source_state);
                              if (mode >= 0) {
                                src = "NET";
                                if (mode == 40) src = "LINE-IN";
                                else if (mode == 41) src = "BT";
                                else if (mode == 47) src = "LINE-IN2";
                                else if (mode == 43) src = "OPT";
                                else if (mode == 45) src = "COAX";
                                else if (mode == 49) src = "HDMI";
                                else if (mode == 51) src = "USBDAC";
                                else if (mode == 54) src = "PHONO";
                                else if (mode == 56) src = "OPT2";
                                else if (mode == 57) src = "COAX2";
                                else if (mode == 58) src = "ARC";
                                else if (mode == 0) src = "IDLE";
                                id(arylic_lr_source_state) = src;
                              }

                              const bool meta_changed = (title != id(arylic_lr_title_state)) ||
                                                       (artist != id(arylic_lr_artist_state)) ||
                                                       (album != id(arylic_lr_album_state));
                              const uint32_t log_every_ms = 15000;
                              const bool should_log = meta_changed || (now_ms - id(arylic_http_last_log_ms) > log_every_ms);
                              if (should_log) {
                                id(arylic_http_last_log_ms) = now_ms;
                                ESP_LOGI("arylic_lr",
                                         "status=%s src=%s vol=%d mute=%d pos=%d/%d transport=%s://%s:%d title='%s' artist='%s' album='%s'",
                                         status.empty() ? "" : status.c_str(),
                                         src.c_str(),
                                         vol,
                                         mute,
                                         curpos,
                                         totlen,
                                         id(arylic_lr_http_scheme_active).c_str(),
                                         "${arylic_lr_http_host}",
                                         id(arylic_lr_http_port_active),
                                         title.c_str(),
                                         artist.c_str(),
                                         album.c_str());
                              }

                              const bool is_playing = (!status.empty() && status == "play");
                              if ((title.empty() && artist.empty() && album.empty()) && !is_playing) {
                                // keep last meta timestamp for a short grace period only
                              } else if (!title.empty() || !artist.empty() || !album.empty() || (curpos > 0 || totlen > 0)) {
                                if (is_playing) {
                                  id(arylic_lr_last_meta_ms) = now_ms;
                                }
                              }

                              id(arylic_lr_title_state) = title;
                              id(arylic_lr_artist_state) = artist;
                              id(arylic_lr_album_state) = album;
                              if (curpos >= 0) id(arylic_lr_meta_position_state) = curpos;
                              if (totlen >= 0) id(arylic_lr_meta_duration_state) = totlen;
                      on_error:
                        then:
                          - lambda: |-
                              id(arylic_lr_http_inflight) = false;
                              const bool use_https = id(arylic_lr_http_scheme_active) == "https";
                              id(arylic_lr_http_scheme_active) = use_https ? "http" : "https";
                              id(arylic_lr_http_port_active) = use_https ? 80 : 443;
                              ESP_LOGW("arylic_lr", "probe fallback switch host=%s -> %s:%d",
                                       "${arylic_lr_http_host}",
                                       id(arylic_lr_http_scheme_active).c_str(),
                                       id(arylic_lr_http_port_active));
                              ESP_LOGW("arylic_lr", "getPlayerStatus error host=%s scheme=%s port=%s",
                                       "${arylic_lr_http_host}", id(arylic_lr_http_scheme_active).c_str(), std::to_string(id(arylic_lr_http_port_active)).c_str());
  - interval: ${heartbeat_interval_ms}ms
    then:
      - script.execute: log_status_burst

  - interval: ${screensaver_update_ms}ms
    then:
      - if:
          condition:
            lambda: |-
              const uint32_t now = millis();
              if (!id(ha_audio_state).has_state()) return false;
              std::string state = id(ha_audio_state).state.c_str();
              for (auto &c : state) c = (char) ::tolower(c);
              if (state != "playing") return false;
              const float duration = id(ha_audio_duration_value);
              const float pos = id(ha_audio_pos_last_value);
              if (duration <= 1.0f) return false;
              if (pos < (duration - 0.5f)) return false;
              if (now - id(ha_audio_pos_last_ms) < 1500) return false;
              if (now - id(ha_audio_last_meta_ms) < 1500) return false;
              if (now - id(ha_audio_last_force_refresh_ms) < 2000) return false;
              return true;
          then:
            - lambda: |-
                id(ha_audio_last_force_refresh_ms) = millis();
            - if:
                condition:
                  lambda: |-
                    return id(ma_active_target).has_state() && !id(ma_active_target).state.empty();
                then:
                  - homeassistant.service:
                      service: homeassistant.update_entity
                      data:
                        entity_id: !lambda 'return id(ma_active_target).state;'

# === Core scripts ===
script:
  - id: log_status_burst
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          std::string src = id(arylic_source).has_state() ? id(arylic_source).state.c_str() : "UNK";
          int vol = id(arylic_volume_cached);
          if (vol < 0 && id(arylic_volume).has_state()) vol = (int) id(arylic_volume).state;
          if (vol < 0) vol = 0;
          const bool muted = id(arylic_mute).has_state() ? id(arylic_mute).state : false;
          const bool playing = id(playing_effective);
          const int room = id(selected_room);
          const int target = id(selected_target);
          const char *room_label = (room == 0) ? "${room_label_living}" :
                                   (room == 1) ? "${room_label_dining}" :
                                   (room == 2) ? "${room_label_kitchen}" :
                                   "${room_label_bedroom}";
          const char *target_label = (target == 0) ? "${target_label_all}" :
                                     (room == 0 && target == 1) ? "${target_label_star}" :
                                     (room == 0 && target == 2) ? "${target_label_tube}" :
                                     (room == 0 && target == 3) ? "${target_label_reading}" :
                                     (room == 1 && target == 1) ? "${target_label_chandelier}" :
                                     (room == 2 && target == 1) ? "${target_label_polaroid_clock}" :
                                     (room == 3 && target == 1) ? "${target_label_reading}" :
                                     "${target_label_all}";
          std::string ma_target = id(ma_active_target).has_state() ? id(ma_active_target).state.c_str() : "";
          std::string ma_name = id(ma_active_friendly).has_state() ? id(ma_active_friendly).state.c_str() : "";
          if (ma_target.empty()) ma_target = "-";
          if (ma_name.empty()) ma_name = "-";
          ESP_LOGI("status",
                   "up=%ums src=%s vol=%d mute=%d play=%d room=%s target=%s ma_target=%s ma_name=%s hue=%.1f sat=%.1f bri=%.1f screen=%d menu=%d lvl=%d idle=%ums",
                   (unsigned) now,
                   src.c_str(),
                   vol,
                   muted ? 1 : 0,
                   playing ? 1 : 0,
                   room_label,
                   target_label,
                   ma_target.c_str(),
                   ma_name.c_str(),
                   id(lighting_hue),
                   id(lighting_sat),
                   id(lighting_brightness),
                   id(screen_mode),
                   id(menu_active) ? 1 : 0,
                   id(menu_level),
                   (unsigned) (now - id(last_input_ms)));

  - id: note_user_input
    mode: restart
    then:
      - lambda: |-
          const int LV_NONE = ${menu_level_none};
          static uint32_t last_log = 0;
          const uint32_t now = millis();
          id(last_input_ms) = now;
          if (now - last_log > 1000) {
            ESP_LOGI("input", "note_user_input (menu_active=%d calib=%d)", id(menu_active), id(calibration_active));
            last_log = now;
          }
          if (id(calibration_active)) return;
          id(menu_active) = false;
            id(menu_level) = LV_NONE;
      - script.execute: compute_display_state

  - id: note_menu_input
    mode: restart
    then:
      - lambda: |-
          static uint32_t last_log = 0;
          const uint32_t now = millis();
          id(last_input_ms) = now;
          id(menu_override_active) = true;
          if (now - last_log > 1000) {
            ESP_LOGI("input", "note_menu_input (menu_active=%d calib=%d)", id(menu_active), id(calibration_active));
            last_log = now;
          }
          if (id(calibration_active)) return;
      - script.execute: compute_display_state

  - id: start_auto_setup
    mode: restart
    then:
      - lambda: |-
          const int LV_CAL = ${menu_level_calibration};
          id(calibration_auto_active) = true;
          id(calibration_auto_channel) = 0;
          id(calibration_channel) = 0;
          id(calibration_step) = 0;
          id(calibration_min) = 0;
          id(calibration_mid) = 0;
          id(calibration_max) = 0;
          id(calibration_active) = true;
          id(menu_active) = true;
          id(menu_level) = LV_CAL;
          id(menu_index) = 0;
          id(calibration_channel_name) = "SLIDER A0";

  - id: calibration_capture_step
    mode: restart
    then:
      - lambda: |-
          int raw = 0;
          if (id(calibration_channel) == 0) raw = id(adc_raw_0);
          else if (id(calibration_channel) == 1) raw = id(adc_raw_1);
          else if (id(calibration_channel) == 2) raw = id(adc_raw_2);
          else if (id(calibration_channel) == 3) raw = id(adc_raw_3);
          else if (id(calibration_channel) == 4) raw = id(adc_raw_4);
          else if (id(calibration_channel) == 5) raw = id(adc_raw_5);
          else raw = id(adc_raw_6);

          if (id(calibration_step) == 0) {
            id(calibration_step) = 1;
            return;
          }
          if (id(calibration_step) == 1) {
            id(calibration_min) = raw;
            id(calibration_step) = 2;
            return;
          }
          if (id(calibration_step) == 2) {
            id(calibration_mid) = raw;
            id(calibration_step) = 3;
            return;
          }
          id(calibration_max) = raw;
          const int ch = id(calibration_channel);
          const int cmin = id(calibration_min);
          const int cmid = id(calibration_mid);
          const int cmax = id(calibration_max);
          if (ch == 0) { id(calibration_min_0) = cmin; id(calibration_mid_0) = cmid; id(calibration_max_0) = cmax; }
          else if (ch == 1) { id(calibration_min_1) = cmin; id(calibration_mid_1) = cmid; id(calibration_max_1) = cmax; }
          else if (ch == 2) { id(calibration_min_2) = cmin; id(calibration_mid_2) = cmid; id(calibration_max_2) = cmax; }
          else if (ch == 3) { id(calibration_min_3) = cmin; id(calibration_mid_3) = cmid; id(calibration_max_3) = cmax; }
          else if (ch == 4) { id(calibration_min_4) = cmin; id(calibration_mid_4) = cmid; id(calibration_max_4) = cmax; }
          else if (ch == 5) { id(calibration_min_5) = cmin; id(calibration_mid_5) = cmid; id(calibration_max_5) = cmax; }
          else { id(calibration_min_6) = cmin; id(calibration_mid_6) = cmid; id(calibration_max_6) = cmax; }
          if (id(calibration_auto_active)) {
            int next = id(calibration_auto_channel) + 1;
            if (next <= 6) {
              id(calibration_auto_channel) = next;
              id(calibration_channel) = next;
              id(calibration_step) = 0;
              id(calibration_min) = 0;
              id(calibration_mid) = 0;
              id(calibration_max) = 0;
              if (next == 0) id(calibration_channel_name) = "SLIDER A0";
              else if (next == 1) id(calibration_channel_name) = "SLIDER A1";
              else if (next == 2) id(calibration_channel_name) = "POT A2";
              else if (next == 3) id(calibration_channel_name) = "POT A3";
              else if (next == 4) id(calibration_channel_name) = "POT A4";
              else if (next == 5) id(calibration_channel_name) = "POT A5";
              else id(calibration_channel_name) = "POT A6";
              return;
            }
            id(calibration_auto_active) = false;
          }
          id(calibration_active) = false;
          id(calibration_step) = 0;
