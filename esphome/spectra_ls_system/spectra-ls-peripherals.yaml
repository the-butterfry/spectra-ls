# Description: Spectra LS OLED-only peripherals package (no LED rings) for Control Board v2.
# Version: 2026.04.20.17
# Last updated: 2026-04-20
# Update version/date whenever you change this file.
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

i2c:
  sda: ${oled_sda_pin}
  scl: ${oled_scl_pin}
  frequency: 800kHz
  scan: true

font:
  - file: "${ui_font_file}"
    id: font_mid
    size: ${now_playing_mid_font_size}
  - file: "/config/esphome/control-py/mdi.ttf"
    id: font_tile_icon
    size: ${menu_tile_icon_font_size}
    glyphs:
      - "\uF02A"
      - "\uF137"
      - "\uE8B8"
  - file: "/config/esphome/control-py/mdi.ttf"
    id: font_tile_icon_play
    size: ${menu_tile_icon_play_font_size}
    glyphs:
      - "\uF137"

interval:
  - interval: ${meta_refresh_tick_ms}ms
    then:
      - lambda: |-
          int start = (int) id(control_target_prompt_index);
          const uint32_t now = millis();
          const uint32_t refresh_ms = (uint32_t) ${meta_refresh_ms};
          const bool force_refresh = id(meta_refresh_force);
          if (!force_refresh && refresh_ms > 0 && id(np_last_compute_ms) > 0 && (now - id(np_last_compute_ms)) < refresh_ms) {
            return;
          }
          if (force_refresh) {
            id(meta_refresh_force) = false;
          }
          auto sanitize_ascii = [](const std::string &input) {
            std::string out;
            out.reserve(input.size());
            for (uint8_t ch : input) {
              if (ch >= 32 && ch < 127) {
                out.push_back((char) ch);
              } else if (ch == '\t' || ch == '\n' || ch == '\r') {
                out.push_back(' ');
              }
            }
            return out;
          };
          auto to_upper_ascii = [](const std::string &input) {
            std::string out;
            out.reserve(input.size());
            for (char ch : input) {
              if (ch >= 'a' && ch <= 'z') out.push_back((char) (ch - 32));
              else out.push_back(ch);
            }
            return out;
          };
          auto to_lower_ascii = [](const std::string &input) {
            std::string out;
            out.reserve(input.size());
            for (char ch : input) {
              if (ch >= 'A' && ch <= 'Z') out.push_back((char) (ch - 'A' + 'a'));
              else out.push_back(ch);
            }
            return out;
          };
          auto state_is_playing = [](const std::string &s) {
            std::string low = s;
            for (auto &c : low) c = (char) ::tolower(c);
            return low == "playing";
          };
          auto state_is_active = [](const std::string &s) {
            std::string low = s;
            for (auto &c : low) c = (char) ::tolower(c);
            return low == "playing" || low == "paused";
          };

          const bool state_active1 = id(ha_audio_state).has_state() && state_is_active(id(ha_audio_state).state.c_str());
          const bool state_playing1 = id(ha_audio_state).has_state() && state_is_playing(id(ha_audio_state).state.c_str());
          const uint32_t meta_stale_ms = (uint32_t) ${meta_stale_ms};
          const bool ha_recent_meta = id(ha_audio1_last_meta_ms) > 0 && (now - id(ha_audio1_last_meta_ms)) < meta_stale_ms;
          const bool ha_recent_pos = id(ha_audio_pos_last_ms) > 0 && (now - id(ha_audio_pos_last_ms)) < meta_stale_ms;
          const bool ha_playback_activity_recent = ha_recent_meta || ha_recent_pos;
          if (state_active1) id(ha_audio1_last_active_ms) = now;
          if (state_playing1 && ha_playback_activity_recent) id(ha_audio1_last_playing_ms) = now;
          bool playing_raw = false;
          bool ha_state_playing = false;
          if (state_playing1) { playing_raw = true; ha_state_playing = true; }
          if (!playing_raw && id(arylic_playing).has_state() && id(arylic_playing).state) {
            playing_raw = true;
          }
          if (!playing_raw && id(arylic_playing_state)) {
            playing_raw = true;
          }
          if (!playing_raw && id(arylic_lr_playing_state)) {
            playing_raw = true;
          }
          std::string ary_src;
          if (id(arylic_source).has_state() && !id(arylic_source).state.empty()) {
            ary_src = id(arylic_source).state.c_str();
          }
          if (ary_src.empty() && !id(arylic_source_state).empty()) {
            ary_src = id(arylic_source_state);
          }
          const std::string ary_src_low = to_lower_ascii(ary_src);
          const bool arylic_source_active = !ary_src.empty() && ary_src_low != "idle";
          const uint32_t meta_grace_ms = (uint32_t) ${meta_playing_grace_ms};
          auto meta_recent = [&](uint32_t last_ms) {
            return last_ms > 0 && (now - last_ms) < meta_grace_ms;
          };
          bool playing = playing_raw;
          if (!playing && id(last_playing_state)) {
            if (meta_recent(id(ha_audio1_last_meta_ms))) {
              playing = true;
            }
          }
          const bool arylic_recent = id(arylic_last_meta_ms) > 0 && (now - id(arylic_last_meta_ms)) < meta_stale_ms;
          const bool lr_recent = id(arylic_lr_last_meta_ms) > 0 && (now - id(arylic_lr_last_meta_ms)) < meta_stale_ms;
          const bool ha_recent_playing = id(ha_audio1_last_playing_ms) > 0 && (now - id(ha_audio1_last_playing_ms)) < meta_stale_ms;
          const std::string lr_src_low = to_lower_ascii(id(arylic_lr_source_state));
          const bool lr_source_active_state = !id(arylic_lr_source_state).empty() && lr_src_low != "idle";
          if (!playing && id(last_playing_state) &&
              ((arylic_recent && arylic_source_active) || (lr_recent && lr_source_active_state))) {
            playing = true;
          }
          auto activity_recent = [&](uint32_t meta_ms, uint32_t pos_ms) {
            uint32_t last = meta_ms;
            if (pos_ms > last) last = pos_ms;
            if (last == 0) return false;
            return (now - last) < meta_stale_ms;
          };
          const bool ha_activity_recent = activity_recent(id(ha_audio1_last_meta_ms), id(ha_audio_pos_last_ms));
          const bool arylic_activity_recent = arylic_source_active && activity_recent(id(arylic_last_meta_ms), id(arylic_last_meta_ms));
          const bool lr_activity_recent = lr_source_active_state && activity_recent(id(arylic_lr_last_meta_ms), id(arylic_lr_last_meta_ms));
          const bool any_activity_recent = ha_activity_recent || arylic_activity_recent || lr_activity_recent;
          if (!playing && ha_recent_playing) {
            playing = true;
          }
          const bool ha_state_playing_effective = ha_state_playing && ha_playback_activity_recent;
          if (playing && !arylic_source_active && !lr_source_active_state && !any_activity_recent && !ha_state_playing_effective && !ha_recent_playing) {
            playing = false;
          }
          if (playing_raw || (arylic_recent && arylic_source_active) || (lr_recent && lr_source_active_state) || ha_state_playing_effective) {
            id(last_playing_true_ms) = now;
          }
          const uint32_t playing_grace_ms = (uint32_t) ${meta_playing_grace_ms};
          const bool playing_grace = playing_grace_ms > 0 && id(last_playing_true_ms) > 0 && (now - id(last_playing_true_ms)) < playing_grace_ms;
          if (!playing && playing_grace) {
            playing = true;
          }
          if (playing != id(last_playing_state)) {
            id(last_playing_state) = playing;
          }
          id(playing_effective) = playing;
          if (${menu_debug}) {
            static int last_playing_log = -1;
            static uint32_t last_playing_log_ms = 0;
            if (((playing ? 1 : 0) != last_playing_log) && (now - last_playing_log_ms > 250)) {
              last_playing_log = playing ? 1 : 0;
              last_playing_log_ms = now;
              const std::string ha_state = id(ha_audio_state).has_state() ? id(ha_audio_state).state.c_str() : "";
              ESP_LOGI("playing_state",
                       "playing=%d ha='%s' meta1_ms=%u ary_ms=%u lr_ms=%u",
                       playing ? 1 : 0,
                       ha_state.c_str(),
                       (unsigned) id(ha_audio1_last_meta_ms),
                       (unsigned) id(arylic_last_meta_ms),
                       (unsigned) id(arylic_lr_last_meta_ms));
            }
          }

          int vol_live = -1;
          bool vol_from_pot_live = false;
          const bool pot_has = id(pot_volume_pct_cached) >= 0;
          if (pot_has) {
            vol_live = id(pot_volume_pct_cached);
            vol_from_pot_live = true;
          }
          if (vol_live < 0) {
            if (id(arylic_volume).has_state()) {
              vol_live = (int) id(arylic_volume).state;
            }
          }
          if (vol_live < 0) {
            vol_live = id(arylic_volume_cached);
          }
          if (vol_live < 0) vol_live = 0;
          id(np_disp_vol) = vol_live;
          id(np_disp_vol_from_pot) = vol_from_pot_live;

          std::string src = ary_src;
          if (src.empty() && !id(arylic_lr_source_state).empty()) {
            src = id(arylic_lr_source_state);
          }
          if (src.empty() && id(ha_audio_app).has_state() && !id(ha_audio_app).state.empty()) {
            src = id(ha_audio_app).state.c_str();
          }
          if (src.empty() && id(ha_audio_source).has_state() && !id(ha_audio_source).state.empty()) {
            src = id(ha_audio_source).state.c_str();
          }

          std::string ary_title = (id(arylic_title).has_state() && !id(arylic_title).state.empty()) ? id(arylic_title).state.c_str() : "";
          std::string ary_artist = (id(arylic_artist).has_state() && !id(arylic_artist).state.empty()) ? id(arylic_artist).state.c_str() : "";
          std::string ary_album = (id(arylic_album).has_state() && !id(arylic_album).state.empty()) ? id(arylic_album).state.c_str() : "";
          std::string ary_source = (id(arylic_source).has_state() && !id(arylic_source).state.empty()) ? id(arylic_source).state.c_str() : "";
          std::string lr_title = id(arylic_lr_title_state);
          std::string lr_artist = id(arylic_lr_artist_state);
          std::string lr_album = id(arylic_lr_album_state);
          std::string lr_source = id(arylic_lr_source_state);
          if (ary_title.empty() && !id(arylic_title_state).empty()) ary_title = id(arylic_title_state);
          if (ary_artist.empty() && !id(arylic_artist_state).empty()) ary_artist = id(arylic_artist_state);
          if (ary_album.empty() && !id(arylic_album_state).empty()) ary_album = id(arylic_album_state);
          if (ary_source.empty() && !id(arylic_source_state).empty()) ary_source = id(arylic_source_state);

          std::string title1 = (id(ha_audio_title).has_state() && !id(ha_audio_title).state.empty()) ? id(ha_audio_title).state.c_str() : "";
          std::string artist1 = (id(ha_audio_artist).has_state() && !id(ha_audio_artist).state.empty()) ? id(ha_audio_artist).state.c_str() : "";
          std::string album1 = (id(ha_audio_album).has_state() && !id(ha_audio_album).state.empty()) ? id(ha_audio_album).state.c_str() : "";
          std::string app1 = (id(ha_audio_app).has_state() && !id(ha_audio_app).state.empty()) ? id(ha_audio_app).state.c_str() : "";
          std::string source1 = (id(ha_audio_source).has_state() && !id(ha_audio_source).state.empty()) ? id(ha_audio_source).state.c_str() : "";

          auto has_meta = [](const std::string &t, const std::string &a, const std::string &al) {
            (void) al;
            return !t.empty() || !a.empty();
          };
          auto lower_ascii = [&](const std::string &input) {
            return to_lower_ascii(input);
          };
          auto clean_meta = [&](const std::string &input) {
            if (input.empty()) return std::string("");
            std::string low = lower_ascii(input);
            if (low == "unknown" || low == "unavailable" || low == "none" || low == "idle") return std::string("");
            if (low.find("http://") == 0 || low.find("https://") == 0 || low.find("://") != std::string::npos || low.find("www.") == 0) {
              return std::string("");
            }
            if ((low.find(".mp3") != std::string::npos || low.find(".flac") != std::string::npos || low.find(".wav") != std::string::npos ||
                 low.find(".m4a") != std::string::npos || low.find(".aac") != std::string::npos || low.find(".ogg") != std::string::npos) &&
                (input.find(' ') == std::string::npos || low.find("/") != std::string::npos || low.find("\\") != std::string::npos)) {
              return std::string("");
            }
            return input;
          };
          ary_title = clean_meta(ary_title);
          ary_artist = clean_meta(ary_artist);
          ary_album = clean_meta(ary_album);
          ary_source = clean_meta(ary_source);
          lr_title = clean_meta(lr_title);
          lr_artist = clean_meta(lr_artist);
          lr_album = clean_meta(lr_album);
          lr_source = clean_meta(lr_source);
          title1 = clean_meta(title1);
          artist1 = clean_meta(artist1);
          album1 = clean_meta(album1);
          source1 = clean_meta(source1);
          const bool play1 = state_playing1;
          const bool state_active1_now = state_active1;
          const bool arylic_source_active_now = !ary_source.empty() && lower_ascii(ary_source) != "idle";
          const bool ary_playing = id(arylic_playing).has_state() && id(arylic_playing).state;
          const bool arylic_active = ary_playing || arylic_source_active_now;
          const bool lr_has_meta = has_meta(lr_title, lr_artist, lr_album);

          const bool base_meta1 = has_meta(title1, artist1, album1);
          const bool base_info1 = base_meta1 || !app1.empty() || !source1.empty();
          const uint32_t meta1_ms = id(ha_audio1_last_meta_ms);
          const uint32_t meta_pos_stall_ms = (uint32_t) ${meta_pos_stall_ms};
          const float meta_end_tol_s = ${meta_end_tolerance_s};

          float duration1 = id(ha_audio_duration_value);
          float pos1 = id(ha_audio_pos_last_value);
          uint32_t pos1_ms = id(ha_audio_pos_last_ms);
          if (play1 && duration1 > 0.5f && pos1_ms == 0) {
            const uint32_t cached_ms = id(np_disp_pos_ms);
            const float cached_dur = id(np_disp_duration);
            const bool cached_recent = cached_ms > 0 && (now - cached_ms) < meta_stale_ms;
            const bool same_track_window = cached_dur > 0.5f && fabsf(cached_dur - duration1) <= 2.0f;
            if (cached_recent && same_track_window) {
              pos1 = id(np_disp_position);
              pos1_ms = cached_ms;
            } else {
              pos1_ms = now;
            }
          }
          if (play1 && pos1_ms > 0) {
            const float elapsed_s = (now - pos1_ms) / 1000.0f;
            if (elapsed_s > 0.0f) {
              pos1 += elapsed_s;
              pos1_ms = now;
            }
          }
          float ary_duration = id(arylic_meta_duration).has_state() ? id(arylic_meta_duration).state : 0.0f;
          float ary_pos = id(arylic_meta_position).has_state() ? id(arylic_meta_position).state : 0.0f;
          uint32_t ary_pos_ms = id(arylic_last_meta_ms);

          auto clamp_pos = [](float &pos, float duration) {
            if (pos < 0.0f) pos = 0.0f;
            if (duration > 0.5f && pos > duration) pos = duration;
          };
          clamp_pos(pos1, duration1);
          clamp_pos(ary_pos, ary_duration);

          auto activity_recent_slot = [&](uint32_t meta_ms, uint32_t pos_ms) {
            uint32_t last = meta_ms;
            if (pos_ms > last) last = pos_ms;
            if (last == 0) return true;
            return (now - last) < meta_stale_ms;
          };
          auto pos_stalled = [&](bool playing_now, uint32_t pos_ms) {
            return playing_now && pos_ms > 0 && (now - pos_ms) > meta_pos_stall_ms;
          };
          auto near_end = [&](bool playing_now, float pos, float duration) {
            if (!playing_now || duration <= 0.5f || pos <= 0.0f) return false;
            return (duration - pos) <= meta_end_tol_s;
          };
          auto slot_allowed = [&](bool active, bool playing_now, uint32_t meta_ms, uint32_t pos_ms,
                                  float pos, float duration, bool has_base_info) {
            if (!active) return false;
            if (!activity_recent_slot(meta_ms, pos_ms)) return false;
            if (pos_stalled(playing_now, pos_ms) && !has_base_info) return false;
            if (near_end(playing_now, pos, duration)) return false;
            return true;
          };

          auto active_with_grace = [&](bool active_now, bool playing_now, uint32_t last_active_ms, uint32_t last_playing_ms) {
            const uint32_t pause_timeout_ms = (uint32_t) ${meta_pause_timeout_ms};
            if (active_now) {
              if (playing_now) return true;
              if (pause_timeout_ms == 0 || last_playing_ms == 0) return false;
              return (now - last_playing_ms) < pause_timeout_ms;
            }
            if (last_active_ms == 0) return false;
            return (now - last_active_ms) < (uint32_t) ${meta_playing_grace_ms};
          };

          const bool active1 = active_with_grace(state_active1_now, play1, id(ha_audio1_last_active_ms), id(ha_audio1_last_playing_ms));
          const bool prefer_arylic_source = arylic_source_active_now && !play1;
          const bool slot1_active = !prefer_arylic_source && slot_allowed(active1, play1, meta1_ms, pos1_ms, pos1, duration1, base_info1);

          const bool arylic_recent2 = id(arylic_last_meta_ms) > 0 && (now - id(arylic_last_meta_ms)) < meta_stale_ms;
          const bool lr_recent2 = id(arylic_lr_last_meta_ms) > 0 && (now - id(arylic_lr_last_meta_ms)) < meta_stale_ms;
          const bool lr_source_active = !lr_source.empty() && lower_ascii(lr_source) != "idle";
          const bool lr_active = id(arylic_lr_playing_state) || lr_source_active;
          const bool arylic_allowed = arylic_active || arylic_recent2 || lr_active || lr_recent2;
          const bool arylic_has_meta = has_meta(ary_title, ary_artist, ary_album);
          bool use_lr = false;
          if ((lr_active || lr_recent2) && lr_has_meta && !arylic_has_meta) {
            use_lr = true;
            if (!lr_title.empty()) ary_title = lr_title;
            if (!lr_artist.empty()) ary_artist = lr_artist;
            if (!lr_album.empty()) ary_album = lr_album;
            if (!lr_source.empty()) ary_source = lr_source;
          }
          if (use_lr) {
            const int lr_dur_raw = id(arylic_lr_meta_duration_state);
            const int lr_pos_raw = id(arylic_lr_meta_position_state);
            ary_duration = (lr_dur_raw > 0) ? (float) lr_dur_raw : 0.0f;
            ary_pos = (lr_pos_raw > 0) ? (float) lr_pos_raw : 0.0f;
            ary_pos_ms = id(arylic_lr_last_meta_ms);
          }
          const bool arylic_has_time = (ary_duration > 0.5f) || (ary_pos > 0.5f);

          const bool has_meta1 = base_info1 && slot1_active;
          int meta_idx = -1;
          bool forced_meta = false;
          int override_idx = id(meta_override_idx);
          if (override_idx >= 0) {
            bool override_active = false;
            if (override_idx == 0) override_active = arylic_allowed && arylic_has_meta;
            else if (override_idx == 1) override_active = slot1_active && has_meta1;
            if (override_active) {
              id(meta_override_last_active_ms) = now;
            }
            const uint32_t reset_ms = (uint32_t) ${meta_override_reset_ms};
            if (reset_ms > 0 && id(meta_override_last_active_ms) > 0 && (now - id(meta_override_last_active_ms)) > reset_ms) {
              id(meta_override_idx) = -1;
              override_idx = -1;
            }
          }
          if (override_idx >= 0) {
            meta_idx = override_idx;
            forced_meta = true;
          }
          if (override_idx < 0) {
            const bool ary_playing_now = ary_playing || id(arylic_playing_state) || id(arylic_lr_playing_state);
            const uint32_t ary_meta_ms = use_lr ? id(arylic_lr_last_meta_ms) : id(arylic_last_meta_ms);
            if (prefer_arylic_source && arylic_allowed) {
              meta_idx = 0;
            } else if (slot1_active && has_meta1 && (play1 || state_active1_now || meta1_ms > 0)) {
              meta_idx = 1;
            } else if (arylic_allowed && arylic_has_meta && (ary_playing_now || ary_meta_ms > 0)) {
              meta_idx = 0;
            }
          }

          auto pick_text = [&](int idx, const std::string &v0, const std::string &v1) -> std::string {
            return (idx == 0) ? v0 : v1;
          };

          const std::string app0 = ary_source;
          std::string title = (meta_idx >= 0) ? pick_text(meta_idx, ary_title, title1) : "";
          std::string artist = (meta_idx >= 0) ? pick_text(meta_idx, ary_artist, artist1) : "";
          std::string album = (meta_idx >= 0) ? pick_text(meta_idx, ary_album, album1) : "";
          std::string app_label = (meta_idx >= 0) ? pick_text(meta_idx, app0, app1) : "";
          std::string source_raw = (meta_idx >= 0) ? pick_text(meta_idx, ary_source, source1) : "";
          std::string source_label = source_raw.empty() ? src : source_raw;
          const bool has_text_meta = !title.empty() || !artist.empty() || !album.empty();

          const bool recent_playing_cache = id(last_playing_true_ms) > 0 && (now - id(last_playing_true_ms)) < meta_stale_ms;
          const bool display_hold = playing || state_playing1 || recent_playing_cache;
          const bool playing_no_meta = display_hold && (meta_idx < 0 || !has_text_meta);
          if (!display_hold) {
            title.clear();
            artist.clear();
            album.clear();
            source_label.clear();
          }

          if (title.empty()) {
            std::string source_hint = source_raw.empty() ? source_label : source_raw;
            if (!source_hint.empty()) {
              std::string low = source_hint;
              for (auto &c : low) c = (char) ::tolower(c);
              if (low.find("airplay") != std::string::npos) {
                title = "TV";
              }
            }
          }

          const bool has_app = !app_label.empty();
          if (source_label.empty() && has_app) {
            source_label = app_label;
          }
          if (!source_label.empty() && !has_app) {
            std::string low = source_label;
            for (auto &c : low) c = (char) ::tolower(c);
            if (low.find("airplay") != std::string::npos) source_label = "AIR";
            else if (low.find("bluetooth") != std::string::npos || low == "bt") source_label = "BT";
            else if (low.find("network") != std::string::npos || low.find("net") != std::string::npos) source_label = "NET";
          }
          auto is_generic_source_placeholder = [&](const std::string &value) -> bool {
            if (value.empty()) return false;
            std::string low = value;
            for (auto &c : low) c = (char) ::tolower(c);
            std::string compact;
            compact.reserve(low.size());
            for (char c : low) {
              if ((c >= 'a' && c <= 'z') || (c >= '0' && c <= '9')) compact.push_back(c);
            }
            if (compact == "net" || compact == "network") return true;
            if (compact == "spectrals" || compact == "spectralevelsource") return true;
            if (compact.find("spectra") != std::string::npos && compact.find("ls") != std::string::npos) return true;
            return low == "net" || low == "network" || low == "spectra ls";
          };
          if (is_generic_source_placeholder(source_label)) source_label.clear();
          std::string source_raw_ctx = source_raw;
          if (is_generic_source_placeholder(source_raw_ctx)) source_raw_ctx.clear();
          std::string src_ctx = src;
          if (is_generic_source_placeholder(src_ctx)) src_ctx.clear();
          std::string app_label_ctx = app_label;
          if (is_generic_source_placeholder(app_label_ctx)) app_label_ctx.clear();
          const bool source_context = !source_label.empty() || !source_raw_ctx.empty() || !src_ctx.empty() || !app_label_ctx.empty();
          if (source_label.empty() && source_context) source_label = "SRC";
          std::string source_pill = source_label;
          if (source_pill.size() > 6) source_pill = source_pill.substr(0, 6);
          std::string src_display = src_ctx;
          if (src_display.empty()) src_display = source_label;
          if (!display_hold) {
            source_pill.clear();
            src_display.clear();
          }

          if (playing_no_meta) {
            if (!id(np_raw_title).empty()) title = id(np_raw_title);
            if (!id(np_raw_artist).empty()) artist = id(np_raw_artist);
            if (!id(np_raw_album).empty()) album = id(np_raw_album);
            if (!id(np_raw_source_label).empty()) source_label = id(np_raw_source_label);
            if (!id(np_raw_source_pill).empty()) source_pill = id(np_raw_source_pill);
            if (!id(np_raw_src_display).empty()) src_display = id(np_raw_src_display);
            if (is_generic_source_placeholder(source_label)) source_label.clear();
            if (is_generic_source_placeholder(source_pill)) source_pill.clear();
            if (is_generic_source_placeholder(src_display)) src_display.clear();
            if (title.empty()) {
              if (playing && !source_label.empty()) {
                title = source_label;
              } else if (playing) {
                title = "PLAYING";
              }
            }
          }

          if (is_generic_source_placeholder(title)) {
            title.clear();
          }

          if (!playing && !has_text_meta) {
            title.clear();
            source_label.clear();
            source_pill.clear();
            src_display.clear();
          }

          std::string log_title = sanitize_ascii(title);
          std::string log_artist = sanitize_ascii(artist);
          std::string log_album = sanitize_ascii(album);
          std::string log_source = sanitize_ascii(source_label);
          static int last_meta_idx = -2;
          static std::string last_meta_title;
          static std::string last_meta_artist;
          static std::string last_meta_album;
          static std::string last_meta_source;
          static uint32_t last_meta_log_ms = 0;
          static uint32_t last_meta_debug_ms = 0;
          if (${menu_debug}) {
            if (now - last_meta_debug_ms > 5000) {
              last_meta_debug_ms = now;
              ESP_LOGI("meta_dbg",
                       "play=%d s1=%d m1=%d ary=%d mA=%d src='%s'",
                       playing ? 1 : 0,
                       slot1_active ? 1 : 0, has_meta1 ? 1 : 0,
                       arylic_allowed ? 1 : 0, arylic_has_meta ? 1 : 0,
                       src_display.c_str());
            }
            if (meta_idx != last_meta_idx || log_title != last_meta_title || log_artist != last_meta_artist ||
                log_album != last_meta_album || log_source != last_meta_source) {
              if (now - last_meta_log_ms > 1000) {
                last_meta_idx = meta_idx;
                last_meta_title = log_title;
                last_meta_artist = log_artist;
                last_meta_album = log_album;
                last_meta_source = log_source;
                last_meta_log_ms = now;
                const char *pick = (meta_idx < 0) ? "none" : (meta_idx == 0) ? "arylic" : "ma";
                ESP_LOGI("meta",
                       "pick=%s forced=%d slots[ary=%d s1=%d] t='%s' ar='%s' al='%s' src='%s'",
                         pick,
                         forced_meta ? 1 : 0,
                         arylic_allowed ? 1 : 0,
                         slot1_active ? 1 : 0,
                         log_title.c_str(),
                         log_artist.c_str(),
                         log_album.c_str(),
                         log_source.c_str());
              }
            }
          }
          if (source_label.empty() && source_context) source_label = "SRC";
          if (src_display.empty()) src_display = source_label;

          if (!display_hold || (title.empty() && !playing_no_meta)) {
            title.clear();
            artist.clear();
            album.clear();
          }

          static bool last_playing_no_meta = false;
          static uint32_t last_playing_no_meta_ms = 0;
          if (${menu_debug}) {
            if (playing_no_meta != last_playing_no_meta) {
              last_playing_no_meta = playing_no_meta;
              last_playing_no_meta_ms = now;
              ESP_LOGW("meta_drop", "playing_no_meta=%d meta_idx=%d slots[ary=%d s1=%d] src='%s'",
                       playing_no_meta ? 1 : 0,
                       meta_idx,
                       arylic_allowed ? 1 : 0,
                       slot1_active ? 1 : 0,
                       src_display.c_str());
            } else if (playing_no_meta && (now - last_playing_no_meta_ms) > 5000) {
              last_playing_no_meta_ms = now;
              ESP_LOGW("meta_drop", "playing_no_meta still true meta_idx=%d src='%s'",
                       meta_idx, src_display.c_str());
            }
          }

          auto update_cached = [&](std::string &raw_store, std::string &cache_store, const std::string &incoming, bool upper) {
            if (raw_store == incoming) return false;
            raw_store = incoming;
            std::string sanitized = sanitize_ascii(incoming);
            if (upper) sanitized = to_upper_ascii(sanitized);
            cache_store = sanitized;
            return true;
          };
          bool cache_changed = false;
          cache_changed |= update_cached(id(np_raw_title), id(np_title_cached), title, false);
          cache_changed |= update_cached(id(np_raw_artist), id(np_artist_cached), artist, true);
          cache_changed |= update_cached(id(np_raw_album), id(np_album_cached), album, true);
          cache_changed |= update_cached(id(np_raw_source_label), id(np_source_label_cached), source_label, false);
          cache_changed |= update_cached(id(np_raw_source_pill), id(np_source_pill_cached), source_pill, false);
          cache_changed |= update_cached(id(np_raw_src_display), id(np_src_display_cached), src_display, false);
          if (cache_changed) {
            id(np_cache_version) += 1;
          }

          const bool ha_time_ok = (duration1 > 0.5f && pos1_ms > 0);
          const bool ha_recent = activity_recent_slot(meta1_ms, pos1_ms);
          const bool ha_progress_ok = ha_time_ok && (play1 || state_active1_now || ha_recent);
          const bool ary_time_ok = (ary_duration > 0.5f && ary_pos_ms > 0);
          const bool ary_recent = (ary_pos_ms > 0 && (now - ary_pos_ms) < meta_stale_ms);
          const bool ary_progress_ok = ary_time_ok && (arylic_allowed || ary_recent);

          int progress_idx = -1;
          if (ha_progress_ok) progress_idx = 1;
          else if (ary_progress_ok) progress_idx = 0;

          float duration = 0.0f;
          float pos = 0.0f;
          uint32_t pos_ms = 0;
          if (progress_idx == 0) {
            duration = ary_duration;
            pos = ary_pos;
            pos_ms = ary_pos_ms;
          } else if (progress_idx == 1) {
            duration = duration1;
            pos = pos1;
            pos_ms = pos1_ms;
          }
          if (progress_idx == 1 && play1 && duration > 0.5f) {
            const uint32_t cached_ms = id(np_disp_pos_ms);
            const float cached_dur = id(np_disp_duration);
            const float cached_pos = id(np_disp_position);
            const bool cached_recent = cached_ms > 0 && (now - cached_ms) < meta_stale_ms;
            const bool same_track_window = cached_dur > 0.5f && fabsf(cached_dur - duration) <= 2.0f;
            if (cached_recent && same_track_window) {
              const bool stream_not_advancing = (pos_ms == 0) || (pos_ms <= cached_ms) || (pos <= (cached_pos + 0.25f));
              if (stream_not_advancing) {
                float projected = cached_pos;
                if (now > cached_ms) projected += (now - cached_ms) / 1000.0f;
                if (projected > pos) {
                  pos = projected;
                  pos_ms = now;
                }
              }
            }
          }

          bool progress_valid = (duration > 0.5f && pos_ms > 0);
          if (progress_valid) {
            id(np_disp_duration) = duration;
            id(np_disp_position) = pos;
            id(np_disp_pos_ms) = pos_ms;
          } else {
            const uint32_t cached_ms = id(np_disp_pos_ms);
            if (cached_ms > 0 && (now - cached_ms) < meta_stale_ms && id(np_disp_duration) > 0.5f) {
              duration = id(np_disp_duration);
              pos = id(np_disp_position);
              pos_ms = cached_ms;
              progress_valid = true;
            }
          }
          int progress_filled = -1;
          int bar_w = id(oled_display).get_width() - 4;
          if (bar_w < 0) bar_w = 0;
          if (progress_valid && bar_w > 0) {
            if (pos < 0.0f) pos = 0.0f;
            if (pos > duration) pos = duration;
            progress_filled = (int) ((pos / duration) * bar_w + 0.5f);
          }
          id(np_disp_progress_filled) = progress_filled;
          id(np_last_compute_ms) = now;

script:
  - id: compute_display_state
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          static uint32_t boot_menu_until_ms = 0;
          if (boot_menu_until_ms == 0) {
            boot_menu_until_ms = now + (uint32_t) ${boot_menu_ms};
          }

          const int STATE_SPLASH = ${display_state_splash};
          const int STATE_BOOT_MENU = ${display_state_boot_menu};
          const int STATE_MENU = ${display_state_menu};
          const int STATE_NOW_PLAYING = ${display_state_now_playing};
          const int STATE_EQ = ${display_state_eq};
          const int STATE_LIGHTING = ${display_state_lighting};
          const int STATE_SCREENSAVER = ${display_state_screensaver};
          const int STATE_BLANK = ${display_state_blank};

          const bool menu_active_now = id(menu_active);
          const bool playing = id(playing_effective);
          const uint32_t idle_ms = now - id(last_input_ms);
          const bool audio_wake_active = id(audio_wake_until_ms) > 0 && now < id(audio_wake_until_ms);
          const bool boot_menu_active = now < boot_menu_until_ms;
          const uint32_t meta_stale_ms = (uint32_t) ${meta_stale_ms};
          const uint32_t np_return_ms = (uint32_t) ${now_playing_return_ms};
          const uint32_t menu_home_idle_ms = (uint32_t) ${menu_home_idle_ms};
          const bool audio_mode = id(screen_mode) == 1;
          const bool lighting_mode = id(screen_mode) == 0;
          auto state_is_playing = [](const std::string &s) {
            std::string low = s;
            for (auto &c : low) c = (char) ::tolower(c);
            return low == "playing";
          };
          const bool ha_state_playing = id(ha_audio_state).has_state() && state_is_playing(id(ha_audio_state).state.c_str());

          const bool meta_recent_screen =
            (id(ha_audio_last_meta_ms) > 0 && (now - id(ha_audio_last_meta_ms)) < meta_stale_ms) ||
            (id(ha_audio1_last_meta_ms) > 0 && (now - id(ha_audio1_last_meta_ms)) < meta_stale_ms) ||
            (id(arylic_last_meta_ms) > 0 && (now - id(arylic_last_meta_ms)) < meta_stale_ms) ||
            (id(arylic_lr_last_meta_ms) > 0 && (now - id(arylic_lr_last_meta_ms)) < meta_stale_ms);
          const uint32_t active_grace_ms = (uint32_t) ${meta_playing_grace_ms};
          const uint32_t pause_timeout_ms = (uint32_t) ${meta_pause_timeout_ms};
          const bool pause_recent_screen = pause_timeout_ms > 0 && id(ha_audio1_last_playing_ms) > 0 &&
            (now - id(ha_audio1_last_playing_ms)) < pause_timeout_ms;
          const bool active_recent_screen =
            pause_recent_screen ||
            (id(last_playing_true_ms) > 0 && (now - id(last_playing_true_ms)) < active_grace_ms);
          const uint32_t eq_overlay_ms = (uint32_t) ${eq_overlay_ms};
          const bool eq_overlay_allowed = (id(eq_overlay_ignore_until_ms) == 0) || (now >= id(eq_overlay_ignore_until_ms));
          uint32_t last_eq_change_ms = id(eq_low_last_change_ms);
          if (id(eq_mid_last_change_ms) > last_eq_change_ms) last_eq_change_ms = id(eq_mid_last_change_ms);
          if (id(eq_high_last_change_ms) > last_eq_change_ms) last_eq_change_ms = id(eq_high_last_change_ms);
          const uint32_t splash_end_ms = id(splash_until_ms);
          const bool eq_change_after_splash = (splash_end_ms == 0) || (last_eq_change_ms > splash_end_ms);
          const bool eq_recent_screen = eq_overlay_allowed && eq_overlay_ms > 0 && last_eq_change_ms > 0 &&
            (now - last_eq_change_ms) < eq_overlay_ms && eq_change_after_splash;
          const bool has_cached_meta = !id(np_raw_title).empty() || !id(np_raw_artist).empty() || !id(np_raw_album).empty();
          const bool meta_recent_allowed = meta_recent_screen && (playing || ha_state_playing || active_recent_screen || audio_wake_active);
          const bool cached_recent = has_cached_meta && (playing || active_recent_screen);
          const bool playing_recent_hold = id(last_playing_true_ms) > 0 && (now - id(last_playing_true_ms)) < meta_stale_ms;
          const bool ha_playing_recent = id(ha_audio1_last_playing_ms) > 0 && (now - id(ha_audio1_last_playing_ms)) < meta_stale_ms;
          const bool now_playing_active = (playing || ha_state_playing || active_recent_screen || playing_recent_hold || ha_playing_recent || audio_wake_active || meta_recent_allowed || cached_recent);
          const bool no_audio_activity = !playing && !meta_recent_allowed && !active_recent_screen && !audio_wake_active;
          const bool lighting_active = lighting_mode &&
                                       (now < id(brightness_active_until_ms) || now < id(hue_ring_active_until_ms) || now < id(audio_ring_active_until_ms));
          const bool idle_now_playing = np_return_ms > 0 && idle_ms > np_return_ms;
          const bool audio_now_playing = audio_mode && now_playing_active;
          const bool lighting_idle_now_playing = lighting_mode && idle_now_playing && now_playing_active;

          int display_state_value = STATE_BLANK;
          if (boot_menu_active && menu_active_now) display_state_value = STATE_BOOT_MENU;
          else if (eq_recent_screen) display_state_value = STATE_EQ;
          else if (menu_active_now) display_state_value = STATE_MENU;
          else if (lighting_active) display_state_value = STATE_LIGHTING;
          else if (no_audio_activity) display_state_value = STATE_BLANK;
          else if (audio_now_playing) display_state_value = STATE_NOW_PLAYING;
          else if (lighting_idle_now_playing) display_state_value = STATE_NOW_PLAYING;
          else if (idle_ms > ${screensaver_idle_ms}) display_state_value = STATE_BLANK;
          else if (!menu_active_now && lighting_mode && (menu_home_idle_ms == 0 || idle_ms < menu_home_idle_ms)) {
            display_state_value = STATE_LIGHTING;
          }

          id(display_state) = display_state_value;
          id(screensaver_active) = (display_state_value == STATE_SCREENSAVER);

          if (${menu_debug}) {
            static int last_display_state_log = -1;
            static uint32_t last_display_state_log_ms = 0;
            if (display_state_value != last_display_state_log) {
              if (now - last_display_state_log_ms > 250) {
                last_display_state_log_ms = now;
                last_display_state_log = display_state_value;
                ESP_LOGI("display_state", "state=%d playing=%d np_active=%d menu=%d lighting=%d idle=%ums",
                         display_state_value,
                         playing ? 1 : 0,
                         now_playing_active ? 1 : 0,
                         menu_active_now ? 1 : 0,
                         lighting_active ? 1 : 0,
                         (unsigned) idle_ms);
              }
            }
          }

display:
  - platform: ssd1306_i2c
    id: oled_display
    model: ${oled_model}
    address: ${oled_address}
    rotation: 0
    update_interval: ${scroll_speed_ms}ms
    lambda: |-
      const int w = it.get_width();
      const int h = it.get_height();
      const uint32_t now = millis();
      static int title_scroll_offset = 0;
      static uint32_t title_scroll_last_ms = 0;
      static int album_scroll_offset = 0;
      static uint32_t album_scroll_last_ms = 0;
      static int artist_scroll_offset = 0;
      static uint32_t artist_scroll_last_ms = 0;
      static int menu_last_level = -1;
      static int menu_last_index = -1;
      static int menu_last_active = -1;
      static uint32_t menu_last_draw_ms = 0;
      static uint32_t np_cached_version_for_widths = 0;
      static int np_cached_title_text_w = 0;
      static int np_cached_album_text_w = 0;
      static int np_cached_artist_text_w = 0;
      static int last_playing_log = -1;
      static uint32_t last_playing_log_ms = 0;
      static bool splash_contrast_active = false;
      static uint32_t last_loop_section_log_ms = 0;
      static uint32_t last_np_detail_log_ms = 0;
      static uint32_t splash_start_ms = 0;
      static uint32_t splash_until_last_ms = 0;
      static uint8_t splash_last_contrast = 255;
      auto sanitize_ascii = [](const std::string &input) {
        std::string out;
        out.reserve(input.size());
        for (uint8_t ch : input) {
          if (ch >= 32 && ch < 127) {
            out.push_back((char) ch);
          } else if (ch == '\t' || ch == '\n' || ch == '\r') {
            out.push_back(' ');
          }
        }
        return out;
      };
      auto to_upper_ascii = [](const std::string &input) {
        std::string out;
        out.reserve(input.size());
        for (char ch : input) {
          if (ch >= 'a' && ch <= 'z') out.push_back((char) (ch - 32));
          else out.push_back(ch);
        }
        return out;
      };
      auto to_lower_ascii = [](const std::string &input) {
        std::string out;
        out.reserve(input.size());
        for (char ch : input) {
          if (ch >= 'A' && ch <= 'Z') out.push_back((char) (ch - 'A' + 'a'));
          else out.push_back(ch);
        }
        return out;
      };
      auto is_source_placeholder = [&](const std::string &value) {
        if (value.empty()) return true;
        std::string low = to_lower_ascii(value);
        return low == "unknown" || low == "unavailable" || low == "none" || low == "null" || low == "idle";
      };
      const int STATE_SPLASH = ${display_state_splash};
      const int STATE_BOOT_MENU = ${display_state_boot_menu};
      const int STATE_MENU = ${display_state_menu};
      const int STATE_NOW_PLAYING = ${display_state_now_playing};
      const int STATE_EQ = ${display_state_eq};
      const int STATE_LIGHTING = ${display_state_lighting};
      const int STATE_SCREENSAVER = ${display_state_screensaver};
      const int STATE_BLANK = ${display_state_blank};
      auto log_loop_section = [&](const char *name, uint32_t start_ms) {
        if (!${loop_section_debug}) return;
        const uint32_t dur = millis() - start_ms;
        const uint32_t min_ms = (uint32_t) ${loop_section_log_min_ms};
        const uint32_t interval_ms = (uint32_t) ${loop_section_log_interval_ms};
        if (dur < min_ms && (millis() - last_loop_section_log_ms) < interval_ms) return;
        last_loop_section_log_ms = millis();
        ESP_LOGI("loop_section", "%s: %ums", name, (unsigned) dur);
      };
      auto log_np_detail = [&](const char *name, uint32_t start_ms, uint32_t &last_log_ms) {
        if (!${loop_section_debug}) return;
        const uint32_t dur = millis() - start_ms;
        const uint32_t min_ms = (uint32_t) ${loop_section_log_min_ms};
        const uint32_t interval_ms = (uint32_t) ${loop_section_log_interval_ms};
        if (dur < min_ms && (millis() - last_log_ms) < interval_ms) return;
        last_log_ms = millis();
        ESP_LOGI("loop_np", "%s: %ums", name, (unsigned) dur);
      };
      auto trim_ascii = [](std::string &value) {
        size_t start = value.find_first_not_of(" \t\n\r");
        size_t end = value.find_last_not_of(" \t\n\r");
        if (start == std::string::npos || end == std::string::npos) {
          value.clear();
          return;
        }
        value = value.substr(start, end - start + 1);
      };
      auto is_placeholder_option = [&](const std::string &value) {
        if (value.empty()) return true;
        std::string low = to_lower_ascii(value);
        return low == "unknown" || low == "unavailable" || low == "none" || low == "null" || low == "idle";
      };
      auto parse_options = [&](const std::string &raw) -> std::vector<std::string> {
        std::vector<std::string> out;
        if (raw.empty()) return out;
        std::string token;
        bool in_quote = false;
        char quote_char = 0;
        for (char ch : raw) {
          if (ch == '\\') continue;
          if ((ch == '\'' || ch == '"')) {
            if (!in_quote) {
              in_quote = true;
              quote_char = ch;
              continue;
            }
            if (quote_char == ch) {
              in_quote = false;
              continue;
            }
          }
          if (!in_quote && (ch == '[' || ch == ']')) {
            continue;
          }
          if (!in_quote && ch == ',') {
            trim_ascii(token);
            if (!token.empty() && !is_placeholder_option(token)) out.push_back(token);
            token.clear();
            continue;
          }
          token.push_back(ch);
        }
        trim_ascii(token);
        if (!token.empty() && !is_placeholder_option(token)) out.push_back(token);
        return out;
      };
      auto wrap_max_width = [&]() {
        int px = w - 6;
        if (px < 16) px = 16;
        return px;
      };
      auto draw_center_wrapped = [&](esphome::font::Font *font, int line_h, int y, int row_h,
                                     const std::string &raw, Color color, int /*unused*/) {
        sls_oled_text::draw_center_wrapped(it, w / 2, font, line_h, y, row_h, raw, color, wrap_max_width(), true);
      };
      auto needs_wrap_two_lines = [&](esphome::font::Font *font, const std::string &raw, int /*unused*/) {
        return sls_oled_text::needs_wrap_two_lines(it, font, raw, wrap_max_width());
      };
      if (id(splash_until_ms) == 0) {
        id(splash_until_ms) = now + ${splash_duration_ms};
      }
      const uint32_t splash_total_ms = (uint32_t) ${splash_duration_ms};
      if (splash_total_ms > 0 && id(splash_until_ms) != splash_until_last_ms) {
        splash_until_last_ms = id(splash_until_ms);
        if (splash_until_last_ms > splash_total_ms) {
          splash_start_ms = splash_until_last_ms - splash_total_ms;
        } else {
          splash_start_ms = now;
        }
      }
      if (now < id(splash_until_ms)) {
        const uint32_t section_start_ms = millis();
        it.fill(COLOR_OFF);
        const int border = 8;
        const int title_h = ${splash_title_font_size};
        const int subtitle_h = ${splash_subtitle_font_size};
        const int center_x = w / 2;
        const std::string splash_title = "SPECTRA";

        const int splash_gap = 6;
        const int block_h = title_h + splash_gap + subtitle_h;
        int base_y = (h - block_h) / 2;
        if (base_y < border) base_y = border;
        int title_y = base_y + ${splash_title_offset_px};
        if (title_y < 0) title_y = 0;
        int subtitle_y = title_y + title_h + splash_gap + ${splash_subtitle_offset_px};
        if (subtitle_y < 0) subtitle_y = 0;
        if (subtitle_y > (h - subtitle_h)) subtitle_y = h - subtitle_h;

        uint32_t stage_ms = splash_total_ms / 2;
        if (stage_ms == 0) stage_ms = 1;
        const uint32_t elapsed = (now >= splash_start_ms) ? (now - splash_start_ms) : 0;
        const int stage = (elapsed >= stage_ms) ? 1 : 0;
        const uint32_t stage_elapsed = (stage == 0) ? elapsed : (elapsed - stage_ms);
        float stage_progress = stage_elapsed / (float) stage_ms;
        if (stage_progress < 0.0f) stage_progress = 0.0f;
        if (stage_progress > 1.0f) stage_progress = 1.0f;

        float brightness = (stage == 0) ? (1.0f - stage_progress) : stage_progress;
        if (brightness < 0.0f) brightness = 0.0f;
        if (brightness > 1.0f) brightness = 1.0f;

        float base_contrast = id(oled_contrast);
        if (base_contrast < 0.0f) base_contrast = 0.0f;
        if (base_contrast > 1.0f) base_contrast = 1.0f;
        uint8_t contrast = (uint8_t) (base_contrast * brightness * 255.0f + 0.5f);
        if (contrast != splash_last_contrast) {
          id(oled_display).set_contrast(contrast);
          splash_last_contrast = contrast;
        }
        splash_contrast_active = true;

        if (stage == 0) {
          const float t_raw = stage_progress;
          const float t = t_raw * t_raw * (3.0f - 2.0f * t_raw);
          auto lerp = [&](float a, float b) { return a + (b - a) * t; };

          const char *title_chars = "SPECTRA";
          const int title_len = 7;
          const int title_char_w = 8;
          const int title_gap_px = 1;
          const int title_total_w = (title_len * title_char_w) + ((title_len - 1) * title_gap_px);
          const int title_start_x = center_x - (title_total_w / 2);

          for (int i = 0; i < title_len; i++) {
            const int target_x = title_start_x + i * (title_char_w + title_gap_px);
            const int target_y = title_y;
            const int start_x = (i % 2 == 0) ? (-20 - (i * 2)) : (w + 20 + (i * 2));
            const int start_y = (i % 3 == 0) ? (-18 - (i * 2)) : (i % 3 == 1) ? (h + 18 + (i * 2)) : (h / 2 + (i * 3));
            const int draw_x = (int) lerp((float) start_x, (float) target_x);
            const int draw_y = (int) lerp((float) start_y, (float) target_y);
            char buf[2] = {title_chars[i], 0};
            it.printf(draw_x, draw_y, id(font_splash_title), COLOR_ON, TextAlign::TOP_LEFT, "%s", buf);
          }

          const char subtitle_chars[3] = {'L', '\\', 'S'};
          const int subtitle_len = 3;
          const int sub_char_w = 8;
          const int sub_gap_px = 6;
          const int sub_total_w = (subtitle_len * sub_char_w) + ((subtitle_len - 1) * sub_gap_px);
          const int sub_start_x = center_x - (sub_total_w / 2);

          for (int i = 0; i < subtitle_len; i++) {
            const int target_x = sub_start_x + i * (sub_char_w + sub_gap_px);
            const int target_y = subtitle_y;
            const int start_x = (i == 0) ? (-16) : (i == 1) ? (w + 16) : (center_x);
            const int start_y = (i == 0) ? (h + 12) : (i == 1) ? (-12) : (h + 20);
            const int draw_x = (int) lerp((float) start_x, (float) target_x);
            const int draw_y = (int) lerp((float) start_y, (float) target_y);
            char buf[2] = {subtitle_chars[i], 0};
            it.printf(draw_x, draw_y, id(font_splash_subtitle), COLOR_ON, TextAlign::TOP_LEFT, "%s", buf);
          }
        } else {
          const std::string splash_subtitle = "Level \\ Source";
          it.printf(center_x, title_y, id(font_splash_title), COLOR_ON, TextAlign::TOP_CENTER, "%s", splash_title.c_str());
          it.printf(center_x, subtitle_y, id(font_splash_subtitle), COLOR_ON, TextAlign::TOP_CENTER, "%s", splash_subtitle.c_str());
        }
        log_loop_section(stage == 0 ? "splash_stage1" : "splash_stage2", section_start_ms);
