        log_np_detail("artist", t_artist, last_np_detail_log_ms);

        const uint32_t t_vol = millis();
        it.rectangle(vol_bar_x, vol_bar_y, vol_bar_w, vol_bar_h, COLOR_ON);
        if (vol_fill > 0) {
          const int fill_y = vol_bar_y + 1 + (inner_h - vol_fill);
          it.filled_rectangle(vol_bar_x + 1, fill_y, vol_bar_w - 2, vol_fill, COLOR_ON);
        }
        log_np_detail("volume", t_vol, last_np_detail_log_ms);

        const uint32_t t_prog = millis();
        if (progress_filled >= 0) {
          it.rectangle(bar_x, bar_y, bar_w, bar_h, COLOR_ON);
          it.filled_rectangle(bar_x, bar_y, progress_filled, bar_h, COLOR_ON);
        }
        log_np_detail("progress", t_prog, last_np_detail_log_ms);
        id(np_last_cache_version) = cache_version;
        id(np_last_vol_fill) = vol_fill;
        id(np_last_progress_fill) = progress_filled;
        id(np_last_playing_drawn) = playing;
        id(np_last_screensaver_drawn) = screensaver_active_now;
        id(np_last_draw_ms) = now;
        log_loop_section("now_playing", section_start_ms);
      };

      if (display_state_value == STATE_BLANK || display_state_value == STATE_SCREENSAVER) {
        const uint32_t section_start_ms = millis();
        it.fill(COLOR_OFF);
        id(np_last_draw_ms) = 0;
        log_loop_section(display_state_value == STATE_BLANK ? "blank" : "screensaver", section_start_ms);
        return;
      }
      if (display_state_value == STATE_EQ) {
        render_eq_screen();
        return;
      }
      if (display_state_value == STATE_NOW_PLAYING) {
        render_now_playing();
        return;
      }

      const int menu_h = ${menu_line_height};
      const int line2 = menu_h;
      const int line3 = menu_h * 2;
      const int line4 = menu_h * 3;

      auto lighting_target_friendly_label = [&](int room, int target) -> std::string {
        std::string room_label = pick_room_label(room, "${room_label_living}");
        std::string target_label = (target == 0) ? room_label : pick_target_label(target, "Light");
        if (target_label.empty()) target_label = "Light";
        return target_label;
      };

      auto lighting_adjust_caption = [&](const char *prefix, int room, int target) -> std::string {
        std::string label = prefix;
        label += " ";
        label += lighting_target_friendly_label(room, target);
        return label;
      };


      const bool menu_draw_active = (display_state_value == STATE_MENU || display_state_value == STATE_BOOT_MENU);

      if (!menu_draw_active) {
        menu_last_active = 0;
        menu_last_draw_ms = 0;
      }

      if (menu_draw_active) {
        const uint32_t section_start_ms = millis();
        const int LV_MAIN = ${menu_level_main};
        int menu_level_render = id(menu_level);
        int menu_index_render = id(menu_index);
        if (display_state_value == STATE_BOOT_MENU && menu_level_render < LV_MAIN) {
          menu_level_render = LV_MAIN;
          if (menu_index_render < 0 || menu_index_render >= ${menu_count_root}) {
            menu_index_render = 0;
          }
        }
        menu_last_active = 1;
        menu_last_level = menu_level_render;
        menu_last_index = menu_index_render;
        menu_last_draw_ms = now;
        it.fill(COLOR_OFF);
        const char *menu_main[] = {"Lighting", "Audio", "Gear"};
        std::vector<std::string> rooms_dynamic;
        if (!room_opts.empty()) {
          rooms_dynamic = room_opts;
        } else {
          rooms_dynamic.push_back(pick_room_label(0, "${room_label_living}"));
          rooms_dynamic.push_back(pick_room_label(1, "${room_label_dining}"));
          rooms_dynamic.push_back(pick_room_label(2, "${room_label_kitchen}"));
          rooms_dynamic.push_back(pick_room_label(3, "${room_label_bedroom}"));
        }
        rooms_dynamic.push_back("Back");

        std::vector<std::string> targets_dynamic;
        if (!target_opts.empty()) {
          targets_dynamic = target_opts;
        } else {
          // Universal fallback: avoid room/site-specific assumptions when HA options are unavailable.
          targets_dynamic.push_back(pick_target_label(0, "${target_label_all}"));
          targets_dynamic.push_back(pick_target_label(1, "${target_label_star}"));
          targets_dynamic.push_back(pick_target_label(2, "${target_label_tube}"));
          targets_dynamic.push_back(pick_target_label(3, "${target_label_reading}"));
        }
        targets_dynamic.push_back("Back");

        std::vector<std::string> meta_dynamic;
        meta_dynamic.push_back("Auto");
        if (!meta_opts.empty()) {
          for (auto &m : meta_opts) meta_dynamic.push_back(m);
        }
        meta_dynamic.push_back("Back");

        std::vector<std::string> gear_dynamic;
        gear_dynamic.push_back("Meta Select");
        gear_dynamic.push_back("Control Select");
        gear_dynamic.push_back("Back");
        const char **items = menu_main;
        int count = ${menu_count_root};
        bool use_dynamic_list = false;
        std::vector<std::string> dynamic_items;
        if (menu_level_render == ${menu_level_lighting_rooms}) {
          dynamic_items = rooms_dynamic;
          count = (int) dynamic_items.size();
          use_dynamic_list = true;
        }
        else if (menu_level_render == ${menu_level_gear}) {
          dynamic_items = gear_dynamic;
          count = (int) dynamic_items.size();
          use_dynamic_list = true;
        }
        else if (menu_level_render == ${menu_level_lighting_targets}) {
          dynamic_items = targets_dynamic;
          count = (int) dynamic_items.size();
          use_dynamic_list = true;
        }
        else if (menu_level_render == ${menu_level_meta_select}) {
          dynamic_items = meta_dynamic;
          count = (int) dynamic_items.size();
          use_dynamic_list = true;
        }
        else if (menu_level_render == ${menu_level_lighting_adjust}) {
          const int count_adjust = ${menu_count_lighting_adjust};
          int idx_adjust = menu_index_render;
          if (idx_adjust < 0 || idx_adjust >= count_adjust) idx_adjust = 0;
          const int room = id(selected_room);
          const int target = id(selected_target);
          std::string brightness_label = lighting_adjust_caption("Brightness", room, target);
          std::string hue_label = lighting_adjust_caption("Hue", room, target);
          std::string sat_label = lighting_adjust_caption("Sat", room, target);
          const int list_h = ${menu_line_height_list};
          const int list_pad = ${menu_list_top_pad};
          const int highlight_extra = 3;
          bool needs_wrap = needs_wrap_two_lines(id(font_menu), brightness_label, 0) ||
                            needs_wrap_two_lines(id(font_menu), hue_label, 0) ||
                            needs_wrap_two_lines(id(font_menu), sat_label, 0);
          const int row_h = needs_wrap ? ((list_h * 2) + highlight_extra) : (list_h + highlight_extra);
          const int list_step = row_h;
          int max_visible = (h - list_pad - row_h) / list_step + 1;
          if (max_visible < 1) max_visible = 1;
          int start = 0;
          if (count_adjust > max_visible) {
            if (idx_adjust >= start + max_visible) start = idx_adjust - max_visible + 1;
            if (idx_adjust < start) start = idx_adjust;
            if (start > (count_adjust - max_visible)) start = count_adjust - max_visible;
            if (start < 0) start = 0;
          }
          int row = 0;
          for (int i = start; i < count_adjust && row < max_visible; i++, row++) {
            const int y = list_pad + (row * list_step);
            std::string label = (i == 0) ? brightness_label : (i == 1) ? hue_label :
                                (i == 2) ? sat_label : "Back";
            if (i == idx_adjust) {
              it.filled_rectangle(0, y, w, row_h, COLOR_ON);
              draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_OFF, 0);
            } else {
              draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_ON, 0);
            }
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          log_loop_section("menu_adjust", section_start_ms);
          return;
        }
        else if (menu_level_render == ${menu_level_lighting_toggle}) {
          const int room = id(selected_room);
          const int target = id(selected_target);
          const int count_toggle = (target == 0) ? ${menu_count_lighting_toggle_all} : ${menu_count_lighting_toggle_target};
          int idx_toggle = menu_index_render;
          if (idx_toggle < 0 || idx_toggle >= count_toggle) idx_toggle = 0;
          std::string room_label = pick_room_label(room, "${room_label_living}");
          std::string target_label = (target == 0) ? room_label : pick_target_label(target, "Light");
          if (target_label.empty()) target_label = "Light";

          bool room_has = id(ha_room_on).has_state();
          bool room_on = room_has && id(ha_room_on).state;
          bool target_has = (target == 0) ? room_has : id(ha_target_on).has_state();
          bool target_on = (target == 0) ? room_on : (target_has && id(ha_target_on).state);

          std::string toggle_room = room_has ? (room_on ? "Off " : "On ") : "Toggle ";
          toggle_room += room_label;
          std::string toggle_target = target_has ? (target_on ? "Off " : "On ") : "Toggle ";
          toggle_target += target_label;
          const int list_h = ${menu_line_height_list};
          const int list_pad = ${menu_list_top_pad};
          const int highlight_extra = 3;
          bool needs_wrap = needs_wrap_two_lines(id(font_menu), toggle_room, 0) || needs_wrap_two_lines(id(font_menu), toggle_target, 0);
          const int row_h = needs_wrap ? ((list_h * 2) + highlight_extra) : (list_h + highlight_extra);
          const int list_step = row_h;
          int max_visible = (h - list_pad - row_h) / list_step + 1;
          if (max_visible < 1) max_visible = 1;
          int start = 0;
          if (count_toggle > max_visible) {
            if (idx_toggle >= start + max_visible) start = idx_toggle - max_visible + 1;
            if (idx_toggle < start) start = idx_toggle;
            if (start > (count_toggle - max_visible)) start = count_toggle - max_visible;
            if (start < 0) start = 0;
          }
          int row = 0;
          for (int i = start; i < count_toggle && row < max_visible; i++, row++) {
            const int y = list_pad + (row * list_step);
            std::string label = (i == 0) ? toggle_room : (i == 1 && target != 0) ? toggle_target : "Back";
            if (i == idx_toggle) {
              it.filled_rectangle(0, y, w, row_h, COLOR_ON);
              draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_OFF, 0);
            } else {
              draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_ON, 0);
            }
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          log_loop_section("menu_toggle", section_start_ms);
          return;
        }
        int idx = menu_index_render;
        if (idx < 0 || idx >= count) idx = 0;
        if (menu_level_render == LV_MAIN) {
          const int columns = 2;
          const int margin = ${menu_tile_margin};
          const int gap = ${menu_tile_gap};
          const int border = ${menu_tile_border};
          const int border_sel = ${menu_tile_border_selected};
          const int rows = (count + columns - 1) / columns;
          int tile_w = (w - (margin * 2) - gap) / columns;
          int tile_h = (h - (margin * 2) - (gap * (rows - 1))) / rows;
          if (tile_w < 8) tile_w = 8;
          if (tile_h < 8) tile_h = 8;

          auto draw_border = [&](int x, int y, int tw, int th, int thickness) {
            for (int t = 0; t < thickness; t++) {
              const int bw = tw - (t * 2);
              const int bh = th - (t * 2);
              if (bw <= 0 || bh <= 0) break;
              it.rectangle(x + t, y + t, bw, bh, COLOR_ON);
            }
          };

          const char *icon_light = "\uF02A";
          const char *icon_play_pause = "\uF137";
          const char *icon_settings = "\uE8B8";

          for (int i = 0; i < count; i++) {
            int row = i / columns;
            int col = i % columns;
            int tiles_in_row = columns;
            if ((count % columns) == 1 && row == (rows - 1)) {
              tiles_in_row = 1;
              col = 0;
            }
            const int row_w = (tile_w * tiles_in_row) + (gap * (tiles_in_row - 1));
            const int start_x = (w - row_w) / 2;
            const int x = start_x + (col * (tile_w + gap));
            const int y = margin + (row * (tile_h + gap));
            draw_border(x, y, tile_w, tile_h, (i == idx) ? border_sel : border);
            const int cx = x + (tile_w / 2);
            const int cy = y + (tile_h / 2);
            const bool is_play = i == 1;
            const char *icon = (i == 0) ? icon_light : is_play ? icon_play_pause : icon_settings;
            it.printf(cx, cy, is_play ? id(font_tile_icon_play) : id(font_tile_icon), COLOR_ON, TextAlign::CENTER, "%s", icon);
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          log_loop_section("menu_tiles", section_start_ms);
          return;
        }
        if (menu_level_render == ${menu_level_meta_select}) {
          it.printf(w / 2, 0, id(font_menu), COLOR_ON, TextAlign::TOP_CENTER, "Meta Player");
          const int list_h = ${menu_line_height_list};
          const int highlight_extra = 3;
          bool needs_wrap = false;
          for (auto &item : dynamic_items) {
            if (needs_wrap_two_lines(id(font_menu), item, 0)) {
              needs_wrap = true;
              break;
            }
          }
          const int row_h = needs_wrap ? ((list_h * 2) + highlight_extra) : (list_h + highlight_extra);
          const int list_step = row_h;
          const int list_pad = ${menu_line_height};
          int max_visible = (h - list_pad - row_h) / list_step + 1;
          if (max_visible < 1) max_visible = 1;
          int start = 0;
          if (count > max_visible) {
            if (idx >= start + max_visible) start = idx - max_visible + 1;
            if (idx < start) start = idx;
            if (start > (count - max_visible)) start = count - max_visible;
            if (start < 0) start = 0;
          }
          int row = 0;
          for (int i = start; i < count && row < max_visible; i++, row++) {
            const int y = list_pad + (row * list_step);
            std::string label = dynamic_items[i];
            if (i == idx) {
              it.filled_rectangle(0, y, w, row_h, COLOR_ON);
              draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_OFF, 0);
            } else {
              draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_ON, 0);
            }
          }
          if (${menu_debug}) {
            it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
          }
          log_loop_section("menu_meta", section_start_ms);
          return;
        }
        const int list_h = ${menu_line_height_list};
        const int list_pad = ${menu_list_top_pad};
        const int highlight_extra = 3;
        bool needs_wrap = false;
        for (int i = 0; i < count; i++) {
          const std::string label = use_dynamic_list ? dynamic_items[i] : std::string(items[i]);
          if (needs_wrap_two_lines(id(font_menu), label, 0)) {
            needs_wrap = true;
            break;
          }
        }
        const int row_h = needs_wrap ? ((list_h * 2) + highlight_extra) : (list_h + highlight_extra);
        const int list_step = row_h;
        int max_visible = (h - list_pad - row_h) / list_step + 1;
        if (max_visible < 1) max_visible = 1;
        int start = 0;
        if (count > max_visible) {
          if (idx >= start + max_visible) start = idx - max_visible + 1;
          if (idx < start) start = idx;
          if (start > (count - max_visible)) start = count - max_visible;
          if (start < 0) start = 0;
        }
        int row = 0;
        for (int i = start; i < count && row < max_visible; i++, row++) {
          const int y = list_pad + (row * list_step);
          std::string label = use_dynamic_list ? dynamic_items[i] : std::string(items[i]);
          if (i == idx) {
            it.filled_rectangle(0, y, w, row_h, COLOR_ON);
            draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_OFF, 0);
          } else {
            draw_center_wrapped(id(font_menu), list_h, y + 1, row_h - 1, label, COLOR_ON, 0);
          }
        }
        if (${menu_debug}) {
          it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
        }
        log_loop_section("menu_list", section_start_ms);
        return;
      }

      if (display_state_value == STATE_LIGHTING) {
        const uint32_t section_start_ms = millis();
        const int room = id(selected_room);
        const int target = id(selected_target);
        const std::string room_label = pick_room_label(room, "${room_label_living}");
        const std::string target_label = lighting_target_friendly_label(room, target);
        const std::string brightness_label = lighting_adjust_caption("Brightness", room, target);
        const std::string hue_label = lighting_adjust_caption("Hue", room, target);
        const std::string sat_label = lighting_adjust_caption("Sat", room, target);
        if (${lighting_slider_ui_brightness_only} && now < id(brightness_slider_only_until_ms)) {
          it.fill(COLOR_OFF);
          draw_center_wrapped(id(font_menu), ${menu_line_height_list}, 0, ${menu_line_height_list} * 2, target_label, COLOR_ON, 0);
          if (room_label != target_label) {
            draw_center_wrapped(id(font_small), ${menu_line_height_list}, ${menu_line_height_list} * 2, ${menu_line_height_list} * 2, room_label, COLOR_ON, 0);
          }
          const float pct = id(lighting_brightness);
          const int bar_w = w - 4;
          const int bar_h = 10;
          const int bar_x = 2;
          const int bar_y = (h - bar_h) / 2;
          int filled = (int) ((pct / 100.0f) * bar_w + 0.5f);
          if (filled < 0) filled = 0;
          if (filled > bar_w) filled = bar_w;
          it.rectangle(bar_x, bar_y, bar_w, bar_h, COLOR_ON);
          if (filled > 0) {
            it.filled_rectangle(bar_x, bar_y, filled, bar_h, COLOR_ON);
          }
          log_loop_section("lighting_slider", section_start_ms);
          return;
        }
        if (!menu_active_now && now >= id(brightness_active_until_ms) && now >= id(hue_ring_active_until_ms) && now >= id(audio_ring_active_until_ms)) {
          it.fill(COLOR_OFF);
          log_loop_section("lighting_blank", section_start_ms);
          return;
        }
        it.fill(COLOR_OFF);
        const int adjust_mode = id(lighting_adjust_mode);
        const std::string mode_label = (adjust_mode == 3) ? brightness_label : (id(lighting_mode_hue) ? hue_label : sat_label);
        const int target_row_h = line3;
        draw_center_wrapped(id(font_menu), ${menu_line_height_list}, 0, target_row_h, target_label, COLOR_ON, 0);
        it.printf(w / 2, line3, id(font_menu), TextAlign::TOP_CENTER, "%s", mode_label.c_str());

        if (now < id(brightness_active_until_ms)) {
          const float pct = id(lighting_brightness);
          const int bar_w = w - 4;
          const int bar_h = 8;
          const int filled = (int) ((pct / 100.0f) * bar_w);
          const int bar_y = line4;
          it.rectangle(2, bar_y, bar_w, bar_h, COLOR_ON);
          it.filled_rectangle(2, bar_y, filled, bar_h, COLOR_ON);
          it.printf(0, bar_y + bar_h + 1, id(font_menu), "Bri: %d%%", (int) pct);
        }
        if (now < id(audio_ring_active_until_ms)) {
          int max_vol = (int) ${audio_max_volume_pct};
          if (max_vol <= 0 || max_vol > 100) max_vol = 100;
          int vol_clamped = vol;
          if (vol_clamped > max_vol) vol_clamped = max_vol;
          const int meter_w = 5;
          const int meter_h = 22;
          const int meter_x = w - meter_w - 1;
          const int meter_y = h - meter_h - 1;
          const int inner_h = meter_h - 2;
          int fill = (int) ((vol_clamped / (float) max_vol) * inner_h + 0.5f);
          if (fill < 0) fill = 0;
          if (fill > inner_h) fill = inner_h;
          it.rectangle(meter_x, meter_y, meter_w, meter_h, COLOR_ON);
          if (fill > 0) {
            const int fill_y = meter_y + 1 + (inner_h - fill);
            it.filled_rectangle(meter_x + 1, fill_y, meter_w - 2, fill, COLOR_ON);
          }
        }
        if (${menu_debug}) {
          it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
        }
        log_loop_section("lighting", section_start_ms);
        return;
      }

      const uint32_t section_start_ms = millis();
      it.fill(COLOR_OFF);
      if (${menu_debug}) {
        ESP_LOGW("display_state", "fallback blank render (state=%d)", display_state_value);
        it.printf(0, h - menu_h, id(font_menu), "${menu_debug_label}");
      }
      log_loop_section("fallback", section_start_ms);
