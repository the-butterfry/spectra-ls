      auto render_eq_screen = [&]() {
        const uint32_t section_start_ms = millis();
        const int eq_low = id(eq_low_target);
        const int eq_mid = id(eq_mid_target);
        const int eq_high = id(eq_high_target);
        const int eq_min = (int) ${eq_min};
        const int eq_max = (int) ${eq_max};
        int max_abs = eq_max;
        if (max_abs < 0) max_abs = -max_abs;
        int min_abs = eq_min;
        if (min_abs < 0) min_abs = -min_abs;
        if (min_abs > max_abs) max_abs = min_abs;
        if (max_abs <= 0) max_abs = 1;

        it.fill(COLOR_OFF);

        const int label_w = 34;
        const int left = 2 + label_w;
        const int right = w - 2;
        const int bar_w = right - left;
        if (bar_w <= 6) return;

        const int row_h = (h - 6) / 3;
        const int bar_h = 5;
        const int tick_h = 7;
        const int tick_w = 3;

        auto draw_row = [&](int y, int value, const char *label) {
          const int mid_y = y + (row_h / 2);
          const int bar_offset = 4;
          const int bar_mid_y = mid_y + bar_offset;
          const int bar_y = bar_mid_y - (bar_h / 2);
          const int center_x = left + (bar_w / 2);
          it.printf(2, mid_y - 4, id(font_small), COLOR_ON, TextAlign::TOP_LEFT, "%s", label);
          it.rectangle(left, bar_y, bar_w, bar_h, COLOR_ON);
          it.filled_rectangle(center_x - (tick_w / 2), bar_mid_y - (tick_h / 2), tick_w, tick_h, COLOR_ON);

          int val = value;
          if (val > max_abs) val = max_abs;
          if (val < -max_abs) val = -max_abs;
          float pct = (max_abs > 0) ? (val / (float) max_abs) : 0.0f;
          int fill = (int) (fabsf(pct) * (bar_w / 2) + 0.5f);
          if (fill > 0) {
            if (pct >= 0.0f) {
              it.filled_rectangle(center_x + 1, bar_y, fill, bar_h, COLOR_ON);
            } else {
              it.filled_rectangle(center_x - fill, bar_y, fill, bar_h, COLOR_ON);
            }
          }
        };

        const int base_y = 5;
        draw_row(base_y, eq_low, "Low");
        draw_row(base_y + row_h, eq_mid, "Mid");
        draw_row(base_y + (row_h * 2), eq_high, "High");

        log_loop_section("eq_screen", section_start_ms);

