# === Audio UX + Metadata Windows ===
# Purpose: now-playing/overlay windows and audio-facing UI ranges.
# Gain: smoother perceived audio UX without changing transport internals.
ha_audio_refresh_ms: "2000"
audio_max_volume_pct: "90"
audio_ui_min: "1"
audio_ui_max: "11"
now_playing_return_ms: "5000"
audio_empty_duration_ms: "5000"
eq_overlay_ms: "3000"
meta_pos_stall_ms: "15000"
meta_stale_ms: "45000"
meta_end_tolerance_s: "2"
meta_playing_grace_ms: "15000"
meta_refresh_ms: "1500"
meta_refresh_tick_ms: "250"
meta_pause_timeout_ms: "60000"
meta_override_reset_ms: "120000"
meta_popup_ms: "3500"
source_popup_ms: "5000"
audio_wake_hold_ms: "5000"

# === Audio Control-Target Prompting + Loop Tuning ===
# Purpose: prompt gating, control loop cadence, and operational logging.
# Gain: tune responsiveness + guardrails without package rewrites.
control_target_prompt_cooldown_ms: "15000"
control_target_prompt_grace_ms: "8000"
# During boot/reconnect, transient ambiguity sensors can briefly read true
# while target+hosts are already valid; this grace prevents false prompt loops.
control_target_boot_ambiguous_grace_ms: "15000"
# Main audio loop cadence (prompt state + deferred pot flush); lower is snappier, higher is calmer.
audio_control_loop_interval_ms: "150"
# Force-sync cadence for active target helper; lower can recover stale helper states faster.
ma_target_refresh_interval_ms: "15000"
# Meta override settle delay after cycle command before label refresh.
meta_override_settle_ms: "160"
# Local input/log throttles (debug smoothness vs log volume).
input_raw_log_interval_ms: "700"
input_send_log_interval_ms: "450"
audio_gate_log_interval_ms: "1200"

# === Audio Source Cycle + Meta Labels ===
# Purpose: source cycling contract and user-facing meta source labels.
arylic_source_cycle_codes: "NET,BT,LINE-IN,LINE-IN2"
arylic_source_cycle_labels: "Wi-Fi,Bluetooth,Line In 1,Line In 2"
# New physical button for meta source override
meta_select_button_id: "40"
# Auto-first UX: keep manual meta picker hidden from normal menu flow.
# Maintenance-only override: set to "true" locally when explicit manual picker access is needed.
