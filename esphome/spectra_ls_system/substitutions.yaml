# Description: Spectra LS System substitutions for ESPHome main config and packages.
# Version: 2026.04.27.1
# Last updated: 2026-04-27
# Spectra LS substitutions scoped to spectra_ls_system.
# Use absolute paths for assets so this file can move with spectra_ls_system.

# === Core Identity ===
# Purpose: identity shown in HA/ESPHome and used for OTA/API naming.
# Gain: consistent discoverability and logs across environments.
# Risk: changing device_name can affect integrations that pin hostname/entity naming.
device_name: spectra-ls-system
friendly_name: "Spectra LS System"

# === Network ===
# Purpose: static network identity and resolver settings.
# Gain: stable OTA/API target and lower reconnect friction.
# Risk: wrong IP/gateway/dns can make OTA/API appear flaky or offline.
wifi_ssid: !secret wifi_ssid
wifi_password: !secret wifi_password
static_ip: 192.168.10.40
gateway_ip: 192.168.10.1
subnet_mask: 255.255.255.0
dns1_ip: 192.168.10.1
dns2_ip: 1.1.1.1

# === Audio Control Tuning (Stage 2) ===
# Purpose: primary responsiveness controls for volume/EQ feel.
# Gain: lower intervals/settle improve live feel and reduce "lag" perception.
# Risk: too aggressive values can increase command churn and transport timeouts.
#
# Pot timing + defer behavior:
# - send_interval: minimum send spacing under motion.
# - settle_ms: defer window to absorb jitter/micro-movements.
# - jump_steps: large moves bypass defer path for immediate response.
volume_pot_send_interval_ms: "25"
volume_pot_settle_ms: "50"
volume_pot_jump_steps: "3"
eq_pot_send_interval_ms: "90"
eq_pot_settle_ms: "60"
eq_pot_jump_steps: "1"
eq_min: "-10"
eq_max: "10"

# Arylic TCP pacing/coalescing (implemented in components/arylic_tcp.h)
# Purpose: transport-level pacing, duplicate suppression, and failure handling.
# Gain: tune per-network stability without editing C++.
# Risk: very low pacing can flood weak links; very high pacing can feel sluggish.
arylic_tcp_timeout_ms: "140"
arylic_tcp_min_interval_ms: "45"
arylic_tcp_dup_suppress_ms: "45"
arylic_tcp_backoff_ms: "220"
# Purpose: burst safety gate during rapid sweeps.
# Gain: protects target/player from sustained command storms.
# Risk: if too strict, can feel like "rubber banding" under fast twists.
arylic_tcp_burst_guard_enabled: "1"
arylic_tcp_burst_window_ms: "120"
arylic_tcp_burst_max_sends: "5"
# Purpose: queue/worker/log shaping for transport subsystem.
# Gain: allows matching queue depth and task resources to install complexity.
# Risk: excessive queue depth can increase stale-command latency; low stack/priority can starve worker.
arylic_tcp_queue_len: "16"
arylic_tcp_worker_stack: "4096"
arylic_tcp_worker_prio: "1"
arylic_tcp_log_interval_ms: "800"

# === Arylic / LinkPlay Endpoints + Routing ===
# Purpose: primary endpoint and optional HTTP status polling controls.
# Gain: central host/port control for transport paths.
# Risk: mismatched host/port produces connect timeouts and false lag symptoms.
# Runtime authority note (discovery-first, fail-closed):
# - Active TCP control host(s)/port are resolved dynamically from HA (`sensor.ma_control_hosts`,
#   `sensor.ma_control_host`, `sensor.ma_control_port`) in spectra-ls-audio-tcp.yaml.
# - No install-specific host fallback is allowed here; empty host defaults keep runtime sends blocked
#   until HA publishes a valid resolved target.
# Primary device (discovery-resolved TCP + optional HTTP status)
arylic_tcp_host: ""
arylic_tcp_port: "8899"
arylic_http_host: ""
arylic_http_scheme: "https"
arylic_http_port: "443"
arylic_http_poll_ms: "5000"
arylic_http_enabled: "true"

# Secondary device (discovery-resolved HTTP optional)
arylic_lr_http_host: ""
arylic_lr_http_scheme: "http"
arylic_lr_http_port: "80"
arylic_lr_http_poll_ms: "10000"
arylic_lr_http_enabled: "false"

# === Hardware Pins / Board ===
# Purpose: board profile and UART bridge to RP2040 input MCU.
# Gain: one place to retarget pinout for board revisions.
# Risk: pin mismatches can silently break controls/UI data paths.
esp32_board: esp32-s3-devkitc-1

# UART to RP2040
rp2040_uart_tx: GPIO17
rp2040_uart_rx: GPIO18

# OLED (SSD1309-compatible; ESPHome uses SSD1306 128x64)
oled_sda_pin: GPIO8
oled_scl_pin: GPIO9
oled_address: 0x3C
oled_model: "SSD1306 128x64"

# === Home Assistant / Music Assistant Entities ===
# Purpose: entity contracts consumed by active packages.
# Gain: decouples package logic from site-specific entity naming.
# Risk: renamed helpers/entities without updating here can break routing/metadata.
# Now Playing metadata (from MA active sensors)
ha_ma_active_title: sensor.ma_active_title
ha_ma_active_artist: sensor.ma_active_artist
ha_ma_active_album: sensor.ma_active_album
ha_ma_active_app: sensor.ma_active_app
ha_ma_active_source: sensor.ma_active_source
ha_ma_active_state: sensor.ma_active_state
ha_ma_active_duration: sensor.ma_active_duration
ha_ma_active_position: sensor.ma_active_position
ha_ma_active_volume: sensor.ma_active_volume
ha_ma_meta_candidates: sensor.ma_meta_candidates
ha_ma_meta_low_confidence: binary_sensor.ma_meta_low_confidence
ha_ma_meta_override_active: input_boolean.ma_meta_override_active
ha_ma_meta_override_entity: input_text.ma_meta_override_entity

# HA script to apply HS + brightness
ha_light_script: script.control_board_set_light_dynamic

# HA input_select helpers
input_select_room: input_select.control_board_room
input_select_target: input_select.control_board_target

# Room option labels
# Purpose: fallback labels for rendered menus/popups.
# Gain: quick UX relabeling without package edits.
room_label_living: "Room 1"
room_label_dining: "Room 2"
room_label_kitchen: "Room 3"
room_label_bedroom: "Room 4"

# Target option labels
target_label_all: "All"
target_label_star: "Target 1"
target_label_tube: "Target 2"
target_label_reading: "Target 3"
target_label_chandelier: "Target 4"
target_label_polaroid_clock: "Target 5"

# === System Runtime Cadence ===
# Purpose: global scheduler/update cadence used by multiple packages.
# Gain: central control of background update frequency and idle behavior.
# Risk: very low intervals increase CPU/useful work contention.
audio_poll_interval_ms: "5000"
heartbeat_interval_ms: "300000"
screensaver_idle_ms: "30000"
screensaver_update_ms: "2000"
boot_fade_ms: "2000"
boot_menu_ms: "5000"
ring_active_window_ms: "1500"
encoder_rate_limit_hz: "2"

# === UI Display + Typography ===
# Purpose: text rendering, splash styling, and scroll readability.
# Gain: change look-and-feel without touching package display code.
ui_font_file: "spectra_ls_system/OCR-B.ttf"
splash_font_file: "spectra_ls_system/OCR-A.ttf"
splash_duration_ms: "8000"
splash_title_left: "SPECTRA L"
splash_title_right: "S"
splash_subtitle_left: "Level"
splash_subtitle_right: "Source"
splash_symbol_gap_px: "1"
splash_title_offset_px: "0"
splash_subtitle_offset_px: "0"
splash_title_font_size: "12"
splash_subtitle_font_size: "10"
splash_symbol_font_size: "11"
now_playing_font_size: "10"
now_playing_mid_font_size: "9"
now_playing_small_font_size: "9"
scroll_speed_ms: "100"
scroll_gap_px: "16"

