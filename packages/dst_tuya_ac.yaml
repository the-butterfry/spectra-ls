# Description: DST + Tuya AC package with Fahrenheit controls, schedule automations, and fan-only safeguard rules.
# Version: 2026.04.18.17
# Last updated: 2026-04-18
# config/packages/dst_tuya_ac.yaml
# DST + Tuya AC package (all temperatures in Fahrenheit)
# Replace climate.snail_conditioner_tuya with your Tuya climate entity if different.

# -------------------------
# Template switches and sensor (modern syntax)
# -------------------------
template:
  - switch:
      - name: "AC Mode — Cool"
        default_entity_id: switch.ac_cooler
        state: '{{ is_state("climate.snail_conditioner_tuya","cool") }}'
        turn_on:
          - service: script.turn_on
            target:
              entity_id:
                - script.dst_ac_set_cool
                - script.dst_set_manual_override_24h
        turn_off:
          - service: script.turn_on
            target:
              entity_id:
                - script.dst_ac_turn_off
                - script.dst_clear_manual_override

      - name: "AC Mode — Fan"
        default_entity_id: switch.ac_fan
        state: '{{ is_state("climate.snail_conditioner_tuya","fan_only") }}'
        turn_on:
          - service: script.turn_on
            target:
              entity_id:
                - script.dst_apply_fan_only_low
                - script.dst_set_manual_override_24h
        turn_off:
          - service: script.turn_on
            target:
              entity_id:
                - script.dst_ac_turn_off
                - script.dst_clear_manual_override

      - name: "AC Mode — Dry"
        default_entity_id: switch.ac_dryer
        state: '{{ is_state("climate.snail_conditioner_tuya","dry") }}'
        turn_on:
          - service: script.turn_on
            target:
              entity_id:
                - script.dst_ac_set_dry
                - script.dst_set_manual_override_24h
        turn_off:
          - service: script.turn_on
            target:
              entity_id:
                - script.dst_ac_turn_off
                - script.dst_clear_manual_override

  - sensor:
      - name: "AC Control Reason"
        default_entity_id: sensor.ac_control_reason
        icon: mdi:information-outline
        state: >-
          {% set target_mode = states('sensor.ac_target_mode') | lower %}
          {% if is_state('input_boolean.ac_away_lock','on') %}
            away_lock
          {% elif is_state('binary_sensor.ac_pause_active','on') %}
            paused
          {% elif is_state('input_boolean.ac_fan_override','on') and target_mode == 'fan_only' %}
            fan_override_manual
          {% elif is_state('binary_sensor.ac_fan_policy_active','on') and target_mode == 'fan_only' %}
            fan_policy_warm_rising
          {% elif target_mode == 'cool' and is_state('binary_sensor.ac_manual_override_active','on') %}
            manual_override_cool
          {% elif target_mode == 'fan_only' and is_state('binary_sensor.ac_manual_override_active','on') %}
            manual_override_fan
          {% elif target_mode == 'dry' and is_state('binary_sensor.ac_manual_override_active','on') %}
            manual_override_dry
          {% elif target_mode == 'cool' %}
            schedule_cool
          {% elif target_mode == 'fan_only' %}
            fan_only_active
          {% elif target_mode == 'dry' %}
            dry_active
          {% elif target_mode == 'off' %}
            off
          {% else %}
            idle
          {% endif %}

      - name: "AC Target Mode"
        default_entity_id: sensor.ac_target_mode
        icon: mdi:tune-variant
        state: >-
          {% set hvac = states('climate.room_dst') | lower %}
          {% set manual_hold = is_state('binary_sensor.ac_manual_override_active','on') %}
          {% if is_state('input_boolean.ac_away_lock','on') %}
            off
          {% elif is_state('binary_sensor.ac_pause_active','on') %}
            hold
          {% elif manual_hold and hvac in ['cool','fan_only','dry'] %}
            {{ hvac }}
          {% elif manual_hold and hvac == 'off' %}
            off
          {% elif is_state('binary_sensor.ac_fan_policy_active','on') %}
            fan_only
          {% elif is_state('binary_sensor.ac_schedule_cool_request','on') %}
            cool
          {% else %}
            off
          {% endif %}

      - name: "AC Tuya HVAC Action"
        default_entity_id: sensor.ac_tuya_hvac_action
        icon: mdi:hvac
        state: >-
          {% set action = state_attr('climate.snail_conditioner_tuya','hvac_action') %}
          {% if action in [none, '', 'unknown', 'unavailable'] %}
            unknown
          {% else %}
            {{ action | lower }}
          {% endif %}

      - name: "DST Room Temp Change 1h"
        default_entity_id: sensor.dst_room_temp_change_1h
        unit_of_measurement: "°F"
        state: >-
          {% set raw = states('sensor.dst_room_temp_change_1h_raw') %}
          {{ (raw | float(0)) | round(2) }}

      - name: "DST Room Temp Rate 1h"
        default_entity_id: sensor.dst_room_temp_rate_1h
        unit_of_measurement: "°F/h"
        state: >-
          {% set raw = states('sensor.dst_room_temp_change_1h_raw') %}
          {{ (raw | float(0)) | round(2) }}

      - name: "DST Room Temp Trend 1h Summary"
        default_entity_id: sensor.dst_room_temp_trend_1h_summary
        icon: mdi:chart-timeline-variant
        state: >-
          {% set raw = states('sensor.dst_room_temp_change_1h_raw') %}
          {% if raw in ['unknown','unavailable','none',''] %}
            collecting_data
          {% else %}
            {% set delta = raw | float(0) %}
            {{ '%+.2f°F / 60m (~%+.2f°F/h)' | format(delta, delta) }}
          {% endif %}

  - binary_sensor:
      - name: "AC Pause Active"
        default_entity_id: binary_sensor.ac_pause_active
        state: >-
          {% set pause_until = as_timestamp(states('input_datetime.ac_pause_until')) | default(0) %}
          {{ pause_until > as_timestamp(now()) }}

      - name: "AC Manual Override Active"
        default_entity_id: binary_sensor.ac_manual_override_active
        state: >-
          {% set override_until = as_timestamp(states('input_datetime.ac_manual_override_until')) | default(0) %}
          {{ override_until > as_timestamp(now()) }}

      - name: "AC Warm Rising Policy Active"
        default_entity_id: binary_sensor.ac_warm_rising_policy_active
        state: >-
          {% set room = states('sensor.bedroom_enviro_temperature') | float(0) %}
          {% set rise = states('sensor.dst_room_temp_change_1h') | float(0) %}
          {% set rising = rise >= 0.3 %}
          {{ room > 68 and rising }}

      - name: "DST Room Temp Rising 1h"
        default_entity_id: binary_sensor.dst_room_temp_rising_1h
        state: >-
          {{ (states('sensor.dst_room_temp_change_1h') | float(0)) >= 0.3 }}

      - name: "AC Fan Policy Active"
        default_entity_id: binary_sensor.ac_fan_policy_active
        state: >-
          {% set override = is_state('input_boolean.ac_fan_override','on') %}
          {% set warm_rising = is_state('binary_sensor.ac_warm_rising_policy_active','on') %}
          {% set manual_hold = is_state('binary_sensor.ac_manual_override_active','on') %}
          {{ override or (warm_rising and not manual_hold) }}

      - name: "AC Schedule Cool Request"
        default_entity_id: binary_sensor.ac_schedule_cool_request
        state: >-
          {% set room_raw = states('sensor.bedroom_enviro_temperature') %}
          {% set room_ok = room_raw not in ['unknown','unavailable','none',''] %}
          {% set room_temp = room_raw | float(0) %}
          {% set after_6 = now().hour >= 18 %}
          {% set gate_ok = room_ok and (after_6 or room_temp >= 85) %}
          {% set feels = states('sensor.central_dist_seattle_feels_like') | float(0) %}
          {% set out_temp = states('sensor.central_dist_seattle_temperature') | float(0) %}
          {% set humid = states('sensor.central_dist_seattle_humidity') | float(0) %}
          {% set outdoor_hot = (feels >= 78) or (out_temp >= 78) %}
          {% set outdoor_humid = humid >= 65 %}
          {{ gate_ok and outdoor_hot and outdoor_humid }}

  - fan:
      - name: "AC Fan"
        default_entity_id: fan.ac_fan
        availability: >-
          {{ states('climate.snail_conditioner_tuya') not in ['unknown','unavailable','none',''] }}
        state: >-
          {{ states('climate.snail_conditioner_tuya') not in ['off','unknown','unavailable','none',''] }}
        preset_mode: >-
          {{ state_attr('climate.snail_conditioner_tuya','fan_mode') | default('auto', true) }}
        preset_modes:
          - low
          - high
          - auto
          - strong
        turn_on:
          - action: climate.set_hvac_mode
            target:
              entity_id: climate.snail_conditioner_tuya
            data:
              hvac_mode: "fan_only"
        turn_off:
          - action: climate.set_hvac_mode
            target:
              entity_id: climate.snail_conditioner_tuya
            data:
              hvac_mode: "off"
        set_preset_mode:
          - action: climate.set_fan_mode
            target:
              entity_id: climate.snail_conditioner_tuya
            data:
              fan_mode: "{{ preset_mode }}"


# -------------------------
# Scripts (device calls and presets) - Fahrenheit setpoints
# -------------------------
script:
  dst_set_manual_override_24h:
    mode: restart
    sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_manual_override_until
        data:
          timestamp: "{{ (now() + timedelta(hours=24)).timestamp() | int }}"

  dst_clear_manual_override:
    mode: restart
    sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_manual_override_until
        data:
          timestamp: "{{ (now() - timedelta(minutes=1)).timestamp() | int }}"

  dst_apply_fan_only_low:
    mode: restart
    sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.snail_conditioner_tuya
        data:
          hvac_mode: "fan_only"
      - delay: "00:00:02"
      - service: fan.set_preset_mode
        target:
          entity_id: fan.ac_fan
        data:
          preset_mode: "low"
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.room_dst
        data:
          hvac_mode: "fan_only"

  dst_ac_set_cool:
    sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.snail_conditioner_tuya
        data:
          hvac_mode: "cool"
      - variables:
          target_attr: "{{ state_attr('climate.room_dst','temperature') }}"
          target_ok: "{{ target_attr is not none }}"
          target_temp: "{{ (target_attr | float) if target_ok else 71 }}"
          tuya_min: "{{ state_attr('climate.snail_conditioner_tuya','min_temp') | float(60) }}"
          tuya_max: "{{ state_attr('climate.snail_conditioner_tuya','max_temp') | float(86) }}"
          tuya_temp: >-
            {% set base = target_temp - 4 %}
            {{ [tuya_max, [tuya_min, base] | max] | min }}
      - delay: "00:00:02"
      - service: climate.set_temperature
        target:
          entity_id: climate.snail_conditioner_tuya
        data:
          temperature: "{{ tuya_temp }}"

  dst_ac_set_fan:
    sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.snail_conditioner_tuya
        data:
          hvac_mode: "fan_only"

  dst_ac_set_dry:
    sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.snail_conditioner_tuya
        data:
          hvac_mode: "dry"

  dst_ac_turn_off:
    mode: restart
    sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.snail_conditioner_tuya
        data:
          hvac_mode: "off"

  # Preset helper scripts (Home/Away only)
  dst_preset_away:
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_away_lock
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.room_dst
        data:
          hvac_mode: "off"
      - service: script.turn_on
        target:
          entity_id: script.dst_clear_manual_override

  dst_preset_home:
    sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ac_away_lock

# -------------------------
# Dual Smart Thermostat (DST) using Fahrenheit
# -------------------------
climate:
  - platform: dual_smart_thermostat
    name: "Room DST"
    heater: switch.ac_cooler
    fan: fan.ac_fan
    dryer: switch.ac_dryer
    humidity_sensor: sensor.bedroom_enviro_humidity
    ac_mode: true
    target_sensor: sensor.bedroom_enviro_temperature
    min_temp: 64
    max_temp: 86
    target_temp: 75
    hot_tolerance: 1
    min_cycle_duration:
      seconds: 120
    keep_alive: 0
    initial_hvac_mode: "off"
    precision: 1
    target_temp_step: 1

    # DST native preset sections (Home/Away only)
    away:
      target_temp_high: 80
    home:
      target_temp_high: 75

sensor:
  - platform: statistics
    name: "DST Room Temp Change 1h Raw"
    unique_id: dst_room_temp_change_1h_raw
    entity_id: sensor.bedroom_enviro_temperature
    state_characteristic: change
    max_age:
      hours: 1
    sampling_size: 360

# -------------------------
# Automations
# -------------------------
automation:
  - id: dst_pause_automation_10h
    alias: "DST: Pause automations for 10 hours"
    trigger:
      - platform: state
        entity_id: input_button.ac_pause_10h
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_pause_until
        data:
          timestamp: "{{ (now() + timedelta(hours=10)).timestamp() | int }}"

  - id: dst_manual_hold_on_hvac_change
    alias: "DST: Manual hold on thermostat hvac mode change"
    mode: restart
    trigger:
      - platform: state
        entity_id: climate.room_dst
    condition:
      - condition: template
        value_template: "{{ trigger.to_state is not none and trigger.to_state.context.user_id is not none }}"
    action:
      - variables:
          hvac_mode: "{{ trigger.to_state.state | lower }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode in ['cool', 'fan_only', 'dry'] }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_set_manual_override_24h
          - conditions:
              - condition: template
                value_template: "{{ hvac_mode == 'off' }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_clear_manual_override

  - id: dst_on_preset_mode_changed
    alias: "DST: Run preset script when climate preset_mode changes"
    trigger:
      - platform: state
        entity_id: climate.room_dst
        attribute: preset_mode
    action:
      - variables:
          pm: "{{ state_attr('climate.room_dst','preset_mode') | default('') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pm == 'away' }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_preset_away
          - conditions:
              - condition: template
                value_template: "{{ pm == 'home' }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_preset_home
        default: []

  - id: dst_mode_reconciler
    alias: "DST: Reconcile policy target mode"
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - sensor.ac_target_mode
          - climate.room_dst
          - climate.snail_conditioner_tuya
          - input_boolean.ac_away_lock
          - input_boolean.ac_fan_override
          - binary_sensor.ac_manual_override_active
          - binary_sensor.ac_pause_active
          - binary_sensor.ac_fan_policy_active
          - binary_sensor.ac_schedule_cool_request
    action:
      - variables:
          target_mode: "{{ states('sensor.ac_target_mode') | lower }}"
          current_mode: "{{ states('climate.room_dst') | lower }}"
          tuya_mode: "{{ states('climate.snail_conditioner_tuya') | lower }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode in ['unknown','unavailable','none',''] }}"
            sequence: []
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'hold' }}"
            sequence: []
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' and (current_mode != 'off' or tuya_mode != 'off') }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_ac_turn_off
          - conditions:
              - condition: template
                value_template: >-
                  {{ target_mode == 'cool' and (
                    current_mode != 'cool' or
                    tuya_mode != 'cool'
                  ) }}
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_ac_set_cool
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'fan_only' and (current_mode != 'fan_only' or tuya_mode != 'fan_only') }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_apply_fan_only_low
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'dry' and (current_mode != 'dry' or tuya_mode != 'dry') }}"
            sequence:
              - service: script.turn_on
                target:
                  entity_id: script.dst_ac_set_dry

  - id: dst_clear_manual_override_on_outdoor_cool
    alias: "DST: Clear manual hold when outdoor cool and room satisfied"
    trigger:
      - platform: state
        entity_id:
          - sensor.central_dist_seattle_temperature
          - sensor.central_dist_seattle_feels_like
          - sensor.bedroom_enviro_temperature
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: state
        entity_id: binary_sensor.ac_manual_override_active
        state: "on"
      - condition: template
        value_template: >-
          {% set out_temp = states('sensor.central_dist_seattle_temperature') | float(0) %}
          {% set feels = states('sensor.central_dist_seattle_feels_like') | float(0) %}
          {% set target = state_attr('climate.room_dst','temperature') | float(0) %}
          {% set room = states('sensor.bedroom_enviro_temperature') | float(0) %}
          {{ (out_temp <= 70 or feels <= 70) and (room <= target + 0.5) }}
    action:
      - service: script.turn_on
        target:
          entity_id: script.dst_clear_manual_override

# -------------------------
# Hide low-level switches from default UI but keep them available
# -------------------------
homeassistant:
  customize:
    switch.ac_cooler:
      hidden: true
      friendly_name: "AC Mode — Cool"
    switch.ac_fan:
      hidden: true
      friendly_name: "AC Mode — Fan"
    switch.ac_dryer:
      hidden: true
      friendly_name: "AC Mode — Dry"
    fan.ac_fan:
      friendly_name: "AC Fan"

input_button:
  ac_pause_10h:
    name: "AC Pause 10 Hours"
    icon: mdi:timer-pause

input_datetime:
  ac_manual_override_until:
    name: "AC Manual Override Until"
    has_date: true
    has_time: true
  ac_pause_until:
    name: "AC Pause Until"
    has_date: true
    has_time: true

input_boolean:
  ac_away_lock:
    name: "AC Away Lock"
    icon: mdi:lock
  ac_fan_override:
    name: "Fan Override"
    icon: mdi:fan-alert
