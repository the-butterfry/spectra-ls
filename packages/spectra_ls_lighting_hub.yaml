# Description: Spectra LS lighting hub (rooms/targets from HA Areas).
# Version: 2026.04.20.24
# Last updated: 2026-04-20
# Update version/date whenever you change this file.
#
# Notes:
# - Rooms are derived from HA Areas that contain at least one light.
# - Targets are derived from lights in the selected room (area).
# - Input selects are updated via input_select.set_options (dynamic).

input_select:
  control_board_room:
    name: Control Board Room
    options:
      - Unknown
    initial: Unknown
  control_board_target:
    name: Control Board Target
    options:
      - All
    initial: All

template:
  - sensor:
      - name: Control Board Eligible Light Catalog
        unique_id: control_board_eligible_light_catalog
        icon: mdi:lightbulb-multiple-outline
        state: >
          {% set ns = namespace(items=[]) %}
          {% set excluded_entities = (label_entities('no-spectra') + label_entities('no_spectra')) | unique | list %}
          {% for s in states.light %}
            {% set ent = s.entity_id %}
            {% set aid = area_id(ent) %}
            {% set room_name = area_name(aid) if aid else '' %}
            {% if aid and room_name not in ['', none] %}
              {% set label = state_attr(ent, 'friendly_name') or ent.split('.')[-1] %}
              {% set ent_low = ent | lower %}
              {% set label_low = label | lower %}
              {% set modes = state_attr(ent, 'supported_color_modes') %}
              {% set modes_blob = (modes | tojson | lower) if modes is not none else '[]' %}
              {% set supports_dimming_or_color =
                ('brightness' in modes_blob) or
                ('color_temp' in modes_blob) or
                ('hs' in modes_blob) or
                ('xy' in modes_blob) or
                ('rgb' in modes_blob) or
                ('rgbw' in modes_blob) or
                ('rgbww' in modes_blob) or
                ('white' in modes_blob)
              %}
              {% set supports_onoff_or_legacy =
                ('onoff' in modes_blob) or
                (modes is none) or
                (state_attr(ent, 'brightness') is not none)
              %}
              {% if (supports_dimming_or_color or supports_onoff_or_legacy) and ('speaker' not in ent_low) and ('speaker' not in label_low) and (ent not in excluded_entities) %}
                {% set ns.items = ns.items + [{'area_id': aid, 'area_name': room_name, 'entity_id': ent, 'label': label}] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% if (ns.items | count) == 0 %}
            {% for area in areas() %}
              {% for ent in area_entities(area) %}
                {% if ent.startswith('light.') %}
                  {% set aid = area_id(ent) %}
                  {% set room_name = area_name(aid) if aid else area %}
                  {% set label = state_attr(ent, 'friendly_name') or ent.split('.')[-1] %}
                  {% set ent_low = ent | lower %}
                  {% set label_low = label | lower %}
                  {% set modes = state_attr(ent, 'supported_color_modes') %}
                  {% set modes_blob = (modes | tojson | lower) if modes is not none else '[]' %}
                  {% set supports_dimming_or_color =
                    ('brightness' in modes_blob) or
                    ('color_temp' in modes_blob) or
                    ('hs' in modes_blob) or
                    ('xy' in modes_blob) or
                    ('rgb' in modes_blob) or
                    ('rgbw' in modes_blob) or
                    ('rgbww' in modes_blob) or
                    ('white' in modes_blob)
                  %}
                  {% set supports_onoff_or_legacy =
                    ('onoff' in modes_blob) or
                    (modes is none) or
                    (state_attr(ent, 'brightness') is not none)
                  %}
                  {% if (supports_dimming_or_color or supports_onoff_or_legacy) and room_name not in ['', none] and ('speaker' not in ent_low) and ('speaker' not in label_low) and (ent not in excluded_entities) %}
                    {% set ns.items = ns.items + [{'area_id': aid, 'area_name': room_name, 'entity_id': ent, 'label': label}] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
          {% endif %}
          {{ ns.items | count }}
        attributes:
          items_json: >
            {% set ns = namespace(items=[]) %}
            {% set excluded_entities = (label_entities('no-spectra') + label_entities('no_spectra')) | unique | list %}
            {% for s in states.light %}
              {% set ent = s.entity_id %}
              {% set aid = area_id(ent) %}
              {% set room_name = area_name(aid) if aid else '' %}
              {% if aid and room_name not in ['', none] %}
                {% set label = state_attr(ent, 'friendly_name') or ent.split('.')[-1] %}
                {% set ent_low = ent | lower %}
                {% set label_low = label | lower %}
                {% set modes = state_attr(ent, 'supported_color_modes') %}
                {% set modes_blob = (modes | tojson | lower) if modes is not none else '[]' %}
                {% set supports_dimming_or_color =
                  ('brightness' in modes_blob) or
                  ('color_temp' in modes_blob) or
                  ('hs' in modes_blob) or
                  ('xy' in modes_blob) or
                  ('rgb' in modes_blob) or
                  ('rgbw' in modes_blob) or
                  ('rgbww' in modes_blob) or
                  ('white' in modes_blob)
                %}
                {% set supports_onoff_or_legacy =
                  ('onoff' in modes_blob) or
                  (modes is none) or
                  (state_attr(ent, 'brightness') is not none)
                %}
                {% if (supports_dimming_or_color or supports_onoff_or_legacy) and ('speaker' not in ent_low) and ('speaker' not in label_low) and (ent not in excluded_entities) %}
                  {% set ns.items = ns.items + [{'area_id': aid, 'area_name': room_name, 'entity_id': ent, 'label': label}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if (ns.items | count) == 0 %}
              {% for area in areas() %}
                {% for ent in area_entities(area) %}
                  {% if ent.startswith('light.') %}
                    {% set aid = area_id(ent) %}
                    {% set room_name = area_name(aid) if aid else area %}
                    {% set label = state_attr(ent, 'friendly_name') or ent.split('.')[-1] %}
                    {% set ent_low = ent | lower %}
                    {% set label_low = label | lower %}
                    {% set modes = state_attr(ent, 'supported_color_modes') %}
                    {% set modes_blob = (modes | tojson | lower) if modes is not none else '[]' %}
                    {% set supports_dimming_or_color =
                      ('brightness' in modes_blob) or
                      ('color_temp' in modes_blob) or
                      ('hs' in modes_blob) or
                      ('xy' in modes_blob) or
                      ('rgb' in modes_blob) or
                      ('rgbw' in modes_blob) or
                      ('rgbww' in modes_blob) or
                      ('white' in modes_blob)
                    %}
                    {% set supports_onoff_or_legacy =
                      ('onoff' in modes_blob) or
                      (modes is none) or
                      (state_attr(ent, 'brightness') is not none)
                    %}
                    {% if (supports_dimming_or_color or supports_onoff_or_legacy) and room_name not in ['', none] and ('speaker' not in ent_low) and ('speaker' not in label_low) and (ent not in excluded_entities) %}
                      {% set ns.items = ns.items + [{'area_id': aid, 'area_name': room_name, 'entity_id': ent, 'label': label}] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
              {% endfor %}
            {% endif %}
            {{ ns.items | tojson }}
          count: >
            {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
            {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
            {{ parsed | count }}

      - name: Control Board Room Options
        unique_id: control_board_room_options
        icon: mdi:floor-plan
        state: >
          {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
          {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
          {% set ns = namespace(rooms=[]) %}
          {% for item in parsed %}
            {% set room_name = item.area_name if item is mapping and item.area_name is defined else '' %}
            {% if room_name not in ns.rooms and room_name not in ['', none] %}
              {% set ns.rooms = ns.rooms + [room_name] %}
            {% endif %}
          {% endfor %}
          {% if (ns.rooms | count) == 0 %}
            {{ ['No Rooms'] | tojson }}
          {% else %}
            {{ ns.rooms | tojson }}
          {% endif %}
        attributes:
          count: >
            {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
            {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
            {% set ns = namespace(rooms=[]) %}
            {% for item in parsed %}
              {% set room_name = item.area_name if item is mapping and item.area_name is defined else '' %}
              {% if room_name not in ns.rooms and room_name not in ['', none] %}
                {% set ns.rooms = ns.rooms + [room_name] %}
              {% endif %}
            {% endfor %}
            {{ ns.rooms | count }}

      - name: Control Board Target Options
        unique_id: control_board_target_options
        icon: mdi:lightbulb-group
        state: >
          {% set room = states('input_select.control_board_room') %}
          {% set ns = namespace(targets=['All']) %}
          {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
          {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
          {% for item in parsed %}
            {% set area_name_item = item.area_name if item is mapping and item.area_name is defined else '' %}
            {% set label = item.label if item is mapping and item.label is defined else '' %}
            {% if area_name_item == room and label not in ['', none] %}
              {% set ns.targets = ns.targets + [label] %}
            {% endif %}
          {% endfor %}
          {{ ns.targets | tojson }}
        attributes:
          count: >
            {% set room = states('input_select.control_board_room') %}
            {% set ns = namespace(targets=['All']) %}
            {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
            {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
            {% for item in parsed %}
              {% set area_name_item = item.area_name if item is mapping and item.area_name is defined else '' %}
              {% set ent = item.entity_id if item is mapping and item.entity_id is defined else '' %}
              {% if area_name_item == room and ent not in ['', none] %}
                {% set ns.targets = ns.targets + [ent] %}
              {% endif %}
            {% endfor %}
            {{ ns.targets | count }}
      - name: Control Board Room Area ID
        unique_id: control_board_room_area_id
        icon: mdi:map-marker-radius
        state: >
          {% set room = states('input_select.control_board_room') %}
          {% set ns = namespace(area_id='') %}
          {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
          {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
          {% for item in parsed %}
            {% set area_name_item = item.area_name if item is mapping and item.area_name is defined else '' %}
            {% set aid = item.area_id if item is mapping and item.area_id is defined else '' %}
            {% if area_name_item == room and ns.area_id == '' %}
              {% set ns.area_id = aid %}
            {% endif %}
          {% endfor %}
          {{ ns.area_id }}

      - name: Control Board Target Entity ID
        unique_id: control_board_target_entity_id
        icon: mdi:lightbulb
        state: >
          {% set room = states('input_select.control_board_room') %}
          {% set target = states('input_select.control_board_target') %}
          {% set target_norm = target | lower | regex_replace('[^a-z0-9]+','') %}
          {% set ns = namespace(entity='') %}
          {% if target != 'All' %}
            {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
            {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
            {% for item in parsed %}
              {% set area_name_item = item.area_name if item is mapping and item.area_name is defined else '' %}
              {% set ent = item.entity_id if item is mapping and item.entity_id is defined else '' %}
              {% set label = item.label if item is mapping and item.label is defined else '' %}
              {% if area_name_item == room and ent not in ['', none] %}
                {% set label_norm = label | lower | regex_replace('[^a-z0-9]+','') %}
                {% set ent_norm = ent.split('.')[-1] | lower | regex_replace('[^a-z0-9]+','') %}
                {% if ns.entity == '' and (label == target or label_norm == target_norm or ent_norm == target_norm) %}
                  {% set ns.entity = ent %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.entity }}

      - name: Control Board Room HS
        unique_id: control_board_room_hs
        icon: mdi:palette
        state: >
          {% set room = states('input_select.control_board_room') %}
          {% set ns = namespace(hs='') %}
          {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
          {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
          {% for item in parsed %}
            {% set area_name_item = item.area_name if item is mapping and item.area_name is defined else '' %}
            {% set ent = item.entity_id if item is mapping and item.entity_id is defined else '' %}
            {% if area_name_item == room and ent not in ['', none] %}
              {% set hs = state_attr(ent, 'hs_color') %}
              {% if hs is not none and ns.hs == '' %}
                {% set ns.hs = hs | tojson %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.hs }}

      - name: Control Board Target HS
        unique_id: control_board_target_hs
        icon: mdi:palette
        state: >
          {% set target = states('input_select.control_board_target') %}
          {% set entity = states('sensor.control_board_target_entity_id') %}
          {% if target != 'All' and entity not in ['','unknown','unavailable', none] %}
            {% set hs = state_attr(entity, 'hs_color') %}
            {{ hs | tojson if hs is not none else '' }}
          {% else %}
            {{ '' }}
          {% endif %}

  - binary_sensor:
      - name: Control Board Room On
        unique_id: control_board_room_on
        state: >
          {% set room = states('input_select.control_board_room') %}
          {% set ns = namespace(on=false) %}
          {% set raw = state_attr('sensor.control_board_eligible_light_catalog', 'items_json') or states('sensor.control_board_eligible_light_catalog') %}
          {% set parsed = (raw if (raw is sequence and raw is not string) else ((raw | trim | from_json(default=[])) if (raw is string and (raw | trim)[0:1] == '[') else [])) %}
          {% for item in parsed %}
            {% set area_name_item = item.area_name if item is mapping and item.area_name is defined else '' %}
            {% set ent = item.entity_id if item is mapping and item.entity_id is defined else '' %}
            {% if area_name_item == room and ent not in ['', none] and is_state(ent, 'on') %}
              {% set ns.on = true %}
            {% endif %}
          {% endfor %}
          {{ ns.on }}

      - name: Control Board Target On
        unique_id: control_board_target_on
        state: >
          {% set target = states('input_select.control_board_target') %}
          {% set entity = states('sensor.control_board_target_entity_id') %}
          {% if target == 'All' %}
            {{ is_state('binary_sensor.control_board_room_on', 'on') }}
          {% elif entity not in ['','unknown','unavailable', none] %}
            {{ is_state(entity, 'on') }}
          {% else %}
            false
          {% endif %}

automation:
  - id: control_board_sync_room_options
    alias: Control Board - Sync Room Options
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: sensor.control_board_room_options
      - platform: time_pattern
        minutes: "/5"
    action:
      - variables:
          room_raw: "{{ states('sensor.control_board_room_options') }}"
          room_parsed: >
            {% if room_raw in ['unknown', 'unavailable', ''] %}
              {{ [] }}
            {% elif room_raw is string %}
              {% if (room_raw | trim)[0:1] != '[' %}
                {{ [] }}
              {% else %}
                {{ room_raw | trim | from_json(default=[]) }}
              {% endif %}
            {% elif room_raw is iterable %}
              {{ room_raw }}
            {% else %}
              {{ [] }}
            {% endif %}
          current_options: "{{ state_attr('input_select.control_board_room','options') or [] }}"
          current: "{{ states('input_select.control_board_room') }}"
          room_options: >
            {% if room_parsed | count > 0 %}
              {{ room_parsed }}
            {% elif current_options | count > 0 %}
              {{ current_options }}
            {% else %}
              {{ ['No Rooms'] }}
            {% endif %}
          current_concrete_rooms: >
            {% set ns = namespace(items=[]) %}
            {% for o in current_options %}
              {% set low = (o | string | lower) %}
              {% if low not in ['unknown','unavailable','none','null','', 'unassigned'] %}
                {% set ns.items = ns.items + [o] %}
              {% endif %}
            {% endfor %}
            {{ ns.items }}
          parsed_is_placeholder_only: >
            {% if room_parsed | count == 1 %}
              {% set low = room_parsed[0] | string | lower %}
              {{ low in ['unassigned','no rooms','unknown','none','unavailable','null',''] }}
            {% else %}
              {{ false }}
            {% endif %}
          room_options_effective: >
            {% if parsed_is_placeholder_only and (current_concrete_rooms | count > 0) %}
              {{ current_options }}
            {% else %}
              {{ room_options }}
            {% endif %}
          safe_options: "{{ room_options_effective }}"
          options_changed: "{{ current_options | join('||') != safe_options | join('||') }}"
          needs_reset: "{{ (room_parsed | count > 0) and (states('input_select.control_board_room') not in room_options_effective) }}"
          should_update_options: "{{ options_changed and ((room_parsed | count > 0) or (current_options | count == 0)) }}"
          transitional_options: >
            {% if needs_reset and current not in ['', none] and current not in safe_options %}
              {{ [current] + safe_options }}
            {% else %}
              {{ safe_options }}
            {% endif %}
          needs_prune: "{{ transitional_options | join('||') != safe_options | join('||') }}"
      - choose:
          - conditions: "{{ should_update_options }}"
            sequence:
              - service: input_select.set_options
                data:
                  entity_id: input_select.control_board_room
                  options: "{{ transitional_options }}"
      - choose:
          - conditions: "{{ needs_reset }}"
            sequence:
              - service: input_select.select_option
                data:
                  entity_id: input_select.control_board_room
                  option: "{{ room_options_effective[0] if room_options_effective | count > 0 else 'No Rooms' }}"
      - choose:
          - conditions: "{{ should_update_options and needs_prune }}"
            sequence:
              - service: input_select.set_options
                data:
                  entity_id: input_select.control_board_room
                  options: "{{ safe_options }}"

  - id: control_board_sync_target_options
    alias: Control Board - Sync Target Options
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - sensor.control_board_target_options
          - input_select.control_board_room
      - platform: time_pattern
        minutes: "/5"
    action:
      - variables:
          target_raw: "{{ states('sensor.control_board_target_options') }}"
          target_parsed: >
            {% if target_raw in ['unknown', 'unavailable', ''] %}
              {{ [] }}
            {% elif target_raw is string %}
              {% if (target_raw | trim)[0:1] != '[' %}
                {{ [] }}
              {% else %}
                {{ target_raw | trim | from_json(default=[]) }}
              {% endif %}
            {% elif target_raw is iterable %}
              {{ target_raw }}
            {% else %}
              {{ [] }}
            {% endif %}
          current_options: "{{ state_attr('input_select.control_board_target','options') or [] }}"
          current: "{{ states('input_select.control_board_target') }}"
          target_options: >
            {% if target_parsed | count > 0 %}
              {{ target_parsed }}
            {% else %}
              {{ ['All'] }}
            {% endif %}
          safe_options: "{{ target_options }}"
          options_changed: "{{ current_options | join('||') != safe_options | join('||') }}"
          needs_reset: "{{ (target_parsed | count > 0) and (states('input_select.control_board_target') not in target_options) }}"
          should_update_options: "{{ options_changed and ((target_parsed | count > 0) or (current_options | count == 0)) }}"
      - choose:
          - conditions: "{{ should_update_options }}"
            sequence:
              - service: input_select.set_options
                data:
                  entity_id: input_select.control_board_target
                  options: "{{ safe_options }}"
      - choose:
          - conditions: "{{ needs_reset }}"
            sequence:
              - service: input_select.select_option
                data:
                  entity_id: input_select.control_board_target
                  option: "{{ target_options[0] if target_options | count > 0 else 'All' }}"